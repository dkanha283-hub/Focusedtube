<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    .navbar {
      width:100%;
      background:white;
      padding:10px 20px;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #ddd;
    }

    .main {
      padding:10px;
    }

    .videos {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:10px;
    }

    .video {
      background:white;
      border-radius:10px;
      overflow:hidden;
      cursor:pointer;
    }

    .video img { width:100%; }

    #addBox {
      margin:10px 0;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <h2>FocusTube</h2>
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login / Signup</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube</b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <div id="addBox">
      <input id="channelInput" placeholder="Paste YouTube channel link">
      <button onclick="addChannel()">Add</button>
    </div>

    <div id="videos" class="videos"></div>

  </div>

</div>

<script>

let channels = JSON.parse(localStorage.getItem("channels") || "[]");

// LOGIN SYSTEM
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (!user || !pass) return alert("Enter details");

  localStorage.setItem("user", JSON.stringify({user, pass}));

  startApp();
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

function startApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  loadFeed();
}

// AUTO LOGIN
window.onload = () => {
  if (localStorage.getItem("user")) startApp();
};

// ADD CHANNEL
function addChannel() {
  let input = document.getElementById("channelInput").value;

  let id = extractChannelId(input);

  if (!id) return alert("Invalid link");

  channels.push(id);
  localStorage.setItem("channels", JSON.stringify(channels));

  loadFeed();
}

// EXTRACT CHANNEL ID
function extractChannelId(url) {
  if (url.includes("channel/")) {
    return url.split("channel/")[1];
  }
  return null;
}

// LOAD FEED (RSS)
async function loadFeed() {
  let container = document.getElementById("videos");
  container.innerHTML = "";

  for (let channelId of channels) {
    await loadRSS(channelId);
  }
}

// FETCH RSS
async function loadRSS(channelId) {

  let url = `https://api.allorigins.win/get?url=${encodeURIComponent(
    "https://www.youtube.com/feeds/videos.xml?channel_id=" + channelId
  )}`;

  let res = await fetch(url);
  let data = await res.json();

  let parser = new DOMParser();
  let xml = parser.parseFromString(data.contents, "text/xml");

  let entries = xml.getElementsByTagName("entry");

  let container = document.getElementById("videos");

  for (let i = 0; i < entries.length; i++) {

    let videoId = entries[i].getElementsByTagName("yt:videoId")[0].textContent;
    let title = entries[i].getElementsByTagName("title")[0].textContent;

    let thumb = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;

    let div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <img src="${thumb}">
      <div>${title}</div>
    `;

    div.onclick = () => {
      window.open(`https://youtube.com/watch?v=${videoId}`);
    };

    container.appendChild(div);
  }
}

</script>

</body>
</html>
