<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #0f0f0f;
      color: white;
    }

    .sidebar {
      width: 230px;
      background: #181818;
      height: 100vh;
      padding: 15px;
    }

    .channel {
      padding: 10px;
      margin: 5px 0;
      background: #222;
      border-radius: 6px;
      cursor: pointer;
    }

    .channel:hover {
      background: #333;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    iframe {
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #444;
      color: white;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>My Channels</h3>
  <div id="channelList"></div>

  <input id="channelId" placeholder="Paste channel ID (UC...)" />
  <button onclick="addChannel()">Add Channel</button>
</div>

<div class="main">
  <h2>Focus Mode 🎯</h2>
  <div id="player">Select a channel</div>
</div>

<script>
let channels = JSON.parse(localStorage.getItem("channels")) || [];

function saveChannels() {
  localStorage.setItem("channels", JSON.stringify(channels));
}

function renderChannels() {
  let html = "";
  channels.forEach((ch, i) => {
    html += `<div class="channel" onclick="playChannel('${ch}')">Channel ${i+1}</div>`;
  });
  document.getElementById("channelList").innerHTML = html;
}

function addChannel() {
  let input = document.getElementById("channelId").value.trim();

  if (!input.startsWith("UC")) {
    alert("❌ Paste correct Channel ID (starts with UC...)");
    return;
  }

  let playlistId = "UU" + input.substring(2);

  if (channels.includes(playlistId)) {
    alert("Already added!");
    return;
  }

  channels.push(playlistId);
  saveChannels();
  renderChannels();

  document.getElementById("channelId").value = "";
}

function playChannel(id) {
  document.getElementById("player").innerHTML =
    `<iframe width="100%" height="400"
    src="https://www.youtube.com/embed/videoseries?list=${id}&rel=0"></iframe>`;
}

renderChannels();
</script>

</body>
</html>
