<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, Arial;
      background: linear-gradient(135deg,#eaeaea,#f9f9f9);
    }

    .login-screen {
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    .logo {
      font-size:48px;
      margin-bottom:20px;
    }

    .logo span {
      color:red;
      border:2px solid red;
      padding:5px 12px;
      border-radius:8px;
    }

    .login-btn {
      padding:12px 25px;
      border:none;
      background:#007aff;
      color:white;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover {
      transform:scale(1.05);
      background:#005edb;
    }

    .app { display:none; }

    .navbar {
      height:60px;
      background:rgba(255,255,255,0.8);
      backdrop-filter:blur(10px);
      display:flex;
      align-items:center;
      padding:0 20px;
      border-bottom:1px solid #ddd;
    }

    .nav-icons {
      margin-left:auto;
      display:flex;
      gap:20px;
      font-size:22px;
      cursor:pointer;
    }

    .main {
      padding:20px;
    }

    .player {
      width:100%;
      height:320px;
      border-radius:12px;
      border:none;
      margin-bottom:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    .videos {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
      gap:20px;
    }

    .video {
      background:white;
      border-radius:12px;
      overflow:hidden;
      cursor:pointer;
      transform:translateY(20px);
      opacity:0;
      animation:fadeUp 0.5s forwards;
      transition:0.3s;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .video:hover {
      transform:scale(1.05);
    }

    .video img {
      width:100%;
      display:block;
    }

    .video-title {
      padding:10px;
      font-size:14px;
    }

    @keyframes fadeUp {
      to {
        transform:translateY(0);
        opacity:1;
      }
    }

    #subsPanel {
      position:fixed;
      top:70px;
      right:20px;
      width:300px;
      height:400px;
      background:white;
      border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      display:none;
      overflow:auto;
      padding:10px;
    }

    .channel-item {
      display:flex;
      gap:10px;
      padding:8px;
      cursor:pointer;
      border-radius:6px;
    }

    .channel-item:hover {
      background:#eee;
    }

    .channel-item img {
      width:30px;
      height:30px;
      border-radius:50%;
    }
  </style>
</head>

<body>

<div id="loginScreen" class="login-screen">
  <div class="logo">Focused <span>Tube</span></div>
  <button class="login-btn" onclick="login()">Sign in with Google</button>
</div>

<div id="app" class="app">

  <div class="navbar">
    <div>FocusedTube</div>

    <div class="nav-icons">
      <span onclick="goHome()">🏠</span>
      <span onclick="toggleSubs()">📺</span>
    </div>
  </div>

  <div id="subsPanel">
    <h3>Subscriptions</h3>
    <div id="channelList"></div>
  </div>

  <div class="main">
    <iframe id="player" class="player"></iframe>
    <div id="videos" class="videos"></div>
  </div>

</div>

<script>

let accessToken = localStorage.getItem("token") || "";
let nextPageToken = "";
let currentChannels = [];

// AUTO LOGIN
window.onload = () => {
  if (accessToken) {
    showApp();
    loadSubscriptions();
    loadHomeFeed();
  }
};

// LOGIN
function login() {
  google.accounts.oauth2.initTokenClient({
    client_id: "901526621368-k63bfsq7aomg2e2k6u0625bub9291dhs.apps.googleusercontent.com",
    scope: "https://www.googleapis.com/auth/youtube.readonly",
    callback: (res) => {
      accessToken = res.access_token;
      localStorage.setItem("token", accessToken);

      showApp();
      loadSubscriptions();
      loadHomeFeed();
    }
  }).requestAccessToken({ prompt: "" });
}

function showApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function toggleSubs() {
  let panel = document.getElementById("subsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

// LOAD CHANNEL LIST
async function loadSubscriptions() {
  let res = await fetch(
    "https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=20",
    { headers: { Authorization: "Bearer " + accessToken } }
  );

  let data = await res.json();

  currentChannels = data.items.map(i => i.snippet.resourceId.channelId);

  let list = document.getElementById("channelList");
  list.innerHTML = "";

  data.items.forEach(item => {
    let div = document.createElement("div");
    div.className = "channel-item";

    div.innerHTML = `
      <img src="${item.snippet.thumbnails.default.url}">
      <span>${item.snippet.title}</span>
    `;

    div.onclick = () => {
      toggleSubs();
      loadVideos(item.snippet.resourceId.channelId);
    };

    list.appendChild(div);
  });
}

// 🔥 LOAD HOME FEED (INITIAL)
async function loadHomeFeed() {
  nextPageToken = "";
  document.getElementById("videos").innerHTML = "";
  loadMoreVideos();
}

// 🔥 LOAD MORE VIDEOS (INFINITE)
async function loadMoreVideos() {

  let container = document.getElementById("videos");

  for (let channelId of currentChannels) {

    let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=2&type=video`;

    if (nextPageToken) {
      url += `&pageToken=${nextPageToken}`;
    }

    let res = await fetch(url, {
      headers: { Authorization: "Bearer " + accessToken }
    });

    let data = await res.json();

    nextPageToken = data.nextPageToken || "";

    data.items.forEach(video => {
      let vid = video.id.videoId;
      let title = video.snippet.title;
      let thumb = video.snippet.thumbnails.medium.url;

      let div = document.createElement("div");
      div.className = "video";

      div.innerHTML = `
        <img src="${thumb}">
        <div class="video-title">${title}</div>
      `;

      div.onclick = () => {
        document.getElementById("player").src =
          `https://www.youtube.com/embed/${vid}`;
      };

      container.appendChild(div);
    });
  }
}

// 🔥 SCROLL DETECTION
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    loadMoreVideos();
  }
});

// LOAD CHANNEL VIDEOS
async function loadVideos(channelId) {
  let res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=10&type=video`,
    { headers: { Authorization: "Bearer " + accessToken } }
  );

  let data = await res.json();
  let container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach(video => {
    let vid = video.id.videoId;
    let thumb = video.snippet.thumbnails.medium.url;

    let div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `<img src="${thumb}">`;

    div.onclick = () => {
      document.getElementById("player").src =
        `https://www.youtube.com/embed/${vid}`;
    };

    container.appendChild(div);
  });
}

// HOME
function goHome() {
  document.getElementById("player").src = "";
  loadHomeFeed();
}

</script>
