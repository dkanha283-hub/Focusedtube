<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    .navbar {
      width:100%;
      padding:10px;
      background:white;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #ddd;
    }

    .container {
      display:flex;
      width:100%;
      height:calc(100vh - 50px);
    }

    .sidebar {
      width:260px;
      background:white;
      border-right:1px solid #ddd;
      padding:10px;
    }

    .main {
      flex:1;
      padding:10px;
      overflow:auto;
    }

    iframe {
      width:100%;
      height:250px;
      border:none;
      border-radius:10px;
      margin-bottom:15px;
    }

    .item {
      padding:8px;
      margin-bottom:5px;
      background:#fafafa;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>FocusTube</h2>
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="handleLogin()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube 🎯</b>
    <button onclick="handleLogout()">Logout</button>
  </div>

  <div class="container">

    <div class="sidebar">
      <input id="linkInput" placeholder="Paste YouTube link">
      <button onclick="addItem()">Add</button>

      <h3>Saved</h3>
      <div id="list"></div>
    </div>

    <div class="main" id="videos"></div>

  </div>

</div>

<script>

// ===== SAFE START =====
document.addEventListener("DOMContentLoaded", function () {
  init();
});

function init() {
  const user = localStorage.getItem("user");

  if (user === "logged") {
    showApp();
  } else {
    showLogin();
  }
}

// ===== UI CONTROL =====
function showLogin() {
  document.getElementById("loginPage").style.display = "flex";
  document.getElementById("app").style.display = "none";
}

function showApp() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadData();
}

// ===== LOGIN =====
function handleLogin() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  if (!u || !p) {
    alert("Enter username & password");
    return;
  }

  localStorage.setItem("user", "logged");
  showApp();
}

// ===== LOGOUT =====
function handleLogout() {
  localStorage.removeItem("user");
  showLogin();
}

// ===== DATA =====
let items = [];

function loadData() {
  items = JSON.parse(localStorage.getItem("items") || "[]");
  renderList();
  loadVideos();
}

// ===== ADD LINK =====
function addItem() {
  let link = document.getElementById("linkInput").value.trim();

  if (!(link.includes("youtube.com") || link.includes("youtu.be"))) {
    alert("Paste valid YouTube link");
    return;
  }

  if (items.includes(link)) {
    alert("Already added");
    return;
  }

  items.push(link);
  localStorage.setItem("items", JSON.stringify(items));

  renderList();
  loadVideos();
}

// ===== LIST =====
function renderList() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((l, i) => {
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      Link ${i+1}
      <span onclick="deleteItem(${i})">❌</span>
    `;

    list.appendChild(div);
  });
}

function deleteItem(i) {
  items.splice(i, 1);
  localStorage.setItem("items", JSON.stringify(items));
  renderList();
  loadVideos();
}

// ===== VIDEO LOAD =====
function loadVideos() {
  let container = document.getElementById("videos");
  container.innerHTML = "";

  items.forEach(link => {

    let videoId = null;

    if (link.includes("watch?v=")) {
      videoId = link.split("watch?v=")[1].split("&")[0];
    }

    if (link.includes("youtu.be/")) {
      videoId = link.split("youtu.be/")[1].split("?")[0];
    }

    if (videoId) {
      let iframe = document.createElement("iframe");
      iframe.src = `https://www.youtube.com/embed/${videoId}`;
      container.appendChild(iframe);
    }

  });
}

</script>

</body>
</html>
