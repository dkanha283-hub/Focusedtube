<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    .navbar {
      width:100%;
      padding:10px;
      background:white;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #ddd;
    }

    .container {
      display:flex;
      width:100%;
      height:calc(100vh - 50px);
    }

    .sidebar {
      width:260px;
      background:white;
      border-right:1px solid #ddd;
      padding:10px;
      overflow:auto;
    }

    .main {
      flex:1;
      padding:10px;
      overflow:auto;
    }

    .videos {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:10px;
    }

    .video {
      background:white;
      border-radius:10px;
      overflow:hidden;
      cursor:pointer;
    }

    .video img { width:100%; }

    .suggestion {
      padding:8px;
      border-bottom:1px solid #eee;
      cursor:pointer;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>FocusTube</h2>
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube 🚀</b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <input id="searchInput" placeholder="Search channel..." oninput="searchChannel()">

      <div id="suggestions"></div>

      <h3>Subscriptions</h3>
      <div id="channelList"></div>

    </div>

    <!-- MAIN -->
    <div class="main">
      <div id="videos" class="videos"></div>
    </div>

  </div>

</div>

<script>

// LOGIN
window.onload = () => {
  if(localStorage.getItem("user")) showApp();
};

function login(){
  if(!username.value||!password.value) return alert("Enter details");
  localStorage.setItem("user","ok");
  showApp();
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  loadChannels();
}

// DATA
let channels=[];

function loadChannels(){
  channels=JSON.parse(localStorage.getItem("channels")||"[]");
  renderChannels();
  loadFeed();
}

// SEARCH SYSTEM
async function searchChannel(){

  let q=searchInput.value;
  if(q.length<2) return;

  let proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(
    "https://www.youtube.com/results?search_query="+q)}`;

  let res=await fetch(proxy);
  let data=await res.json();

  let html=data.contents;

  let matches=[...html.matchAll(/"title":{"runs":\[\{"text":"(.*?)"\}\]}/g)];

  suggestions.innerHTML="";

  matches.slice(0,5).forEach(m=>{
    let name=m[1];

    let div=document.createElement("div");
    div.className="suggestion";
    div.innerText=name;

    div.onclick=()=>addChannel(name);

    suggestions.appendChild(div);
  });
}

// ADD CHANNEL
function addChannel(name){

  if(channels.includes(name)) return alert("Already added");

  channels.push(name);
  localStorage.setItem("channels", JSON.stringify(channels));

  suggestions.innerHTML="";
  renderChannels();
  loadFeed();
}

// SIDEBAR
function renderChannels(){
  channelList.innerHTML="";
  channels.forEach((c,i)=>{
    let div=document.createElement("div");
    div.innerHTML=`
      ${c}
      <button onclick="deleteChannel(${i})">❌</button>
    `;
    channelList.appendChild(div);
  });
}

function deleteChannel(i){
  channels.splice(i,1);
  localStorage.setItem("channels", JSON.stringify(channels));
  renderChannels();
  loadFeed();
}

// FEED
async function loadFeed(){

  videos.innerHTML="Loading...";

  let all=[];

  for(let c of channels){

    let rss=`https://www.youtube.com/feeds/videos.xml?user=${encodeURIComponent(c)}`;

    try{
      let proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(rss)}`;
      let res=await fetch(proxy);
      let data=await res.json();

      let parser=new DOMParser();
      let xml=parser.parseFromString(data.contents,"text/xml");

      let entries=xml.getElementsByTagName("entry");

      for(let i=0;i<entries.length;i++){
        let id=entries[i].getElementsByTagName("yt:videoId")[0].textContent;
        let title=entries[i].getElementsByTagName("title")[0].textContent;

        all.push({
          id,
          title,
          thumb:`https://img.youtube.com/vi/${id}/mqdefault.jpg`
        });
      }

    }catch(e){}
  }

  videos.innerHTML="";

  all.forEach(v=>{
    let div=document.createElement("div");
    div.className="video";

    div.innerHTML=`<img src="${v.thumb}"><div>${v.title}</div>`;

    div.onclick=()=>window.open("https://youtube.com/watch?v="+v.id);

    videos.appendChild(div);
  });
}

</script>

</body>
</html>
