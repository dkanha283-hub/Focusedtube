<!DOCTYPE html>
<html>
<head>
  <title>FocusTube Advanced</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #181818;
      padding: 15px;
      border-right: 1px solid #333;
      overflow-y: auto;
    }

    .logo {
      font-size: 20px;
      margin-bottom: 15px;
    }

    .login-btn {
      padding: 10px;
      width: 100%;
      background: #333;
      border: none;
      color: white;
      margin-bottom: 15px;
      cursor: pointer;
    }

    .channel {
      padding: 10px;
      background: #222;
      margin-bottom: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    .channel:hover {
      background: #333;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 10px;
    }

    .empty {
      color: gray;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">FocusTube 🎯</div>

  <button class="login-btn" onclick="login()">
    Sign in with Google
  </button>

  <div id="channelList"></div>
</div>

<div class="main">
  <iframe id="player"></iframe>
  <div id="emptyText" class="empty">Login to load subscriptions</div>
</div>

<script>

let accessToken = "";

function login() {
  google.accounts.oauth2.initTokenClient({
    client_id: "901526621368-k63bfsq7aomg2e2k6u0625bub9291dhs.apps.googleusercontent.com",
    scope: "https://www.googleapis.com/auth/youtube.readonly",
    callback: (response) => {
      accessToken = response.access_token;
      loadSubscriptions();
    }
  }).requestAccessToken();
}

async function loadSubscriptions() {
  let res = await fetch(
    "https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50",
    {
      headers: {
        Authorization: "Bearer " + accessToken
      }
    }
  );

  let data = await res.json();

  let list = document.getElementById("channelList");
  list.innerHTML = "";

  data.items.forEach(item => {
    let name = item.snippet.title;
    let channelId = item.snippet.resourceId.channelId;

    let div = document.createElement("div");
    div.className = "channel";
    div.innerText = name;

    div.onclick = () => {
      let playlist = "UU" + channelId.substring(2);

      document.getElementById("player").src =
        "https://www.youtube.com/embed/videoseries?list=" + playlist;

      document.getElementById("emptyText").style.display = "none";
    };

    list.appendChild(div);
  });
}

</script>

</body>
</html>
