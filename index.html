<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    /* LOGIN SCREEN */
    .login-screen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .logo-big {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .login-btn {
      padding: 12px 20px;
      background: #4285F4;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* MAIN APP */
    .app {
      display: none;
    }

    .navbar {
      height: 60px;
      background: #181818;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border-bottom: 1px solid #333;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    .sidebar {
      width: 250px;
      background: #181818;
      padding: 10px;
      border-right: 1px solid #333;
      overflow-y: auto;
    }

    .channel {
      padding: 10px;
      background: #222;
      margin-bottom: 5px;
      border-radius: 5px;
      cursor: pointer;
    }

    .channel:hover {
      background: #333;
    }

    .main {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .player {
      width: 100%;
      height: 300px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .video img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginScreen" class="login-screen">
  <div class="logo-big">Focused <span style="color:red;">Tube</span></div>
  <button class="login-btn" onclick="login()">Sign in with Google</button>
</div>

<!-- MAIN APP -->
<div id="app" class="app">

  <div class="navbar">FocusTube 🎯</div>

  <div class="container">

    <div class="sidebar" id="channelList"></div>

    <div class="main">
      <iframe id="player" class="player"></iframe>
      <div id="videos" class="videos"></div>
    </div>

  </div>

</div>

<script>

let accessToken = "";

// LOGIN
function login() {
  google.accounts.oauth2.initTokenClient({
    client_id: "901526621368-k63bfsq7aomg2e2k6u0625bub9291dhs.apps.googleusercontent.com",
    scope: "https://www.googleapis.com/auth/youtube.readonly",
    callback: (res) => {
      accessToken = res.access_token;

      // SWITCH UI
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").style.display = "block";

      loadSubscriptions();
    }
  }).requestAccessToken();
}

// LOAD CHANNELS
async function loadSubscriptions() {
  let res = await fetch(
    "https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50",
    {
      headers: { Authorization: "Bearer " + accessToken }
    }
  );

  let data = await res.json();

  let list = document.getElementById("channelList");
  list.innerHTML = "<h3>Subscriptions</h3>";

  data.items.forEach(item => {
    let div = document.createElement("div");
    div.className = "channel";
    div.innerText = item.snippet.title;

    div.onclick = () => loadVideos(item.snippet.resourceId.channelId);

    list.appendChild(div);
  });
}

// LOAD VIDEOS
async function loadVideos(channelId) {

  let res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=15&order=date&type=video`,
    {
      headers: { Authorization: "Bearer " + accessToken }
    }
  );

  let data = await res.json();

  let container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach((video, index) => {
    let vid = video.id.videoId;
    let thumb = video.snippet.thumbnails.medium.url;

    let div = document.createElement("div");

    div.innerHTML = `<img src="${thumb}">`;

    div.onclick = () => {
      document.getElementById("player").src =
        `https://www.youtube.com/embed/${vid}`;
    };

    container.appendChild(div);

    if (index === 0) {
      document.getElementById("player").src =
        `https://www.youtube.com/embed/${vid}`;
    }
  });
}

</script>

</body>
</html>
