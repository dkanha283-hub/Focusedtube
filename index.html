<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusedTube | Ultimate Final</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(22, 22, 22, 0.98);
            --card: #121212;
            --text: #ffffff;
            --muted: #aaaaaa;
            --accent: #ff0000;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 20px 50px rgba(0,0,0,0.9);
            --radius: 20px;
        }

        body.light {
            --bg: #f0f2f5;
            --panel: rgba(255, 255, 255, 0.98);
            --card: #ffffff;
            --text: #1c1e21;
            --muted: #65676b;
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow: hidden;
            transition: 0.3s ease;
        }

        /* --- NAVIGATION --- */
        #app { display: none; height: 100vh; flex-direction: column; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.4rem; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-icons { display: flex; gap: 5px; align-items: center; }
        .icon { padding: 10px; cursor: pointer; border-radius: 12px; transition: 0.2s; font-size: 1.2rem; }
        .icon:hover { background: var(--panel); }

        /* --- POPUP WINDOWS --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 2000; backdrop-filter: blur(10px); }
        .popup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); 
            width: 90%; max-width: 450px; background: var(--panel); z-index: 2100; 
            padding: 30px; border-radius: 30px; display: none; border: 1px solid var(--border);
            box-shadow: var(--shadow); transition: 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }
        .popup.active { display: block; transform: translate(-50%, -50%) scale(1); }

        /* --- VIEWS --- */
        .content { flex: 1; overflow-y: auto; padding: 20px; position: relative; }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* --- CARDS --- */
        .card { cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-8px); }
        .t-wrap { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: var(--radius); overflow: hidden; background: #1a1a1a; }
        .t-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .add-p-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 10px; width: 32px; height: 32px; font-size: 1.2rem; cursor: pointer; opacity: 0; transition: 0.2s; }
        .card:hover .add-p-btn { opacity: 1; }
        .c-meta { display: flex; gap: 12px; padding: 12px 5px; }
        .c-logo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .c-title { font-weight: 700; font-size: 0.95rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- PLAYER & FLOATING WINDOW --- */
        #player-view { display: none; flex-direction: column; gap: 15px; }
        .player-stage { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 24px; overflow: hidden; position: relative; box-shadow: var(--shadow); }
        
        /* Double Tap Zones */
        .tap-overlay { position: absolute; inset: 0; display: flex; z-index: 10; }
        .tap-zone { flex: 1; height: 100%; }

        /* Floating Window Mode */
        .floating { 
            position: fixed; bottom: 20px; right: 20px; width: 320px; height: 180px; 
            z-index: 3000; box-shadow: var(--shadow); border: 2px solid var(--accent);
        }

        .p-btn { background: var(--panel); border: 1px solid var(--border); color: white; padding: 12px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .p-btn:hover { background: var(--accent); }

        /* --- UTILS --- */
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); border-radius: 10px; cursor: pointer; }
        .list-row:hover { background: rgba(128,128,128,0.1); }
        .loader { border: 3px solid var(--border); border-top: 3px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="Popup.closeAll()"></div>

<!-- AUTH -->
<div id="auth-screen" style="height:100vh; display:flex; justify-content:center; align-items:center;">
    <div style="background:var(--panel); padding:40px; border-radius:30px; width:320px; text-align:center; border:1px solid var(--border);">
        <h1 class="logo">Focused<span>Tube</span></h1>
        <input id="userIn" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:white;" placeholder="Username">
        <input id="passIn" type="password" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:white;" placeholder="Password">
        <button onclick="Auth.login()" style="width:100%; padding:12px; border:none; border-radius:10px; background:var(--accent); color:white; font-weight:bold; cursor:pointer;">Sign In</button>
    </div>
</div>

<!-- MAIN APP -->
<div id="app">
    <nav class="topbar">
        <div class="logo" onclick="Router.go('home')">Focused<span>Tube</span></div>
        <div class="nav-icons">
            <div class="icon" onclick="Popup.open('search-pop')">🔍</div>
            <div class="icon" onclick="Popup.open('subs-pop')">📺</div>
            <div class="icon" onclick="Router.go('playlists')">📁</div>
            <div class="icon" onclick="Router.go('history')">⏱</div>
            <div class="icon" onclick="Popup.open('settings-pop')">⚙️</div>
        </div>
    </nav>

    <!-- POPUPS -->
    <div id="search-pop" class="popup">
        <h3>Smart Search</h3>
        <input id="sq" style="width:100%; padding:12px; border-radius:10px; background:#111; color:white; border:1px solid #333;" placeholder="Enter keywords..." onkeyup="if(event.key==='Enter') App.search()">
        <div id="search-grid" class="grid" style="margin-top:15px; max-height:300px; overflow-y:auto;"></div>
    </div>

    <div id="subs-pop" class="popup">
        <h3>Channels</h3>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input id="chIn" style="flex:1; padding:10px; border-radius:10px; background:#111; color:white; border:1px solid #333;" placeholder="@handle">
            <button onclick="App.addChannel()" style="background:var(--accent); border:none; color:white; padding:10px; border-radius:10px;">Add</button>
        </div>
        <div id="subs-list" style="max-height:250px; overflow-y:auto;"></div>
    </div>

    <div id="add-plist-pop" class="popup">
        <h3>Save to Playlist</h3>
        <div id="plist-selection" style="max-height:250px; overflow-y:auto;"></div>
        <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
        <input id="newPlName" style="width:100%; padding:10px; border-radius:10px; background:#111; color:white; border:1px solid #333;" placeholder="New Playlist Name">
        <button onclick="App.createPlaylist()" style="width:100%; margin-top:10px; padding:10px; background:var(--accent); border:none; color:white; border-radius:10px;">Create & Save</button>
    </div>

    <div id="settings-pop" class="popup">
        <h3>Settings</h3>
        <div class="list-row" onclick="App.toggleTheme()"><span>🌗 Toggle Theme</span></div>
        <div class="list-row" onclick="Auth.logout()" style="color:var(--accent)"><span>👤 Logout</span></div>
    </div>

    <main class="content">
        <div id="view-home" class="view">
            <h2 id="home-title">Recommended Mix</h2>
            <div id="home-loader" class="loader hidden"></div>
            <div id="home-grid" class="grid"></div>
        </div>

        <div id="view-playlists" class="view">
            <h2>My Collections</h2>
            <div id="playlist-master-grid" class="grid"></div>
        </div>

        <div id="view-playlist-items" class="view">
            <button class="p-btn" onclick="Router.go('playlists')">← Back to Collections</button>
            <h2 id="current-pl-title">Playlist</h2>
            <div id="playlist-items-grid" class="grid"></div>
        </div>

        <div id="view-history" class="view">
            <h2>Watch History</h2>
            <div id="history-grid" class="grid"></div>
        </div>

        <!-- PLAYER -->
        <div id="view-player" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <button class="p-btn" onclick="Router.go('home')">← Back</button>
                <button class="p-btn" onclick="Player.toggleFloat()">🔳 Minimize</button>
            </div>
            <div id="p-container" class="player-stage">
                <div class="tap-overlay">
                    <div class="tap-zone" onclick="Player.handleTap('back')"></div>
                    <div class="tap-zone" onclick="Player.handleTap('forward')"></div>
                </div>
                <div id="yt-frame" style="width:100%; height:100%;"></div>
            </div>
            <div id="p-info" style="padding:15px 0;">
                <h2 id="p-title" style="margin:0">Video Title</h2>
                <p id="p-chan" style="color:var(--accent); font-weight:bold; cursor:pointer;"></p>
            </div>
        </div>
    </main>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API = "https://restless-brook-50e4.dkanha283.workers.dev";
let yt;
let lastTap = 0;

const state = {
    user: localStorage.getItem("login"),
    channels: JSON.parse(localStorage.getItem("channels") || "[]"),
    history: JSON.parse(localStorage.getItem("history") || "[]"),
    playlists: JSON.parse(localStorage.getItem("playlists") || "{}")
};

/* --- ROUTER --- */
const Router = {
    go(viewId) {
        Popup.closeAll();
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        const target = document.getElementById('view-' + viewId);
        if(target) target.classList.add('active');
        
        if(viewId === 'home') App.loadHome();
        if(viewId === 'history') App.renderGrid(state.history, 'history-grid');
        if(viewId === 'playlists') App.renderPlaylistsMaster();
    }
};

/* --- POPUPS --- */
const Popup = {
    open(id) {
        this.closeAll();
        document.getElementById(id).classList.add('active');
        document.getElementById('overlay').style.display = 'block';
        if(id === 'subs-pop') this.renderSubsList();
    },
    closeAll() {
        document.querySelectorAll('.popup').forEach(p => p.classList.remove('active'));
        document.getElementById('overlay').style.display = 'none';
    },
    renderSubsList() {
        const list = document.getElementById('subs-list');
        list.innerHTML = state.channels.map((c, i) => `
            <div class="list-row">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${c.logo}" class="c-logo" style="width:30px; height:30px;">
                    <span>${c.name}</span>
                </div>
                <span onclick="App.removeChannel(${i})" style="color:var(--accent)">✕</span>
            </div>`).join("");
    }
};

/* --- APP ENGINE --- */
const App = {
    async loadHome() {
        const grid = document.getElementById('home-grid');
        const loader = document.getElementById('home-loader');
        if(!state.channels.length) { grid.innerHTML = "<p style='text-align:center;'>Add channels to start!</p>"; return; }
        
        loader.classList.remove('hidden');
        grid.innerHTML = "";
        let all = [];
        for(let ch of state.channels) {
            try {
                const r = await fetch(`${API}?sections=1&channelId=${ch.channelId}`);
                const d = await r.json();
                const vids = (d.videos || []).map(v => ({...v, chLogo: ch.logo, chName: ch.name, chId: ch.channelId}));
                all.push(...vids);
            } catch(e){}
        }
        // YouTube-style Mixed Recommendation Shuffle
        all.sort(() => Math.random() - 0.5);
        loader.classList.add('hidden');
        this.renderGrid(all, 'home-grid');
    },

    renderGrid(data, target) {
        const grid = document.getElementById(target);
        grid.innerHTML = data.map(v => `
            <div class="card" onclick='Player.init(${JSON.stringify(v).replace(/'/g, "&apos;")})'>
                <button class="add-p-btn" onclick="App.openAddPlaylist(event, ${JSON.stringify(v).replace(/'/g, "&apos;")})">+</button>
                <div class="t-wrap"><img src="${v.thumb}" loading="lazy"></div>
                <div class="c-meta">
                    <img src="${v.chLogo || ''}" class="c-logo">
                    <div>
                        <div class="c-title">${v.title}</div>
                        <div class="c-sub">${v.chName} • ${v.date || ''}</div>
                    </div>
                </div>
            </div>`).join("");
    },

    /* --- PLAYLIST FEATURES --- */
    openAddPlaylist(e, video) {
        e.stopPropagation();
        this.pendingVideo = video;
        const list = document.getElementById('plist-selection');
        const keys = Object.keys(state.playlists);
        list.innerHTML = keys.map(k => `<div class="list-row" onclick="App.saveToPlaylist('${k}')">📁 ${k}</div>`).join("");
        Popup.open('add-plist-pop');
    },

    createPlaylist() {
        const name = document.getElementById('newPlName').value.trim();
        if(!name) return;
        state.playlists[name] = [];
        this.saveToPlaylist(name);
        document.getElementById('newPlName').value = "";
    },

    saveToPlaylist(name) {
        if(!state.playlists[name].some(v => v.id === this.pendingVideo.id)) {
            state.playlists[name].push(this.pendingVideo);
            localStorage.setItem("playlists", JSON.stringify(state.playlists));
        }
        Popup.closeAll();
    },

    renderPlaylistsMaster() {
        const grid = document.getElementById('playlist-master-grid');
        const keys = Object.keys(state.playlists);
        grid.innerHTML = keys.map(k => `
            <div class="card" onclick="App.viewPlaylist('${k}')">
                <div class="t-wrap" style="background:#333; display:flex; align-items:center; justify-content:center;">
                    <span style="font-size:3rem;">📁</span>
                </div>
                <div class="c-meta"><div><div class="c-title">${k}</div><div class="c-sub">${state.playlists[k].length} videos</div></div></div>
            </div>`).join("");
    },

    viewPlaylist(name) {
        Router.go('playlist-items');
        document.getElementById('current-pl-title').innerText = name;
        this.renderGrid(state.playlists[name], 'playlist-items-grid');
    },

    async addChannel() {
        const val = document.getElementById('chIn').value.trim();
        const r = await fetch(`${API}?handle=${val.replace("@","")}`);
        const d = await r.json();
        if(d.channelId) { state.channels.unshift(d); localStorage.setItem("channels", JSON.stringify(state.channels)); Router.go('home'); }
    },

    toggleTheme() {
        document.body.classList.toggle('light');
        localStorage.setItem("theme", document.body.classList.contains('light') ? 'light' : 'dark');
    }
};

/* --- PRO PLAYER --- */
const Player = {
    init(video) {
        Router.go('player');
        document.getElementById('p-title').innerText = video.title;
        document.getElementById('p-chan').innerText = video.chName;
        
        if(yt) {
            yt.loadVideoById(video.id);
        } else {
            yt = new YT.Player('yt-frame', {
                height: '100%', width: '100%', videoId: video.id,
                playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 },
                events: { 'onReady': (e) => e.target.playVideo() }
            });
        }
        state.history = [video, ...state.history.filter(v => v.id !== video.id)].slice(0, 50);
        localStorage.setItem("history", JSON.stringify(state.history));
    },

    handleTap(dir) {
        const now = Date.now();
        if(now - lastTap < 300) {
            const seek = dir === 'forward' ? 10 : -10;
            yt.seekTo(yt.getCurrentTime() + seek, true);
        }
        lastTap = now;
    },

    toggleFloat() {
        const container = document.getElementById('p-container');
        container.classList.toggle('floating');
        if(container.classList.contains('floating')) {
            Router.go('home');
            document.getElementById('view-player').style.display = 'block';
            document.getElementById('p-info').style.display = 'none';
        } else {
            document.getElementById('p-info').style.display = 'block';
        }
    }
};

/* --- AUTH --- */
const Auth = {
    login() {
        localStorage.setItem("login", document.getElementById('userIn').value);
        location.reload();
    },
    logout() { localStorage.removeItem("login"); location.reload(); }
};

if(state.user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    Router.go('home');
    if(localStorage.getItem("theme") === "light") document.body.classList.add('light');
}
</script>
</body>
</html>
