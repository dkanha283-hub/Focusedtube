<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login-screen {
      height:100vh; display:flex; flex-direction:column;
      justify-content:center; align-items:center;
    }

    .logo { font-size:48px; margin-bottom:20px; }
    .logo span {
      color:red; border:2px solid red;
      padding:5px 12px; border-radius:6px;
    }

    .login-btn {
      padding:12px 20px;
      border:2px solid #2196f3;
      background:transparent;
      color:#2196f3;
      cursor:pointer;
    }

    .app { display:none; }

    .navbar {
      height:60px; background:white;
      display:flex; align-items:center;
      padding:0 20px; border-bottom:1px solid #ddd;
    }

    .nav-icons {
      margin-left:auto; display:flex;
      gap:20px; font-size:22px; cursor:pointer;
    }

    #subsPanel {
      position:fixed; top:60px; right:20px;
      width:300px; height:400px;
      background:white; border:1px solid #ddd;
      border-radius:10px; display:none;
      overflow-y:auto; padding:10px;
      z-index:1000;
    }

    .channel-item {
      display:flex; align-items:center;
      gap:10px; padding:8px;
      border-bottom:1px solid #eee;
      cursor:pointer;
    }

    .channel-item img {
      width:30px; height:30px; border-radius:50%;
    }

    .main { padding:15px; }

    .player {
      width:100%; height:300px;
      border:none; border-radius:10px;
      margin-bottom:15px;
    }

    .videos {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:15px;
    }

    .video img {
      width:100%; border-radius:10px;
    }

    .video-title { font-size:14px; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="logo">Focused <span>Tube</span></div>
  <button class="login-btn" onclick="login()">Sign in with Google</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <div>FocusedTube</div>

    <div class="nav-icons">
      <span onclick="goHome()">🏠</span>
      <span onclick="alert('Search coming soon')">🔍</span>
      <span onclick="toggleSubs()">📺</span>
      <span onclick="alert('History coming soon')">⏱</span>
    </div>
  </div>

  <!-- FLOAT PANEL -->
  <div id="subsPanel">
    <h3>Subscriptions</h3>
    <div id="channelList"></div>
  </div>

  <div class="main">
    <iframe id="player" class="player"></iframe>
    <div id="videos" class="videos"></div>
  </div>

</div>

<script>

let accessToken = localStorage.getItem("token") || "";
let watchHistory = JSON.parse(localStorage.getItem("watchHistory")) || [];

// AUTO LOGIN ON REFRESH
window.onload = () => {
  if (accessToken) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    loadSubscriptions();
    loadHomeFeed();
  }
};

// LOGIN
function login() {
  google.accounts.oauth2.initTokenClient({
    client_id: "901526621368-k63bfsq7aomg2e2k6u0625bub9291dhs.apps.googleusercontent.com",
    scope: "https://www.googleapis.com/auth/youtube.readonly",
    callback: (res) => {
      accessToken = res.access_token;

      // 🔥 SAVE TOKEN
      localStorage.setItem("token", accessToken);

      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").style.display = "block";

      loadSubscriptions();
      loadHomeFeed();
    }
  }).requestAccessToken();
}

// LOGOUT (OPTIONAL)
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

// TOGGLE PANEL
function toggleSubs() {
  let panel = document.getElementById("subsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

// LOAD SUBSCRIPTIONS
async function loadSubscriptions() {
  let res = await fetch(
    "https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=20",
    { headers: { Authorization: "Bearer " + accessToken } }
  );

  let data = await res.json();

  let list = document.getElementById("channelList");
  list.innerHTML = "";

  data.items.forEach(item => {
    let div = document.createElement("div");
    div.className = "channel-item";

    div.innerHTML = `
      <img src="${item.snippet.thumbnails.default.url}">
      <span>${item.snippet.title}</span>
    `;

    div.onclick = () => {
      document.getElementById("subsPanel").style.display = "none";
      loadVideos(item.snippet.resourceId.channelId);
    };

    list.appendChild(div);
  });
}

// HOME FEED
async function loadHomeFeed() {

  let res = await fetch(
    "https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=15",
    { headers: { Authorization: "Bearer " + accessToken } }
  );

  let data = await res.json();

  let container = document.getElementById("videos");
  container.innerHTML = "";

  for (let item of data.items) {

    let channelId = item.snippet.resourceId.channelId;

    let vRes = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=2&order=date&type=video`,
      { headers: { Authorization: "Bearer " + accessToken } }
    );

    let vData = await vRes.json();

    vData.items.forEach(video => {
      let vid = video.id.videoId;
      let title = video.snippet.title;
      let thumb = video.snippet.thumbnails.medium.url;

      let div = document.createElement("div");
      div.className = "video";

      div.innerHTML = `
        <img src="${thumb}">
        <div class="video-title">${title}</div>
      `;

      div.onclick = () => playVideo(vid, title);

      container.appendChild(div);
    });
  }
}

// LOAD CHANNEL VIDEOS
async function loadVideos(channelId) {
  let res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=12&order=date&type=video`,
    { headers: { Authorization: "Bearer " + accessToken } }
  );

  let data = await res.json();
  let container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach((video, index) => {
    let vid = video.id.videoId;
    let title = video.snippet.title;
    let thumb = video.snippet.thumbnails.medium.url;

    let div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <img src="${thumb}">
      <div class="video-title">${title}</div>
    `;

    div.onclick = () => playVideo(vid, title);

    container.appendChild(div);

    if (index === 0) {
      document.getElementById("player").src =
        `https://www.youtube.com/embed/${vid}`;
    }
  });
}

// PLAY VIDEO
function playVideo(id, title) {
  document.getElementById("player").src =
    `https://www.youtube.com/embed/${id}`;

  watchHistory.unshift(title);
  localStorage.setItem("watchHistory", JSON.stringify(watchHistory));
}

// HOME BUTTON
function goHome() {
  document.getElementById("player").src = "";
  loadHomeFeed();
}

</script>

</body>
</html>
