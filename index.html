<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    .navbar {
      width:100%;
      padding:10px;
      background:white;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #ddd;
    }

    .container {
      display:flex;
      width:100%;
      height:calc(100vh - 50px);
    }

    .sidebar {
      width:260px;
      background:white;
      border-right:1px solid #ddd;
      padding:10px;
    }

    .main {
      flex:1;
      padding:10px;
    }

    iframe {
      width:100%;
      height:300px;
      border:none;
      border-radius:10px;
      margin-bottom:15px;
    }

    .item {
      padding:8px;
      margin-bottom:5px;
      background:#fafafa;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>FocusTube</h2>
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube 🎯</b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <input id="linkInput" placeholder="Paste ANY YouTube link">
      <button onclick="addItem()">Add</button>

      <p style="font-size:12px;color:#666;">
        Paste video or channel link
      </p>

      <h3>Saved</h3>
      <div id="list"></div>

    </div>

    <!-- MAIN -->
    <div class="main" id="videos"></div>

  </div>

</div>

<script>

// LOGIN
window.onload=()=>{
  if(localStorage.getItem("user")) showApp();
};

function login(){
  if(!username.value||!password.value){
    alert("Enter details");
    return;
  }
  localStorage.setItem("user","ok");
  showApp();
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  loadData();
}

// DATA
let items=[];

function loadData(){
  items=JSON.parse(localStorage.getItem("items")||"[]");
  renderList();
  loadVideos();
}

// ADD ITEM (SUPER SIMPLE)
function addItem(){

  let link = linkInput.value.trim();

  if(!(link.includes("youtube.com") || link.includes("youtu.be"))){
    alert("Paste valid YouTube link");
    return;
  }

  if(items.includes(link)){
    alert("Already added");
    return;
  }

  items.push(link);
  localStorage.setItem("items", JSON.stringify(items));

  renderList();
  loadVideos();
}
// LIST
function renderList(){
  list.innerHTML="";
  items.forEach((l,i)=>{
    let div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      Saved Link
      <span onclick="deleteItem(${i})">❌</span>
    `;

    list.appendChild(div);
  });
}

function deleteItem(i){
  items.splice(i,1);
  localStorage.setItem("items", JSON.stringify(items));
  renderList();
  loadVideos();
}

// LOAD VIDEOS (WORKS ALWAYS)
function loadVideos(){

  videos.innerHTML = "";

  items.forEach(link => {

    let videoId = null;

    // normal youtube link
    if(link.includes("watch?v=")){
      videoId = link.split("watch?v=")[1].split("&")[0];
    }

    // 🔥 youtu.be link (your case)
    if(link.includes("youtu.be/")){
      videoId = link.split("youtu.be/")[1].split("?")[0];
    }

    if(videoId){
      let iframe = document.createElement("iframe");
      iframe.src = `https://www.youtube.com/embed/${videoId}`;
      videos.appendChild(iframe);
    } else {
      console.log("Invalid link:", link);
    }

  });
}
  });
}

</script>

</body>
</html>
