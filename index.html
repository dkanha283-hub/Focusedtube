<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusedTube Ultimate</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #1e1e1e;
            --card: #282828;
            --text: #ffffff;
            --muted: #aaaaaa;
            --accent: #ff0000;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        body.light {
            --bg: #f9f9f9;
            --panel: #ffffff;
            --card: #ffffff;
            --text: #0f0f0f;
            --muted: #606060;
            --border: #e5e5e5;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            transition: background 0.3s ease;
            overflow: hidden;
        }

        /* --- AUTH --- */
        .auth-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; box-shadow: var(--shadow); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text); box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        /* --- LAYOUT --- */
        #app { display: none; height: 100vh; flex-direction: column; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: bold; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-icons { display: flex; gap: 8px; }
        .icon { font-size: 1.2rem; cursor: pointer; padding: 10px; border-radius: 12px; transition: 0.2s; }
        .icon:hover { background: var(--panel); }

        /* --- PANELS --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 900; backdrop-filter: blur(8px); }
        .floating-panel { position: fixed; top: -110%; left: 50%; transform: translateX(-50%); width: 95%; max-width: 550px; background: var(--panel); z-index: 1000; border-radius: 0 0 24px 24px; padding: 24px; transition: top 0.5s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: var(--shadow); border: 1px solid var(--border); }
        .floating-panel.open { top: 0; }

        /* --- INTERNAL PLAYER PAGE --- */
        #player-page { display: none; padding: 20px; flex-direction: column; gap: 15px; height: calc(100vh - 70px); overflow-y: auto; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
        iframe { width: 100%; height: 100%; border: none; }
        .player-info { padding: 10px 0; }
        .back-btn { background: var(--panel); color: var(--text); padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; margin-bottom: 10px; width: fit-content; }

        /* --- GRID & CARDS --- */
        .content-area { flex: 1; padding: 20px; overflow-y: auto; max-width: 1600px; margin: auto; width: 100%; box-sizing: border-box; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .card { background: transparent; cursor: pointer; transition: 0.3s; position: relative; animation: slideUp 0.4s ease forwards; }
        .thumb-container { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; background: #222; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .v-title { font-weight: 600; font-size: 1rem; margin-top: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .add-to-plist { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; border: none; border-radius: 10px; width: 32px; height: 32px; font-size: 1.2rem; cursor: pointer; z-index: 5; opacity: 0; }
        .card:hover .add-to-plist { opacity: 1; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; width: 28px; height: 28px; animation: spin 0.8s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closePanels()"></div>

<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h2>Focused<span>Tube</span></h2>
        <input id="userIn" placeholder="Username">
        <input id="passIn" type="password" placeholder="Password">
        <button onclick="handleAuth('login')">Login</button>
        <p style="font-size: 0.8rem; color: var(--muted); margin-top: 15px; cursor:pointer;" onclick="handleAuth('reg')">Create Account</p>
    </div>
</div>

<div id="app">
    <div class="topbar">
        <div class="logo" onclick="showPage('home')">Focused<span>Tube</span></div>
        <div class="nav-icons">
            <span class="icon" onclick="togglePanel('search-panel')">🔍</span>
            <span class="icon" onclick="togglePanel('subs-panel')">📺</span>
            <span class="icon" onclick="togglePanel('plist-panel')">📁</span>
            <span class="icon" onclick="showPage('history')">⏱</span>
            <span class="icon" onclick="toggleTheme()">🌗</span>
            <span class="icon" onclick="logout()">👤</span>
        </div>
    </div>

    <div id="search-panel" class="floating-panel">
        <h3>Search</h3>
        <div style="display:flex; gap:10px;"><input id="searchInput" placeholder="Search..."><button onclick="runSearch()" style="width:80px">Go</button></div>
        <div id="search-results" style="max-height:400px; overflow-y:auto; margin-top:15px;" class="video-grid"></div>
    </div>

    <div id="subs-panel" class="floating-panel">
        <h3>Channels</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;"><input id="chanInput" placeholder="@handle"><button onclick="addChannel()">Add</button></div>
        <div id="subs-list" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <div id="plist-panel" class="floating-panel">
        <h3>Playlists</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;"><input id="plistInput" placeholder="Name"><button onclick="createPlaylist()">Create</button></div>
        <div id="plist-list" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <main id="content" class="content-area">
        <div id="feed-view">
            <div id="page-header"></div>
            <div id="main-grid" class="video-grid"></div>
            <div id="main-loader" class="loader hidden"></div>
        </div>

        <div id="player-view" style="display:none;">
            <div class="back-btn" onclick="showPage('home')">← Back to Feed</div>
            <div class="video-wrapper" id="video-placeholder">
                </div>
            <div class="player-info">
                <h2 id="player-title">Video Title</h2>
                <p id="player-meta" style="color:var(--muted)"></p>
            </div>
        </div>
    </main>
</div>

<script>
const API = "https://restless-brook-50e4.dkanha283.workers.dev";

let state = {
    user: localStorage.getItem("login"),
    channels: JSON.parse(localStorage.getItem("channels") || "[]"),
    history: JSON.parse(localStorage.getItem("history") || "[]"),
    playlists: JSON.parse(localStorage.getItem("playlists") || "{}"),
    currentPage: 'home'
};

function init() {
    if (localStorage.getItem("theme") === "light") document.body.classList.add("light");
    if (state.user) {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("app").style.display = "flex";
        showPage('home');
    }
}
init();

/* --- NAVIGATION & PLAYER --- */
function showPage(page, data = null) {
    state.currentPage = page;
    closePanels();
    
    // Toggle visibility
    document.getElementById("feed-view").style.display = page === 'player' ? 'none' : 'block';
    document.getElementById("player-view").style.display = page === 'player' ? 'flex' : 'none';

    if (page === 'home') {
        document.getElementById("page-header").innerHTML = "<h2>Home Feed</h2>";
        loadHomeFeed();
    } else if (page === 'history') {
        document.getElementById("page-header").innerHTML = "<h2>History</h2>";
        renderGrid(state.history);
    } else if (page === 'player') {
        loadInternalPlayer(data);
    }
}

function loadInternalPlayer(video) {
    const placeholder = document.getElementById("video-placeholder");
    const titleEl = document.getElementById("player-title");
    
    titleEl.innerText = video.title;
    
    // Inject Iframe with focus-mode parameters
    placeholder.innerHTML = `
        <iframe 
            src="https://www.youtube.com/embed/${video.id}?autoplay=1&rel=0&modestbranding=1&showinfo=0" 
            allow="autoplay; encrypted-media; picture-in-picture" 
            allowfullscreen>
        </iframe>`;

    // Save to History
    state.history = [video, ...state.history.filter(x => x.id !== video.id)].slice(0, 50);
    localStorage.setItem("history", JSON.stringify(state.history));
}

async function loadHomeFeed() {
    if (state.channels.length === 0) {
        document.getElementById("main-grid").innerHTML = "<p style='text-align:center;'>Add channels to start.</p>";
        return;
    }
    document.getElementById("main-loader").classList.remove("hidden");
    let all = [];
    try {
        const promises = state.channels.map(async (ch) => {
            const res = await fetch(`${API}?sections=1&channelId=${ch.channelId}`);
            const d = await res.json();
            return d.videos || [];
        });
        const results = await Promise.all(promises);
        all = results.flat().sort((a,b) => new Date(b.date) - new Date(a.date));
        renderGrid(all);
    } catch (e) {}
    document.getElementById("main-loader").classList.add("hidden");
}

function renderGrid(data) {
    const grid = document.getElementById("main-grid");
    grid.innerHTML = data.map(v => `
        <div class="card" onclick='showPage("player", ${JSON.stringify(v).replace(/'/g, "&apos;")})'>
            <div class="thumb-container"><img class="thumb" src="${v.thumb}" loading="lazy"></div>
            <div class="v-title">${v.title}</div>
        </div>`).join("");
}

/* --- OTHER LOGIC (Search/Subs/Theme) --- */
async function runSearch() {
    const q = document.getElementById("searchInput").value;
    const res = await fetch(`${API}?search=1&q=${encodeURIComponent(q)}`);
    const data = await res.json();
    document.getElementById("search-results").innerHTML = data.map(v => `
        <div class="card" onclick='showPage("player", ${JSON.stringify(v).replace(/'/g, "&apos;")})'>
            <div class="thumb-container"><img class="thumb" src="${v.thumb}"></div>
            <div class="v-title" style="font-size:0.9rem;">${v.title}</div>
        </div>`).join("");
}

async function addChannel() {
    const val = document.getElementById("chanInput").value;
    const res = await fetch(`${API}?handle=${val.replace("@","")}`);
    const d = await res.json();
    if (d.channelId) {
        state.channels.unshift({ channelId: d.channelId, name: d.name, logo: d.logo });
        localStorage.setItem("channels", JSON.stringify(state.channels));
        renderSubsList();
    }
}

function renderSubsList() {
    const list = document.getElementById("subs-list");
    list.innerHTML = state.channels.map((c, i) => `<div style="padding:10px; border-bottom:1px solid var(--border);" onclick="openChannelView('${c.channelId}')">${c.name}</div>`).join("");
}

async function openChannelView(id) {
    closePanels();
    document.getElementById("main-loader").classList.remove("hidden");
    const res = await fetch(`${API}?sections=1&channelId=${id}`);
    const d = await res.json();
    document.getElementById("main-loader").classList.add("hidden");
    renderGrid(d.videos || []);
}

function togglePanel(id) {
    const panel = document.getElementById(id);
    const isOpen = panel.classList.contains("open");
    closePanels();
    if (!isOpen) {
        panel.classList.add("open");
        document.getElementById("overlay").style.display = "block";
        if(id === 'subs-panel') renderSubsList();
    }
}

function closePanels() {
    document.querySelectorAll('.floating-panel').forEach(p => p.classList.remove('open'));
    document.getElementById("overlay").style.display = "none";
}

function toggleTheme() {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

function handleAuth(type) {
    const u = document.getElementById("userIn").value;
    const p = document.getElementById("passIn").value;
    let users = JSON.parse(localStorage.getItem("users") || "{}");
    if (type === 'reg') {
        users[u] = p; localStorage.setItem("users", JSON.stringify(users)); alert("Created!");
    } else {
        if (users[u] === p) { localStorage.setItem("login", u); location.reload(); }
        else alert("Error");
    }
}

function logout() { localStorage.removeItem("login"); location.reload(); }
</script>
</body>
</html>
