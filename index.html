<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusedTube | Premium Distraction-Free YouTube</title>
    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --bg: #0a0a0a;
            --panel: rgba(30, 30, 30, 0.75);
            --card: #1a1a1a;
            --text: #f5f5f5;
            --muted: #888888;
            --accent: #ff3e3e;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            --radius: 18px;
        }

        body.light {
            --bg: #f0f2f5;
            --panel: rgba(255, 255, 255, 0.8);
            --card: #ffffff;
            --text: #1a1a1a;
            --muted: #65676b;
            --border: rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background 0.4s ease;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- UI COMPONENTS --- */
        .auth-container { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at top right, #2a0a0a, var(--bg)); }
        .auth-card { background: var(--panel); backdrop-filter: blur(20px); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); width: 340px; text-align: center; box-shadow: var(--shadow); }
        
        input { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border); 
            background: rgba(255,255,255,0.05); color: var(--text); font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); outline: none; }
        
        button { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--accent); 
            color: white; font-weight: 700; cursor: pointer; transition: transform 0.2s, opacity 0.2s; 
        }
        button:active { transform: scale(0.97); opacity: 0.9; }

        /* --- LAYOUT & NAVIGATION --- */
        #app { display: none; height: 100vh; flex-direction: column; }
        
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; 
            background: rgba(10,10,10,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 800; cursor: pointer; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .nav-group { display: flex; gap: 12px; }
        .nav-item { 
            font-size: 1.3rem; cursor: pointer; padding: 10px; border-radius: 14px; 
            transition: 0.3s; display: flex; align-items: center;
        }
        .nav-item:hover { background: var(--border); }
        .nav-item.active { color: var(--accent); background: rgba(255, 62, 62, 0.1); }

        /* --- FLOATING PANELS (Refined) --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 900; animation: fadeIn 0.3s; }
        .drawer { 
            position: fixed; top: -120%; left: 50%; transform: translateX(-50%); width: 95%; max-width: 550px; 
            background: var(--panel); backdrop-filter: blur(25px); z-index: 1000; border-radius: 0 0 24px 24px; 
            padding: 30px; transition: top 0.6s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid var(--border); box-shadow: var(--shadow);
        }
        .drawer.open { top: 0; }

        /* --- PLAYER INTERFACE --- */
        #player-view { display: none; padding: 20px; flex-direction: column; height: calc(100vh - 70px); overflow-y: auto; animation: slideUp 0.5s ease; }
        .video-stage { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .video-meta { padding: 20px 0; }
        .video-meta h2 { margin: 0; font-size: 1.4rem; line-height: 1.3; }

        /* --- GRID SYSTEM --- */
        .main-content { flex: 1; padding: 24px; overflow-y: auto; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        .card { cursor: pointer; transition: 0.4s cubic-bezier(0.2, 0, 0.2, 1); }
        .card:hover { transform: translateY(-8px); }
        
        .thumbnail-wrap { 
            position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 20px; 
            overflow: hidden; background: #222; box-shadow: 0 8px 24px rgba(0,0,0,0.2); 
        }
        .thumbnail-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover .thumbnail-wrap img { transform: scale(1.08); }

        .card-info { padding: 15px 5px; }
        .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-sub { color: var(--muted); font-size: 0.85rem; font-weight: 500; }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        .skeleton { background: var(--border); animation: pulse 1.5s infinite; border-radius: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="UI.closePanels()"></div>

<!-- AUTH -->
<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h1 class="logo">Focused<span>Tube</span></h1>
        <p style="color: var(--muted); margin-bottom: 25px;">The distraction-free way to learn.</p>
        <input id="userIn" placeholder="Username">
        <input id="passIn" type="password" placeholder="Password">
        <button onclick="Auth.handle('login')">Sign In</button>
        <p style="font-size: 0.85rem; color: var(--muted); margin-top: 20px; cursor:pointer;" onclick="Auth.handle('reg')">Need an account? <b>Register</b></p>
    </div>
</div>

<!-- APP -->
<div id="app">
    <nav class="navbar">
        <div class="logo" onclick="App.setView('home')">Focused<span>Tube</span></div>
        <div class="nav-group">
            <div class="nav-item" id="nav-search" onclick="UI.togglePanel('search-drawer')">🔍</div>
            <div class="nav-item" id="nav-subs" onclick="UI.togglePanel('subs-drawer')">📺</div>
            <div class="nav-item" id="nav-plist" onclick="UI.togglePanel('plist-drawer')">📁</div>
            <div class="nav-item" id="nav-history" onclick="App.setView('history')">⏱</div>
            <div class="nav-item" onclick="UI.toggleTheme()">🌗</div>
            <div class="nav-item" onclick="Auth.logout()">👤</div>
        </div>
    </nav>

    <!-- DRAWERS -->
    <div id="search-drawer" class="drawer">
        <h3 style="margin:0 0 15px 0">Global Search</h3>
        <div style="display:flex; gap:12px;">
            <input id="searchInput" placeholder="Search for tutorials, music, or news..." onkeyup="if(event.key==='Enter') App.runSearch()">
            <button onclick="App.runSearch()" style="width:100px">Search</button>
        </div>
        <div id="search-results" style="max-height:400px; overflow-y:auto; margin-top:20px;" class="video-grid"></div>
    </div>

    <div id="subs-drawer" class="drawer">
        <h3 style="margin:0 0 15px 0">Subscriptions</h3>
        <div style="display:flex; gap:12px; margin-bottom:20px;">
            <input id="chanInput" placeholder="@handle or Channel ID">
            <button onclick="App.addChannel()" style="width:100px">Add</button>
        </div>
        <div id="subs-list" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <div id="plist-drawer" class="drawer">
        <h3 style="margin:0 0 15px 0">Collections</h3>
        <div id="plist-list" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <!-- MAIN VIEWS -->
    <main class="main-content">
        <!-- Feed Container -->
        <div id="feed-view">
            <h2 id="view-title" style="margin-bottom:25px;">Recommended Feed</h2>
            <div id="main-grid" class="video-grid"></div>
            <div id="loader" class="hidden" style="text-align:center; padding:40px;">Fetching content...</div>
        </div>

        <!-- Player Container -->
        <div id="player-view">
            <button onclick="App.setView('home')" style="width:fit-content; margin-bottom:15px; padding:8px 20px; background:var(--panel); border:1px solid var(--border);">← Back to Home</button>
            <div class="video-stage" id="video-engine"></div>
            <div class="video-meta">
                <h2 id="p-title">Loading Video...</h2>
                <p id="p-sub" style="color:var(--muted); font-weight:600;"></p>
            </div>
        </div>
    </main>
</div>

<script>
/* =========================
   APP LOGIC & STATE
========================= */
const API = "https://restless-brook-50e4.dkanha283.workers.dev";
const state = {
    user: localStorage.getItem("login"),
    channels: JSON.parse(localStorage.getItem("channels") || "[]"),
    history: JSON.parse(localStorage.getItem("history") || "[]"),
    activeView: 'home'
};

const App = {
    setView(view) {
        state.activeView = view;
        UI.closePanels();
        
        // Switch visibility
        document.getElementById("feed-view").style.display = view === 'player' ? 'none' : 'block';
        document.getElementById("player-view").style.display = view === 'player' ? 'flex' : 'none';

        if(view === 'home') {
            document.getElementById("view-title").innerText = "Recommended Feed";
            this.loadFeed();
            this.stopPlayer();
        } else if(view === 'history') {
            document.getElementById("view-title").innerText = "Watch History";
            this.renderGrid(state.history);
            this.stopPlayer();
        }
    },

    async loadFeed() {
        if(state.channels.length === 0) {
            document.getElementById("main-grid").innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:100px;"><h3>Empty Feed</h3><p>Subscribe to channels to see videos here.</p></div>`;
            return;
        }
        document.getElementById("loader").classList.remove("hidden");
        let all = [];
        try {
            const promises = state.channels.map(async (ch) => {
                const res = await fetch(`${API}?sections=1&channelId=${ch.channelId}`);
                const d = await res.json();
                return d.videos || [];
            });
            const results = await Promise.all(promises);
            all = results.flat().sort((a,b) => new Date(b.date) - new Date(a.date));
            this.renderGrid(all);
        } catch(e) {}
        document.getElementById("loader").classList.add("hidden");
    },

    renderGrid(data, targetId = "main-grid") {
        const grid = document.getElementById(targetId);
        grid.innerHTML = data.map(v => `
            <div class="card" onclick='App.play("${v.id}", "${encodeURIComponent(v.title)}", "${v.channelName || ''}")'>
                <div class="thumbnail-wrap"><img src="${v.thumb}" loading="lazy"></div>
                <div class="card-info">
                    <div class="card-title">${v.title}</div>
                    <div class="card-sub">${v.channelName || 'Subscribed'} • ${v.date || ''}</div>
                </div>
            </div>`).join("");
    },

    play(id, title, channel) {
        this.setView('player');
        document.getElementById("p-title").innerText = decodeURIComponent(title);
        document.getElementById("p-sub").innerText = channel;
        document.getElementById("video-engine").innerHTML = `
            <iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1" 
                    allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
        
        // Save to history
        const video = { id, title: decodeURIComponent(title), thumb: `https://i.ytimg.com/vi/${id}/hqdefault.jpg`, channelName: channel };
        state.history = [video, ...state.history.filter(v => v.id !== id)].slice(0, 50);
        localStorage.setItem("history", JSON.stringify(state.history));
    },

    stopPlayer() { document.getElementById("video-engine").innerHTML = ""; },

    async runSearch() {
        const q = document.getElementById("searchInput").value;
        const res = await fetch(`${API}?search=1&q=${encodeURIComponent(q)}`);
        const data = await res.json();
        this.renderGrid(data, "search-results");
    },

    async addChannel() {
        const val = document.getElementById("chanInput").value;
        const res = await fetch(`${API}?handle=${val.replace("@","")}`);
        const d = await res.json();
        if(d.channelId) {
            state.channels.unshift({ channelId: d.channelId, name: d.name, logo: d.logo });
            localStorage.setItem("channels", JSON.stringify(state.channels));
            UI.renderSubs();
            this.loadFeed();
        }
    }
};

const UI = {
    togglePanel(id) {
        const panel = document.getElementById(id);
        const isOpen = panel.classList.contains("open");
        this.closePanels();
        if(!isOpen) {
            panel.classList.add("open");
            document.getElementById("overlay").style.display = "block";
            if(id === 'subs-drawer') this.renderSubs();
        }
    },
    closePanels() {
        document.querySelectorAll('.drawer').forEach(d => d.classList.remove("open"));
        document.getElementById("overlay").style.display = "none";
    },
    renderSubs() {
        document.getElementById("subs-list").innerHTML = state.channels.map(c => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid var(--border);">
                <span>${c.name}</span>
                <span onclick="App.removeChannel('${c.channelId}')" style="cursor:pointer; color:var(--accent);">✕</span>
            </div>`).join("");
    },
    toggleTheme() {
        document.body.classList.toggle("light");
        localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
    }
};

const Auth = {
    handle(type) {
        const u = document.getElementById("userIn").value, p = document.getElementById("passIn").value;
        let users = JSON.parse(localStorage.getItem("users") || "{}");
        if(type === 'reg') { users[u] = p; localStorage.setItem("users", JSON.stringify(users)); alert("Ready!"); }
        else if(users[u] === p) { localStorage.setItem("login", u); location.reload(); }
        else alert("Error");
    },
    logout() { localStorage.removeItem("login"); location.reload(); }
};

if(state.user) {
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    App.setView('home');
}
</script>
</body>
</html>
