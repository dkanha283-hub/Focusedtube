<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    input {
      padding:10px;
      border-radius:8px;
      border:none;
      margin:5px;
    }

    button {
      padding:10px;
      border:none;
      border-radius:8px;
      background:red;
      color:white;
      cursor:pointer;
    }

    .navbar {
      width:100%;
      padding:10px;
      background:#181818;
      display:flex;
      justify-content:space-between;
    }

    .container {
      display:flex;
      width:100%;
      height:calc(100vh - 50px);
    }

    .sidebar {
      width:250px;
      background:#181818;
      padding:10px;
      overflow:auto;
    }

    .main {
      flex:1;
      padding:10px;
      overflow:auto;
    }

    iframe {
      width:100%;
      height:250px;
      border:none;
      border-radius:10px;
      margin-bottom:15px;
    }

    .item {
      background:#282828;
      padding:8px;
      margin-bottom:8px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .channel-info {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .channel-logo {
      width:30px;
      height:30px;
      border-radius:50%;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>FocusTube 🎯</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="handleLogin()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube</b>
    <button onclick="handleLogout()">Logout</button>
  </div>

  <div class="container">

    <div class="sidebar">
      <input id="linkInput" placeholder="Paste channel or @link">
      <button onclick="addItem()">Add</button>

      <h3>Channels</h3>
      <div id="list"></div>
    </div>

    <div class="main" id="videos"></div>

  </div>

</div>

<script>

// ===== INIT =====
document.addEventListener("DOMContentLoaded", init);

function init(){
  if(localStorage.getItem("focusUser")==="true"){
    showApp();
  } else {
    showLogin();
  }
}

// ===== UI =====
function showLogin(){
  loginPage.style.display="flex";
  app.style.display="none";
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  loadData();
}

// ===== LOGIN =====
function handleLogin(){
  if(!username.value || !password.value){
    alert("Enter details");
    return;
  }
  localStorage.setItem("focusUser","true");
  showApp();
}

function handleLogout(){
  localStorage.removeItem("focusUser");
  showLogin();
}

// ===== DATA =====
let items=[];

function loadData(){
  items = JSON.parse(localStorage.getItem("channels") || "[]");
  renderList();
  loadVideos();
}

// ===== FETCH CHANNEL INFO =====
async function getChannelInfo(id){

  try{
    let res = await fetch(`https://www.youtube.com/channel/${id}`);
    let text = await res.text();

    let nameMatch = text.match(/"title":"(.*?)"/);
    let logoMatch = text.match(/"avatar":{"thumbnails":\[{"url":"(.*?)"/);

    return {
      name: nameMatch ? nameMatch[1] : "Channel",
      logo: logoMatch ? logoMatch[1] : ""
    };

  }catch{
    return { name:"Channel", logo:"" };
  }
}

// ===== ADD CHANNEL =====
async function addItem(){

  let link = linkInput.value.trim();
  let channelId = null;

  if(link.includes("channel/")){
    channelId = link.split("channel/")[1];
  }

  if(link.includes("@")){
    let handle = link.split("@")[1].split("?")[0];

    try{
      let res = await fetch("https://restless-brook-50e4.dkanha283.workers.dev/?handle=" + handle);
      let data = await res.json();
      channelId = data.channelId;
    }catch{
      alert("Backend error");
      return;
    }
  }

  if(!channelId){
    alert("Invalid link");
    return;
  }

  channelId = channelId.trim();

  if(items.some(c => c.id === channelId)){
    alert("Already added");
    return;
  }

  let info = await getChannelInfo(channelId);

  items.push({
    id: channelId,
    name: info.name,
    logo: info.logo
  });

  localStorage.setItem("channels", JSON.stringify(items));

  renderList();
  loadVideos();
}

// ===== LIST =====
function renderList(){
  list.innerHTML="";

  items.forEach((c,i)=>{

    let div=document.createElement("div");
    div.className="item";

    div.innerHTML = `
      <div class="channel-info">
        <img src="${c.logo}" class="channel-logo">
        <span>${c.name}</span>
      </div>
      <span onclick="deleteItem(${i})">❌</span>
    `;

    list.appendChild(div);
  });
}

function deleteItem(i){
  items.splice(i,1);
  localStorage.setItem("channels", JSON.stringify(items));
  renderList();
  loadVideos();
}

// ===== LOAD VIDEOS =====
function loadVideos(){

  videos.innerHTML="";

  items.forEach(c=>{

    let playlistId = "UU" + c.id.substring(2);

    let iframe = document.createElement("iframe");
    iframe.src = `https://www.youtube.com/embed/videoseries?list=${playlistId}`;

    videos.appendChild(iframe);
  });
}

</script>

</body>
</html>
