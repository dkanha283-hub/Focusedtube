<!DOCTYPE html>
<html>
<head>
  <title>FocusedTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    /* LOGIN */
    .login {
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    input {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:8px;
      width:200px;
    }

    button {
      padding:10px;
      border:none;
      border-radius:8px;
      background:red;
      color:white;
      cursor:pointer;
    }

    /* TOP BAR */
    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px;
      background:#181818;
    }

    .icons span {
      margin-left:10px;
      cursor:pointer;
      font-size:18px;
    }

    /* MAIN */
    .main {
      padding:15px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:15px;
    }

    iframe {
      width:100%;
      height:160px;
      border:none;
      border-radius:10px;
    }

    /* DROPDOWN PANEL */
    .dropdown {
      position:absolute;
      top:50px;
      right:10px;
      width:280px;
      max-height:400px;
      background:#181818;
      border-radius:10px;
      padding:10px;
      overflow:auto;

      transform:translateY(-20px);
      opacity:0;
      pointer-events:none;
      transition:0.3s;
      z-index:1000;
    }

    .dropdown.open {
      transform:translateY(0);
      opacity:1;
      pointer-events:auto;
    }

    /* CHANNEL ITEM */
    .channel {
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#282828;
      padding:8px;
      border-radius:8px;
      margin-bottom:8px;
      cursor:pointer;
    }

    .left {
      display:flex;
      align-items:center;
      gap:10px;
    }

    img {
      width:30px;
      height:30px;
      border-radius:50%;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>FocusedTube</h2>
  <input id="u" placeholder="Username">
  <input id="p" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <b>FocusedTube</b>

    <div class="icons">
      <span onclick="home()">🏠</span>
      <span onclick="toggleDropdown()">📺</span>
      <span onclick="showHistory()">⏱️</span>
      <span onclick="logout()">👤</span>
    </div>
  </div>

  <!-- DROPDOWN -->
  <div id="dropdown" class="dropdown">

    <input id="input" placeholder="@channel or link">
    <button onclick="add()">Add Channel</button>

    <h3>Subscriptions</h3>
    <div id="list"></div>

  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="homeView" class="grid"></div>
    <div id="channelView" style="display:none"></div>
  </div>

</div>

<script>

let channels=[];

// INIT
document.addEventListener("DOMContentLoaded", ()=>{
  if(localStorage.getItem("login")){
    startApp();
  }
});

function login(){
  if(!u.value || !p.value) return alert("Enter details");
  localStorage.setItem("login","1");
  startApp();
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

function startApp(){
  loginPage.style.display="none";
  app.style.display="block";
  load();
}

// LOAD
function load(){
  channels = JSON.parse(localStorage.getItem("channels")||"[]");
  render();
  home();
}

// ADD CHANNEL
async function add(){

  let link=input.value.trim();
  let api="https://restless-brook-50e4.dkanha283.workers.dev/";

  let res;

  if(link.includes("@")){
    let h=link.split("@")[1].split("?")[0];
    res=await fetch(api+"?handle="+h);
  } else if(link.includes("channel/")){
    let id=link.split("channel/")[1];
    res=await fetch(api+"?id="+id);
  } else {
    alert("Invalid link");
    return;
  }

  let data=await res.json();

  if(!data.channelId) return alert("Error");

  if(channels.some(c=>c.channelId===data.channelId)){
    alert("Already added");
    return;
  }

  channels.push(data);
  localStorage.setItem("channels",JSON.stringify(channels));

  render();
  home();
}

// RENDER LIST
function render(){

  list.innerHTML="";

  channels.forEach((c,i)=>{

    let div=document.createElement("div");
    div.className="channel";

    div.innerHTML=`
      <div class="left">
        <img src="${c.logo}">
        <span>${c.name}</span>
      </div>
      <span onclick="event.stopPropagation(); del(${i})">❌</span>
    `;

    div.onclick=()=>openChannel(i);

    list.appendChild(div);
  });
}

// DELETE
function del(i){
  channels.splice(i,1);
  localStorage.setItem("channels",JSON.stringify(channels));
  render();
  home();
}

// HOME FEED
function home(){

  dropdown.classList.remove("open");

  channelView.style.display="none";
  homeView.style.display="grid";

  homeView.innerHTML="";

  channels.forEach(c=>{
    let p="UU"+c.channelId.substring(2);

    let iframe=document.createElement("iframe");
    iframe.src=`https://www.youtube.com/embed/videoseries?list=${p}`;

    homeView.appendChild(iframe);
  });
}

// CHANNEL PAGE
function openChannel(i){

  dropdown.classList.remove("open");

  let c=channels[i];

  homeView.style.display="none";
  channelView.style.display="block";

  let p="UU"+c.channelId.substring(2);

  channelView.innerHTML=`
    <h2>${c.name}</h2>
    <div class="grid">
      <iframe src="https://www.youtube.com/embed/videoseries?list=${p}"></iframe>
    </div>
  `;
}

// DROPDOWN
function toggleDropdown(){
  dropdown.classList.toggle("open");
}

// CLOSE WHEN CLICK OUTSIDE
document.addEventListener("click",(e)=>{
  if(dropdown.classList.contains("open")){
    if(!dropdown.contains(e.target) && !e.target.innerText.includes("📺")){
      dropdown.classList.remove("open");
    }
  }
});

// HISTORY (placeholder)
function showHistory(){
  alert("History coming next");
}

</script>

</body>
</html>
