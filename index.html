<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    .navbar {
      width:100%;
      padding:10px;
      background:white;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #ddd;
    }

    .container {
      display:flex;
      width:100%;
      height:calc(100vh - 50px);
    }

    .sidebar {
      width:260px;
      background:white;
      border-right:1px solid #ddd;
      padding:10px;
      overflow:auto;
    }

    .main {
      flex:1;
      padding:10px;
      overflow:auto;
    }

    iframe {
      width:100%;
      height:300px;
      border:none;
      border-radius:10px;
      margin-bottom:15px;
    }

    .channel {
      padding:8px;
      margin-bottom:5px;
      background:#fafafa;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>FocusTube</h2>
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube 🚀</b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <input id="channelInput" placeholder="Paste channel link or UC ID">
      <button onclick="addChannel()">Add</button>

      <p style="font-size:12px;color:#666;">
        Use format:<br>
        youtube.com/channel/UCxxxx
      </p>

      <h3>Subscriptions</h3>
      <div id="channelList"></div>

    </div>

    <!-- MAIN -->
    <div class="main" id="videos"></div>

  </div>

</div>

<script>

// LOGIN SYSTEM
window.onload = () => {
  if(localStorage.getItem("user")) showApp();
};

function login(){
  if(!username.value || !password.value){
    alert("Enter username & password");
    return;
  }
  localStorage.setItem("user","ok");
  showApp();
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  loadChannels();
}

// DATA
let channels = [];

function loadChannels(){
  channels = JSON.parse(localStorage.getItem("channels") || "[]");
  renderChannels();
  loadFeed();
}

// EXTRACT CHANNEL ID
function getChannelId(input){

  input = input.trim();

  if(input.includes("channel/")){
    return input.split("channel/")[1];
  }

  if(input.startsWith("UC")){
    return input;
  }

  return null;
}

// ADD CHANNEL
function addChannel(){

  let input = channelInput.value;
  let id = getChannelId(input);

  if(!id){
    alert("Invalid link. Use channel link.");
    return;
  }

  if(channels.includes(id)){
    alert("Already added");
    return;
  }

  channels.push(id);
  localStorage.setItem("channels", JSON.stringify(channels));

  renderChannels();
  loadFeed();
}

// SIDEBAR
function renderChannels(){

  let list = document.getElementById("channelList");
  list.innerHTML = "";

  channels.forEach((c,i)=>{

    let div = document.createElement("div");
    div.className = "channel";

    div.innerHTML = `
      ${c}
      <span onclick="deleteChannel(${i})">❌</span>
    `;

    list.appendChild(div);
  });
}

function deleteChannel(i){
  channels.splice(i,1);
  localStorage.setItem("channels", JSON.stringify(channels));
  renderChannels();
  loadFeed();
}

// 🔥 FEED (100% WORKING)
function loadFeed(){

  let container = document.getElementById("videos");
  container.innerHTML = "";

  channels.forEach(id => {

    // convert UC → UU
    let playlistId = id.replace("UC", "UU");

    let iframe = document.createElement("iframe");

    iframe.src = `https://www.youtube.com/embed/videoseries?list=${playlistId}`;

    container.appendChild(iframe);

  });
}

</script>

</body>
</html>
