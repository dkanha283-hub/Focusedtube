<script>
const WORKER = "https://restless-brook-50e4.dkanha283.workers.dev";
const APP = document.getElementById("app");
const $ = (id) => document.getElementById(id);

let channels = [];
let historyData = [];
let lastVideo = null;
let playlists = {};
let currentPage = "home";
let currentChannel = null;
let currentPlaylistName = null;

let homeItems = [];
let channelData = null;
let currentSearchResults = [];
let currentPlaylistItems = [];
let sectionCache = {};
let visibleCount = 12;
let viewToken = 0;

function readState() {
  channels = JSON.parse(localStorage.getItem("channels") || "[]");
  historyData = JSON.parse(localStorage.getItem("history") || "[]");
  lastVideo = JSON.parse(localStorage.getItem("lastVideo") || "null");
  playlists = JSON.parse(localStorage.getItem("playlists") || "{}");
  sectionCache = {};
}

function saveState() {
  localStorage.setItem("channels", JSON.stringify(channels));
  localStorage.setItem("history", JSON.stringify(historyData));
  localStorage.setItem("lastVideo", JSON.stringify(lastVideo));
  localStorage.setItem("playlists", JSON.stringify(playlists));
}

document.addEventListener("DOMContentLoaded", init);

function init() {
  readState();
  if (localStorage.getItem("login") === "1") {
    showApp();
    renderEverything();
    showHome();
  } else {
    showLogin();
  }
  $("content").addEventListener("scroll", onScroll);
  document.addEventListener("click", closePanelsOnOutside);
}

function showLogin() {
  $("loginPage").style.display = "flex";
  APP.style.display = "none";
}

function showApp() {
  $("loginPage").style.display = "none";
  APP.style.display = "block";
}

function login() {
  const u = $("u").value.trim();
  const p = $("p").value.trim();
  if (!u || !p) {
    alert("Enter username and password");
    return;
  }
  localStorage.setItem("login", "1");
  showApp();
  renderEverything();
  showHome();
}

function logout() {
  localStorage.removeItem("login");
  showLogin();
}

function closePanelsOnOutside(e) {
  const ids = ["subsPanel", "searchBox", "playlistsPanel"];
  for (const id of ids) {
    const el = $(id);
    if (!el.classList.contains("open")) continue;
    if (el.contains(e.target)) return;
    if (e.target.closest(".icon-btn")) return;
    el.classList.remove("open");
  }
}

function toggleSubs() {
  $("subsPanel").classList.toggle("open");
  $("searchBox").classList.remove("open");
  $("playlistsPanel").classList.remove("open");
}

function toggleSearch() {
  $("searchBox").classList.toggle("open");
  $("subsPanel").classList.remove("open");
  $("playlistsPanel").classList.remove("open");
  $("searchInput").focus();
}

function togglePlaylists() {
  $("playlistsPanel").classList.toggle("open");
  $("subsPanel").classList.remove("open");
  $("searchBox").classList.remove("open");
}

function showView(viewName) {
  ["homeView","channelView","historyView","playlistView"].forEach(id => {
    $(id).classList.remove("active");
  });
  $(viewName).classList.add("active");
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function normalizeChannel(c) {
  return {
    channelId: c.channelId || c.id || "",
    name: c.name || c.title || "Channel",
    logo: c.logo || c.thumbnail || ""
  };
}

function normalizeVideo(v, channel = {}) {
  return {
    id: v.id || "",
    title: v.title || "Video",
    date: v.date || "",
    thumb: v.thumb || (v.id ? `https://img.youtube.com/vi/${v.id}/hqdefault.jpg` : ""),
    type: v.type || "video",
    channelId: v.channelId || channel.channelId || "",
    channelName: v.channelName || channel.name || "",
    channelLogo: v.channelLogo || channel.logo || ""
  };
}

function saveHistory(item) {
  const v = normalizeVideo(item);
  if (!v.id) return;
  historyData = [v, ...historyData.filter(x => x.id !== v.id)].slice(0, 50);
  lastVideo = v;
  saveState();
}

function addToPlaylist(video) {
  const names = Object.keys(playlists);
  let name = prompt(
    names.length
      ? `Enter playlist name.\nExisting: ${names.join(", ")}`
      : "Enter playlist name"
  );
  if (!name) return;
  name = name.trim();
  if (!name) return;

  if (!playlists[name]) playlists[name] = [];
  if (!playlists[name].some(v => v.id === video.id)) {
    playlists[name].push(normalizeVideo(video));
    saveState();
    renderPlaylistsPanel();
    alert(`Added to ${name}`);
  }
}

function createPlaylist() {
  const name = $("playlistName").value.trim();
  if (!name) return;
  if (!playlists[name]) playlists[name] = [];
  saveState();
  $("playlistName").value = "";
  renderPlaylistsPanel();
  renderPlaylistListView();
}

function renderEverything() {
  renderSubsPanel();
  renderPlaylistsPanel();
}

function renderSubsPanel() {
  const list = $("subsList");
  list.innerHTML = "";

  if (!channels.length) {
    list.innerHTML = `<div class="empty">No channels added yet</div>`;
    return;
  }

  channels.forEach((c, i) => {
    const row = document.createElement("div");
    row.className = "channel-item";
    row.innerHTML = `
      <div class="left-row">
        <img class="avatar" src="${c.logo || ''}" onerror="this.src='https://www.google.com/s2/favicons?domain=youtube.com&sz=64'">
        <span>${escapeHtml(c.name)}</span>
      </div>
      <span class="danger" onclick="event.stopPropagation(); removeChannel(${i})">❌</span>
    `;
    row.onclick = () => openChannel(i);
    list.appendChild(row);
  });
}

function renderPlaylistsPanel() {
  const panel = $("userPlaylists");
  panel.innerHTML = "";
  const names = Object.keys(playlists);

  if (!names.length) {
    panel.innerHTML = `<div class="empty">No playlists yet</div>`;
    return;
  }

  names.forEach(name => {
    const row = document.createElement("div");
    row.className = "playlist-item";
    row.innerHTML = `
      <div class="left-row">
        <span>📁</span>
        <span>${escapeHtml(name)}</span>
      </div>
      <span class="danger" onclick="event.stopPropagation(); deletePlaylist('${name.replace(/'/g,"\\'")}')">🗑</span>
    `;
    row.onclick = () => openPlaylist(name);
    panel.appendChild(row);
  });
}

function deletePlaylist(name) {
  delete playlists[name];
  saveState();
  renderPlaylistsPanel();
  if (currentPage === "playlist" && currentPlaylistName === name) showPlaylistsHome();
}

function removeChannel(index) {
  channels.splice(index, 1);
  sectionCache = {};
  saveState();
  renderSubsPanel();
  showHome();
}

async function addChannel() {
  const raw = $("channelInput").value.trim();
  if (!raw) return;

  let endpoint = "";
  if (raw.includes("@")) {
    const handle = raw.split("@")[1].split("?")[0].split("/")[0];
    endpoint = `${WORKER}?handle=${encodeURIComponent(handle)}`;
  } else if (raw.includes("channel/")) {
    const id = raw.split("channel/")[1].split("?")[0].split("/")[0];
    endpoint = `${WORKER}?id=${encodeURIComponent(id)}`;
  } else if (raw.startsWith("UC")) {
    endpoint = `${WORKER}?id=${encodeURIComponent(raw)}`;
  } else {
    alert("Invalid channel link");
    return;
  }

  try {
    const res = await fetch(endpoint);
    const data = await res.json();
    if (!data.channelId) {
      alert("Channel not found");
      return;
    }
    const ch = normalizeChannel(data);
    if (channels.some(x => x.channelId === ch.channelId)) {
      alert("Already added");
      return;
    }
    channels.unshift(ch);
    sectionCache = {};
    saveState();
    $("channelInput").value = "";
    renderSubsPanel();
    showHome();
  } catch {
    alert("Failed to fetch channel");
  }
}

function setPageHeader(title, subtitle, backAction) {
  $("pageHeader").innerHTML = `
    <div>
      <h1 class="page-title">${escapeHtml(title)}</h1>
      <div class="page-sub">${escapeHtml(subtitle || "")}</div>
    </div>
    ${backAction ? `<div class="back" onclick="${backAction}">⬅ Back</div>` : ""}
  `;
}

function setChannelHeader(title, subtitle, backAction) {
  $("channelHeader").innerHTML = `
    <div>
      <h1 class="page-title">${escapeHtml(title)}</h1>
      <div class="page-sub">${escapeHtml(subtitle || "")}</div>
    </div>
    ${backAction ? `<div class="back" onclick="${backAction}">⬅ Back</div>` : ""}
  `;
}

function setPlaylistHeader(title, subtitle) {
  $("playlistHeader").innerHTML = `
    <div>
      <h1 class="page-title">${escapeHtml(title)}</h1>
      <div class="page-sub">${escapeHtml(subtitle || "")}</div>
    </div>
  `;
}

function clearAllViews() {
  $("homeView").classList.remove("active");
  $("channelView").classList.remove("active");
  $("historyView").classList.remove("active");
  $("playlistView").classList.remove("active");
}

function showHome() {
  currentPage = "home";
  currentChannel = null;
  currentPlaylistName = null;
  showView("homeView");
  setPageHeader("Home", "Smart mixed feed from subscribed channels", null);
  $("resumeBox").innerHTML = "";
  visibleCount = 12;
  loadHomeFeed();
  renderResume();
  $("content").scrollTop = 0;
}

function renderResume() {
  const box = $("resumeBox");
  box.innerHTML = "";
  if (currentPage !== "home" || !lastVideo || !lastVideo.id) return;

  const card = document.createElement("div");
  card.className = "resume-card";
  card.innerHTML = `
    <div class="resume-label">Continue watching</div>
    <div class="resume-title">${escapeHtml(lastVideo.title)}</div>
    <button class="resume-btn">Resume</button>
  `;
  card.onclick = () => openPlayer(lastVideo);
  box.appendChild(card);
}

async function fetchChannelSections(ch) {
  if (sectionCache[ch.channelId]) return sectionCache[ch.channelId];

  const res = await fetch(`${WORKER}?sections=1&channelId=${encodeURIComponent(ch.channelId)}`);
  const data = await res.json();

  const normalized = {
    videos: (data.videos || []).map(v => normalizeVideo(v, ch)),
    shorts: (data.shorts || []).map(v => normalizeVideo(v, ch)),
    playlists: (data.playlists || []).map(v => ({
      id: v.id || "",
      title: v.title || "Playlist",
      date: v.date || "",
      thumb: v.thumb || "",
      type: "playlist",
      channelId: ch.channelId,
      channelName: ch.name,
      channelLogo: ch.logo
    }))
  };

  sectionCache[ch.channelId] = normalized;
  return normalized;
}

async function loadHomeFeed() {
  const token = ++viewToken;
  homeItems = [];
  $("feedGrid").innerHTML = `<div class="empty">Loading home feed...</div>`;

  if (!channels.length) {
    $("feedGrid").innerHTML = `<div class="empty">Add channels from the subscriptions panel</div>`;
    return;
  }

  const results = [];
  for (const ch of channels) {
    const sec = await fetchChannelSections(ch);
    results.push(...sec.videos, ...sec.shorts);
  }

  if (token !== viewToken || currentPage !== "home") return;

  results.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

  const seen = new Set();
  homeItems = results.filter(v => {
    if (!v.id || seen.has(v.id)) return false;
    seen.add(v.id);
    return true;
  });

  renderHomeFeed();
}

function renderHomeFeed() {
  $("feedGrid").innerHTML = "";
  const slice = homeItems.slice(0, visibleCount);

  if (!slice.length) {
    $("feedGrid").innerHTML = `<div class="empty">No videos found yet</div>`;
    return;
  }

  slice.forEach(v => $("feedGrid").appendChild(createCard(v)));
}

async function openChannel(i) {
  currentPage = "channel";
  currentPlaylistName = null;
  currentChannel = channels[i];
  showView("channelView");
  visibleCount = 12;
  $("content").scrollTop = 0;

  setChannelHeader(currentChannel.name, "Videos · Shorts · Playlists", "showHome()");
  $("channelSections").innerHTML = `<div class="empty">Loading channel...</div>`;

  const sec = await fetchChannelSections(currentChannel);
  channelData = sec;
  renderChannelPage();
}

function renderChannelPage() {
  const container = $("channelSections");
  container.innerHTML = "";

  if (!channelData) {
    container.innerHTML = `<div class="empty">No channel data</div>`;
    return;
  }

  const blocks = [
    { title: "Videos", items: channelData.videos || [] },
    { title: "Shorts", items: channelData.shorts || [] },
    { title: "Playlists", items: channelData.playlists || [] }
  ];

  blocks.forEach(block => {
    const section = document.createElement("div");
    section.className = "section-block";
    const items = block.items.slice(0, visibleCount);

    section.innerHTML = `
      <div class="section-head">
        <h2 class="section-title">${escapeHtml(block.title)}</h2>
        <div class="section-count">${items.length} shown</div>
      </div>
    `;

    if (!items.length) {
      section.innerHTML += `<div class="empty">No ${block.title.toLowerCase()} found</div>`;
      container.appendChild(section);
      return;
    }

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(v => grid.appendChild(createCard(v)));
    section.appendChild(grid);
    container.appendChild(section);
  });
}

function showHistory() {
  currentPage = "history";
  currentChannel = null;
  currentPlaylistName = null;
  showView("historyView");
  $("historyGrid").innerHTML = "";
  visibleCount = 12;
  setPageHeader("History", "Recently watched videos", "showHome()");
  renderHistoryPage();
  $("content").scrollTop = 0;
}

function renderHistoryPage() {
  const grid = $("historyGrid");
  grid.innerHTML = "";
  const slice = historyData.slice(0, visibleCount);

  if (!slice.length) {
    grid.innerHTML = `<div class="empty">No watch history yet</div>`;
    return;
  }

  slice.forEach(v => grid.appendChild(createCard(normalizeVideo(v))));
}

function openPlaylist(name) {
  currentPage = "playlist";
  currentPlaylistName = name;
  currentChannel = null;
  showView("playlistView");
  visibleCount = 12;
  $("content").scrollTop = 0;
  setPlaylistHeader(name, "Your saved videos");
  renderPlaylistPage();
}

function renderPlaylistPage() {
  const grid = $("playlistGrid");
  grid.innerHTML = "";
  const list = playlists[currentPlaylistName] || [];
  const slice = list.slice(0, visibleCount);

  if (!slice.length) {
    grid.innerHTML = `<div class="empty">Playlist is empty</div>`;
    return;
  }

  slice.forEach(v => grid.appendChild(createCard(normalizeVideo(v))));
}

function showPlaylistsHome() {
  currentPage = "home";
  currentPlaylistName = null;
  showHome();
}

function renderPlaylistListView() {
  renderPlaylistsPanel();
}

function createCard(v) {
  const item = normalizeVideo(v);
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img class="thumb" src="${item.thumb}" alt="">
    <div class="card-body">
      <div class="title">${escapeHtml(item.title)}</div>
      <div class="meta">
        <img class="logo" src="${item.channelLogo || ''}" onerror="this.src='https://www.google.com/s2/favicons?domain=youtube.com&sz=64'">
        <span>${escapeHtml(item.channelName || "")}${item.type === "short" ? " • Short" : item.type === "playlist" ? " • Playlist" : ""}</span>
      </div>
    </div>
  `;

  card.onclick = () => {
    if (item.type === "playlist" && item.id && !item.id.startsWith("PL_")) {
      openPlayer({ ...item, playlistId: item.id });
    } else {
      openPlayer(item);
    }
  };

  return card;
}

async function runSearch() {
  const q = $("searchInput").value.trim();
  if (!q) return;

  currentPage = "search";
  currentChannel = null;
  currentPlaylistName = null;
  visibleCount = 12;
  showView("homeView");
  setPageHeader(`Search: ${q}`, "YouTube results", null);
  $("resumeBox").innerHTML = "";
  $("feedGrid").innerHTML = `<div class="empty">Searching...</div>`;

  const res = await fetch(`${WORKER}?search=1&q=${encodeURIComponent(q)}`);
  const data = await res.json();
  currentSearchResults = (data || []).map(v => normalizeVideo(v));

  renderSearchResults();
  $("searchBox").classList.remove("open");
}

function renderSearchResults() {
  $("feedGrid").innerHTML = "";
  const slice = currentSearchResults.slice(0, visibleCount);

  if (!slice.length) {
    $("feedGrid").innerHTML = `<div class="empty">No results found</div>`;
    return;
  }

  slice.forEach(v => $("feedGrid").appendChild(createCard(v)));
}

function openPlayer(item) {
  const v = normalizeVideo(item);
  saveHistory(v);

  const params = new URLSearchParams();
  if (v.id) params.set("videoId", v.id);
  if (v.playlistId) params.set("playlistId", v.playlistId);
  if (v.title) params.set("title", v.title);
  if (v.channelId) params.set("channelId", v.channelId);
  if (v.channelName) params.set("channelName", v.channelName);

 window.location.href = `https://dkanha283-hub.github.io/Player/?${params.toString()}`;
}

function onScroll() {
  const el = $("content");
  const nearBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 180;
  if (!nearBottom) return;

  if (currentPage === "home" && visibleCount < homeItems.length) {
    visibleCount += 12;
    renderHomeFeed();
  }

  if (currentPage === "channel" && channelData) {
    const total = [
      ...(channelData.videos || []),
      ...(channelData.shorts || []),
      ...(channelData.playlists || [])
    ].length;
    if (visibleCount < total) {
      visibleCount += 12;
      renderChannelPage();
    }
  }

  if (currentPage === "history" && visibleCount < historyData.length) {
    visibleCount += 12;
    renderHistoryPage();
  }

  if (currentPage === "search" && visibleCount < currentSearchResults.length) {
    visibleCount += 12;
    renderSearchResults();
  }

  if (currentPage === "playlist" && currentPlaylistName) {
    const total = (playlists[currentPlaylistName] || []).length;
    if (visibleCount < total) {
      visibleCount += 12;
      renderPlaylistPage();
    }
  }
}
</script>
