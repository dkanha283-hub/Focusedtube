<!DOCTYPE html>
<html>
<head>
  <title>FocusedTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }

    .login {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    input, button {
      padding:10px;
      margin:5px;
      border-radius:8px;
      border:none;
    }

    button { background:red; color:white; }

    .topbar {
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#181818;
    }

    .icons span { margin-left:10px; cursor:pointer; }

    .main { padding:15px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:15px;
    }

    .card {
      background:#181818;
      border-radius:10px;
      overflow:hidden;
      cursor:pointer;
    }

    .card img {
      width:100%;
      height:140px;
      object-fit:cover;
    }

    .title {
      padding:8px;
      font-size:14px;
    }

    /* PLAYER */
    .player {
      width:100%;
      height:220px;
      margin-bottom:15px;
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
      border-radius:10px;
    }

    /* DROPDOWN */
    .dropdown {
      position:absolute;
      top:50px;
      right:10px;
      width:280px;
      background:#181818;
      padding:10px;
      border-radius:10px;
      display:none;
    }

    .dropdown.open { display:block; }

    .channel {
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px;
      background:#282828;
      border-radius:8px;
      margin-bottom:8px;
    }

    .channel img {
      width:30px;
      height:30px;
      border-radius:50%;
    }

  </style>
</head>

<body>

<div id="loginPage" class="login">
  <h2>FocusedTube</h2>
  <input id="u" placeholder="Username">
  <input id="p" type="password">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

  <div class="topbar">
    <b>FocusedTube</b>
    <div class="icons">
      <span onclick="home()">🏠</span>
      <span onclick="toggleDropdown()">📺</span>
      <span onclick="logout()">👤</span>
    </div>
  </div>

  <div id="dropdown" class="dropdown">
    <input id="input" placeholder="@channel or link">
    <button onclick="add()">Add</button>
    <div id="list"></div>
  </div>

  <div class="main">

    <!-- PLAYER -->
    <div id="player" class="player"></div>

    <!-- FEED -->
    <div id="feed" class="grid"></div>

  </div>

</div>

<script>

let channels=[];

// LOGIN
function login(){
  localStorage.setItem("login","1");
  start();
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

function start(){
  loginPage.style.display="none";
  app.style.display="block";
  load();
}

if(localStorage.getItem("login")) start();

// LOAD
function load(){
  channels = JSON.parse(localStorage.getItem("channels")||"[]");
  render();
  home();
}

// ADD CHANNEL
async function add(){

  let link=input.value.trim();
  let api="https://restless-brook-50e4.dkanha283.workers.dev/";

  let res;

  if(link.includes("@")){
    let h=link.split("@")[1].split("?")[0];
    res=await fetch(api+"?handle="+h);
  } else if(link.includes("channel/")){
    let id=link.split("channel/")[1];
    res=await fetch(api+"?id="+id);
  } else {
    alert("Invalid");
    return;
  }

  let data=await res.json();

  if(channels.some(c=>c.channelId===data.channelId)){
    alert("Already added");
    return;
  }

  channels.push(data);
  localStorage.setItem("channels",JSON.stringify(channels));

  render();
  home();
}

// RENDER CHANNEL LIST (LOGO FIX)
function render(){
  list.innerHTML="";

  channels.forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="channel";

    div.innerHTML=`
      <img src="${c.logo}">
      <span>${c.name}</span>
      <span onclick="event.stopPropagation(); del(${i})">❌</span>
    `;

    list.appendChild(div);
  });
}

// DELETE
function del(i){
  channels.splice(i,1);
  localStorage.setItem("channels",JSON.stringify(channels));
  render();
  home();
}

// PLAY VIDEO INSIDE APP
function playVideo(videoId){
  player.innerHTML = `
    <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1"></iframe>
  `;
}

// HOME FEED
async function home(){

  feed.innerHTML="";

  for(let c of channels){

    let res = await fetch(`https://corsproxy.io/?https://www.youtube.com/feeds/videos.xml?channel_id=${c.channelId}`);
    let text = await res.text();

    let parser = new DOMParser();
    let xml = parser.parseFromString(text,"text/xml");

    let videos = xml.querySelectorAll("entry");

    videos.forEach(v=>{

      let title = v.querySelector("title").textContent;
      let link = v.querySelector("link").getAttribute("href");
      let id = link.split("v=")[1];
      let thumb = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

      let div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <img src="${thumb}">
        <div class="title">${title}</div>
      `;

      div.onclick=()=>playVideo(id);

      feed.appendChild(div);

    });

  }

}

// DROPDOWN
function toggleDropdown(){
  dropdown.classList.toggle("open");
}

</script>

</body>
</html>
