<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    input {
      padding:10px;
      border-radius:8px;
      border:none;
      margin:5px;
      width:90%;
    }

    button {
      padding:10px;
      border:none;
      border-radius:8px;
      background:red;
      color:white;
      cursor:pointer;
    }

    .navbar {
      width:100%;
      padding:10px;
      background:#181818;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .container {
      display:flex;
      height:calc(100vh - 50px);
    }

    /* FLOATING SIDEBAR */
    .sidebar {
      width:250px;
      background:#181818;
      padding:10px;
      overflow:auto;
      position:fixed;
      left:-260px;
      top:50px;
      height:100%;
      transition:0.3s;
      z-index:10;
    }

    .sidebar.open {
      left:0;
    }

    .menu-btn {
      cursor:pointer;
      font-size:20px;
    }

    .main {
      flex:1;
      padding:15px;
      margin-left:0;
      overflow:auto;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:15px;
    }

    iframe {
      width:100%;
      height:180px;
      border:none;
      border-radius:12px;
    }

    .channel-card {
      display:flex;
      align-items:center;
      gap:10px;
      background:#282828;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
      cursor:pointer;
    }

    .channel-card img {
      width:40px;
      height:40px;
      border-radius:50%;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>FocusTube</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>
    <b>FocusTube</b>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar">

    <input id="input" placeholder="Paste channel or @link">
    <button onclick="add()">Add</button>

    <h3>Channels</h3>
    <div id="channelList"></div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <div id="homeView"></div>
    <div id="channelView" style="display:none"></div>

  </div>

</div>

<script>

// INIT
document.addEventListener("DOMContentLoaded", ()=>{
  if(localStorage.getItem("login")){
    showApp();
  }
});

function login(){
  if(!username.value || !password.value) return alert("Enter details");
  localStorage.setItem("login","true");
  showApp();
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  load();
}

// DATA
let channels=[];

function load(){
  channels = JSON.parse(localStorage.getItem("channels")||"[]");
  renderChannels();
  showHome();
}

// ADD CHANNEL
async function add(){

  let link = input.value.trim();
  let api = "https://restless-brook-50e4.dkanha283.workers.dev/";

  let res;

  if(link.includes("@")){
    let handle = link.split("@")[1].split("?")[0];
    res = await fetch(api + "?handle=" + handle);
  } else if(link.includes("channel/")){
    let id = link.split("channel/")[1];
    res = await fetch(api + "?id=" + id);
  } else {
    alert("Invalid link");
    return;
  }

  let info = await res.json();

  if(!info.channelId) return alert("Error");

  if(channels.some(c => c.channelId === info.channelId)){
    alert("Already added");
    return;
  }

  channels.push(info);
  localStorage.setItem("channels", JSON.stringify(channels));

  renderChannels();
  showHome();
}

// SIDEBAR
function renderChannels(){

  channelList.innerHTML="";

  channels.forEach((c,i)=>{

    let div=document.createElement("div");
    div.className="channel-card";

    div.innerHTML=`
      <img src="${c.logo}">
      <span>${c.name}</span>
    `;

    div.onclick=()=>openChannel(i);

    channelList.appendChild(div);
  });
}

// HOME VIEW (ALL CHANNELS)
function showHome(){

  channelView.style.display="none";
  homeView.style.display="block";

  homeView.innerHTML="";

  channels.forEach(c=>{
    let playlist="UU"+c.channelId.substring(2);

    let iframe=document.createElement("iframe");
    iframe.src=`https://www.youtube.com/embed/videoseries?list=${playlist}`;

    homeView.appendChild(iframe);
  });
}

// SINGLE CHANNEL VIEW
function openChannel(i){

  let c = channels[i];

  homeView.style.display="none";
  channelView.style.display="block";

  channelView.innerHTML=`
    <h2>${c.name}</h2>
    <div class="grid" id="grid"></div>
  `;

  let grid=document.getElementById("grid");

  let playlist="UU"+c.channelId.substring(2);

  let iframe=document.createElement("iframe");
  iframe.src=`https://www.youtube.com/embed/videoseries?list=${playlist}`;

  grid.appendChild(iframe);
}

// SIDEBAR TOGGLE
function toggleSidebar(){
  sidebar.classList.toggle("open");
}

</script>

</body>
</html>
