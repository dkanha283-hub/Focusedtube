<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusedTube | Pro Edition</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: rgba(30, 30, 30, 0.85);
            --card: #161616;
            --text: #ffffff;
            --muted: #aaaaaa;
            --accent: #ff0000;
            --border: rgba(255, 255, 255, 0.1);
            --radius: 16px;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* --- NAVIGATION --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: var(--bg); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 1.3rem; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-group { display: flex; gap: 10px; }
        .nav-item { cursor: pointer; padding: 10px; border-radius: 12px; transition: 0.2s; }
        .nav-item:hover { background: var(--panel); }

        /* --- DRAWER --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 900; backdrop-filter: blur(5px); }
        .drawer { 
            position: fixed; top: -110%; left: 50%; transform: translateX(-50%); 
            width: 95%; max-width: 500px; background: var(--panel); z-index: 1000; 
            padding: 25px; border-radius: 0 0 20px 20px; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            border: 1px solid var(--border);
        }
        .drawer.open { top: 0; }

        /* --- MAIN CONTENT --- */
        .main-content { height: calc(100vh - 65px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* --- VIDEO CARD --- */
        .card { cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .thumb-wrap { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius); overflow: hidden; position: relative; background: #222; }
        .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-meta { display: flex; gap: 12px; padding: 12px 5px; }
        .chan-logo { width: 36px; height: 36px; border-radius: 50%; background: #333; flex-shrink: 0; object-fit: cover; }
        .v-title { font-weight: 600; font-size: 0.95rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-details { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }

        /* --- PRO PLAYER VIEW --- */
        #player-view { display: none; flex-direction: column; gap: 15px; max-width: 1000px; margin: auto; animation: fadeIn 0.4s; }
        .player-stage { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #video-frame { width: 100%; height: 100%; border: none; }
        
        /* Custom Controls Overlay */
        .player-controls { display: flex; justify-content: center; gap: 20px; padding: 10px; }
        .control-btn { background: var(--panel); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .control-btn:hover { background: var(--accent); border-color: var(--accent); }

        /* --- CHANNEL PAGE --- */
        #channel-header { display: none; align-items: center; gap: 20px; padding: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .ch-logo-lg { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="UI.closePanels()"></div>

<!-- APP WRAPPER -->
<div id="app">
    <nav class="navbar">
        <div class="logo" onclick="App.setView('home')">Focused<span>Tube</span></div>
        <div class="nav-group">
            <div class="nav-item" onclick="UI.togglePanel('search-drawer')">🔍</div>
            <div class="nav-item" onclick="UI.togglePanel('subs-drawer')">📺</div>
            <div class="nav-item" onclick="App.setView('history')">⏱</div>
        </div>
    </nav>

    <!-- DRAWERS -->
    <div id="search-drawer" class="drawer">
        <h3 style="margin-top:0">Search</h3>
        <div style="display:flex; gap:10px;">
            <input id="searchInput" style="flex:1; padding:12px; border-radius:10px; border:1px solid var(--border); background:rgba(0,0,0,0.3); color:white;" placeholder="Find videos...">
            <button onclick="App.runSearch()" style="padding:10px 20px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">Go</button>
        </div>
        <div id="search-results" class="video-grid" style="margin-top:20px; max-height:400px; overflow-y:auto;"></div>
    </div>

    <div id="subs-drawer" class="drawer">
        <h3 style="margin-top:0">Subscriptions</h3>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input id="chanInput" style="flex:1; padding:12px; border-radius:10px; border:1px solid var(--border); background:rgba(0,0,0,0.3); color:white;" placeholder="@handle or Channel ID">
            <button onclick="App.addChannel()" style="padding:10px 20px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">Add</button>
        </div>
        <div id="subs-list"></div>
    </div>

    <main class="main-content">
        <!-- Channel Header (Hidden by default) -->
        <div id="channel-header">
            <img id="ch-logo-img" class="ch-logo-lg" src="">
            <div>
                <h1 id="ch-name-txt" style="margin:0">Channel Name</h1>
                <p id="ch-stats-txt" style="color:var(--muted); margin:5px 0 0 0;"></p>
            </div>
        </div>

        <!-- Feed View -->
        <div id="feed-view">
            <h2 id="feed-title">Home Feed</h2>
            <div id="main-grid" class="video-grid"></div>
        </div>

        <!-- Pro Player View -->
        <div id="player-view">
            <button class="control-btn" style="width:fit-content" onclick="App.setView('home')">← Close Player</button>
            <div class="player-stage">
                <div id="player-iframe-container" style="width:100%; height:100%;"></div>
            </div>
            <div class="player-controls">
                <button class="control-btn" onclick="Player.skip(-10)">-10s</button>
                <button class="control-btn" onclick="Player.toggle()">Play/Pause</button>
                <button class="control-btn" onclick="Player.skip(10)">+10s</button>
            </div>
            <div style="padding:10px;">
                <h2 id="p-title" style="margin:0">Video Title</h2>
                <p id="p-chan" style="color:var(--accent); font-weight:bold; margin:5px 0; cursor:pointer;"></p>
            </div>
        </div>
    </main>
</div>

<!-- YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let ytPlayer;
const API = "https://restless-brook-50e4.dkanha283.workers.dev";
const state = {
    channels: JSON.parse(localStorage.getItem("channels") || "[]"),
    history: JSON.parse(localStorage.getItem("history") || "[]")
};

/* =========================
   APP CORE
========================= */
const App = {
    setView(view, data = null) {
        UI.closePanels();
        document.getElementById("feed-view").style.display = (view === 'home' || view === 'history') ? 'block' : 'none';
        document.getElementById("player-view").style.display = view === 'player' ? 'flex' : 'none';
        document.getElementById("channel-header").style.display = view === 'channel' ? 'flex' : 'none';

        if (view === 'home') this.loadHome();
        if (view === 'history') this.renderGrid(state.history, "Watch History");
    },

    async loadHome() {
        if (state.channels.length === 0) return;
        let all = [];
        for (const ch of state.channels) {
            try {
                const r = await fetch(`${API}?sections=1&channelId=${ch.channelId}`);
                const d = await r.json();
                // Inject logo into video objects
                const vids = (d.videos || []).map(v => ({...v, channelLogo: ch.logo, channelName: ch.name}));
                all.push(...vids);
            } catch(e){}
        }
        all.sort((a,b) => new Date(b.date) - new Date(a.date));
        this.renderGrid(all, "Home Feed");
    },

    renderGrid(data, title) {
        document.getElementById("feed-title").innerText = title;
        const grid = document.getElementById("main-grid");
        grid.innerHTML = data.map(v => `
            <div class="card" onclick='Player.load("${v.id}", "${encodeURIComponent(v.title)}", "${v.channelName}", "${v.channelId}")'>
                <div class="thumb-wrap">
                    <img src="${v.thumb}" loading="lazy">
                </div>
                <div class="card-meta">
                    <img class="chan-logo" src="${v.channelLogo || 'https://via.placeholder.com/36'}" onclick="event.stopPropagation(); App.openChannel('${v.channelId}')">
                    <div class="v-text">
                        <div class="v-title">${v.title}</div>
                        <div class="v-details">${v.channelName} • ${v.date || ''}</div>
                    </div>
                </div>
            </div>
        `).join("");
    },

    async openChannel(id) {
        this.setView('channel');
        const grid = document.getElementById("main-grid");
        grid.innerHTML = "Loading...";
        
        try {
            const r = await fetch(`${API}?sections=1&channelId=${id}`);
            const d = await r.json();
            const ch = state.channels.find(c => c.channelId === id) || {name: "Channel", logo: ""};
            
            document.getElementById("ch-logo-img").src = ch.logo;
            document.getElementById("ch-name-txt").innerText = ch.name;
            document.getElementById("ch-stats-txt").innerText = `${d.counts.videos} Videos • ${d.counts.shorts} Shorts`;
            
            const vids = [...(d.videos || []), ...(d.shorts || [])].map(v => ({...v, channelLogo: ch.logo, channelName: ch.name}));
            this.renderGrid(vids, "Channel Content");
            document.getElementById("feed-view").style.display = 'block'; 
        } catch(e){ grid.innerHTML = "Error loading channel."; }
    },

    async addChannel() {
        const val = document.getElementById("chanInput").value.trim();
        const r = await fetch(`${API}?handle=${val.replace("@","")}`);
        const d = await r.json();
        if(d.channelId) {
            state.channels.unshift(d);
            localStorage.setItem("channels", JSON.stringify(state.channels));
            UI.renderSubs();
            this.loadHome();
        }
    }
};

/* =========================
   PRO PLAYER LOGIC
========================= */
const Player = {
    load(id, title, channel, channelId) {
        App.setView('player');
        document.getElementById("p-title").innerText = decodeURIComponent(title);
        document.getElementById("p-chan").innerText = channel;
        document.getElementById("p-chan").onclick = () => App.openChannel(channelId);

        if (ytPlayer) {
            ytPlayer.loadVideoById(id);
        } else {
            // Initialize Player
            ytPlayer = new YT.Player('player-iframe-container', {
                height: '100%',
                width: '100%',
                videoId: id,
                playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 },
                events: { 'onReady': (e) => e.target.playVideo() }
            });
        }
    },
    skip(seconds) {
        if (!ytPlayer) return;
        const now = ytPlayer.getCurrentTime();
        ytPlayer.seekTo(now + seconds, true);
    },
    toggle() {
        if (!ytPlayer) return;
        const state = ytPlayer.getPlayerState();
        if (state === 1) ytPlayer.pauseVideo();
        else ytPlayer.playVideo();
    }
};

const UI = {
    togglePanel(id) {
        document.getElementById(id).classList.toggle('open');
        document.getElementById("overlay").style.display = 'block';
        if(id === 'subs-drawer') this.renderSubs();
    },
    closePanels() {
        document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
        document.getElementById("overlay").style.display = 'none';
    },
    renderSubs() {
        document.getElementById("subs-list").innerHTML = state.channels.map(c => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid var(--border);">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${c.logo}" style="width:30px; height:30px; border-radius:50%">
                    <span>${c.name}</span>
                </div>
                <button onclick="App.openChannel('${c.channelId}')" style="background:none; border:1px solid var(--accent); color:var(--accent); border-radius:5px; cursor:pointer;">View</button>
            </div>
        `).join("");
    }
};

// Start App
window.onload = () => { if(state.channels.length > 0) App.loadHome(); };
</script>
</body>
</html>
