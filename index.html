<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FocusedTube</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#181818;
  --card:#242424;
  --text:#fff;
  --muted:#aaa;
  --accent:#ff0000;
  --border:#2e2e2e;
}

body{margin:0;background:var(--bg);color:var(--text);font-family:sans-serif}
*{box-sizing:border-box}

/* LOGIN */
.auth{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}

.auth input,.auth button{
width:260px;
padding:12px;
border-radius:10px;
border:none;
}

.auth button{
background:var(--accent);
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* APP */
.app{display:none;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
padding:10px;
background:var(--panel);
border-bottom:1px solid var(--border);
}

.icon{padding:8px;background:#222;border-radius:10px;cursor:pointer}

/* CONTENT */
.content{
height:calc(100vh - 50px);
overflow:auto;
padding:12px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:12px;
}

/* CARD */
.card{
background:var(--card);
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.thumb{width:100%;aspect-ratio:16/9}
.title{padding:8px;font-size:14px}

/* PANEL */
.panel{
position:fixed;
top:60px;
right:10px;
width:300px;
background:var(--panel);
padding:10px;
border-radius:10px;
display:none;
}
.panel.open{display:block}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="authPage" class="auth">
<h2>FocusedTube</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Create Account</button>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="topbar">
<div>📌 FocusedTube</div>
<div>
<span class="icon" onclick="showHome()">🏠</span>
<span class="icon" onclick="toggleSubs()">📺</span>
<span class="icon" onclick="showHistory()">⏱️</span>
<span class="icon" onclick="toggleSearch()">🔎</span>
<span class="icon" onclick="logout()">👤</span>
</div>
</div>

<div id="subsPanel" class="panel"></div>
<div id="searchPanel" class="panel"></div>

<div id="content" class="content"></div>

</div>

<script>
const WORKER="https://restless-brook-50e4.dkanha283.workers.dev";

/* AUTH SYSTEM */
function register(){
const u=username.value.trim();
const p=password.value.trim();
if(!u||!p)return alert("Enter details");

let users=JSON.parse(localStorage.getItem("users")||"{}");
if(users[u]) return alert("User exists");

users[u]=p;
localStorage.setItem("users",JSON.stringify(users));
alert("Account created");
}

function login(){
const u=username.value.trim();
const p=password.value.trim();

let users=JSON.parse(localStorage.getItem("users")||"{}");

if(users[u]===p){
localStorage.setItem("login","1");
init();
}else{
alert("Invalid login");
}
}

function logout(){
localStorage.removeItem("login");
location.reload();
}

/* STATE */
let channels=JSON.parse(localStorage.getItem("channels")||"[]");
let historyData=JSON.parse(localStorage.getItem("history")||"[]");

let homeData=[],visible=12,currentPage="home";

/* INIT */
function init(){
if(localStorage.getItem("login")){
authPage.style.display="none";
app.style.display="block";
showHome();
}else{
authPage.style.display="flex";
app.style.display="none";
}
}

/* CARD */
function card(v){
const d=document.createElement("div");
d.className="card";
d.innerHTML=`
<img class="thumb" src="${v.thumb}">
<div class="title">${v.title}</div>`;
d.onclick=()=>openPlayer(v);
return d;
}

/* PLAYER */
function openPlayer(v){
historyData=[v,...historyData.filter(x=>x.id!==v.id)].slice(0,50);
localStorage.setItem("history",JSON.stringify(historyData));

const p=new URLSearchParams();
p.set("videoId",v.id);
p.set("title",v.title);
p.set("channelId",v.channelId);
p.set("channelName",v.channelName);

location.href=`https://dkanha283-hub.github.io/Player/?${p}`;
}

/* HOME */
async function showHome(){
content.innerHTML="Loading...";
let all=[];

for(const ch of channels){
const r=await fetch(`${WORKER}?sections=1&channelId=${ch.channelId}`);
const d=await r.json();

all.push(...(d.videos||[]).slice(0,200));
all.push(...(d.shorts||[]).slice(0,80));
}

homeData=all;
renderHome();
}

function renderHome(){
content.innerHTML="";
const g=document.createElement("div");
g.className="grid";

homeData.slice(0,visible).forEach(v=>g.appendChild(card(v)));
content.appendChild(g);
}

/* HISTORY */
function showHistory(){
content.innerHTML="";
const g=document.createElement("div");
g.className="grid";
historyData.forEach(v=>g.appendChild(card(v)));
content.appendChild(g);
}

/* SUBS */
function toggleSubs(){
subsPanel.classList.toggle("open");
subsPanel.innerHTML=`
<input id="ch" placeholder="Channel ID or @handle">
<button onclick="addChannel()">Add</button>
${channels.map((c,i)=>`<div onclick="removeChannel(${i})">${c.name} ❌</div>`).join("")}
`;
}

async function addChannel(){
const val=ch.value;
let url=val.includes("@")?`${WORKER}?handle=${val.replace("@","")}`:`${WORKER}?id=${val}`;

const r=await fetch(url);
const d=await r.json();

channels.unshift({channelId:d.channelId,name:d.name});
localStorage.setItem("channels",JSON.stringify(channels));
toggleSubs();
}

function removeChannel(i){
channels.splice(i,1);
localStorage.setItem("channels",JSON.stringify(channels));
toggleSubs();
}

/* SEARCH */
function toggleSearch(){
searchPanel.classList.toggle("open");
searchPanel.innerHTML=`
<input id="q">
<button onclick="search()">Search</button>
<div id="res"></div>`;
}

async function search(){
const q=document.getElementById("q").value;
const r=await fetch(`${WORKER}?search=1&q=${q}`);
const d=await r.json();

const box=document.getElementById("res");
box.innerHTML="";
d.forEach(v=>box.appendChild(card(v)));
}

/* SCROLL */
content.addEventListener("scroll",()=>{
if(content.scrollTop+content.clientHeight>=content.scrollHeight-100){
visible+=12;
renderHome();
}
});

init();
</script>

</body>
</html>
