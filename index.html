<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusedTube | Ultimate Refined</title>
    <style>
        /* --- DYNAMIC THEME SYSTEM --- */
        :root {
            --bg: #050505;
            --panel: rgba(20, 20, 20, 0.85);
            --card: #121212;
            --text: #ffffff;
            --muted: #999999;
            --accent: #ff0000;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 15px 50px rgba(0,0,0,0.8);
            --radius: 20px;
        }

        body.light {
            --bg: #f0f2f5;
            --panel: rgba(255, 255, 255, 0.9);
            --card: #ffffff;
            --text: #1c1e21;
            --muted: #65676b;
            --border: rgba(0, 0, 0, 0.06);
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif; overflow: hidden;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- UI ANIMATIONS --- */
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- AUTH --- */
        .auth-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at top right, #200, var(--bg)); }
        .auth-card { background: var(--panel); backdrop-filter: blur(20px); padding: 40px; border-radius: 28px; width: 340px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 14px; border: 1px solid var(--border); background: rgba(128,128,128,0.1); color: var(--text); box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(128,128,128,0.2); }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 14px; background: var(--accent); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:active { transform: scale(0.96); }

        /* --- NAVIGATION --- */
        #app { display: none; height: 100vh; flex-direction: column; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 900; cursor: pointer; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .nav-icons { display: flex; gap: 8px; align-items: center; }
        .icon { font-size: 1.3rem; cursor: pointer; padding: 12px; border-radius: 16px; transition: 0.3s; display: flex; align-items: center; }
        .icon:hover { background: var(--panel); }
        .p-circle { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--accent); cursor: pointer; }

        /* --- POPUP WINDOWS --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 900; backdrop-filter: blur(10px); animation: fadeIn 0.3s; }
        .popup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; max-width: 480px; background: var(--panel); z-index: 1000; 
            border-radius: 30px; padding: 30px; display: none; box-shadow: var(--shadow);
            border: 1px solid var(--border); animation: scaleIn 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }

        /* --- MAIN VIEWS --- */
        .content { flex: 1; overflow-y: auto; padding: 25px; scroll-behavior: smooth; }
        .view { display: none; animation: fadeIn 0.5s; }
        .view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }

        /* --- CARDS --- */
        .card { cursor: pointer; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
        .card:hover { transform: translateY(-10px); }
        .t-wrap { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: var(--radius); overflow: hidden; background: #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .t-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .c-meta { display: flex; gap: 14px; padding: 15px 5px; }
        .c-logo { width: 40px; height: 40px; border-radius: 50%; background: #222; flex-shrink: 0; border: 1px solid var(--border); object-fit: cover; }
        .c-title { font-weight: 700; font-size: 1.05rem; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .c-sub { color: var(--muted); font-size: 0.85rem; margin-top: 5px; font-weight: 500; }

        /* --- PRO PLAYER --- */
        #p-stage { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 24px; overflow: hidden; box-shadow: var(--shadow); }
        .p-controls { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .p-btn { background: var(--panel); border: 1px solid var(--border); color: white; padding: 14px 28px; border-radius: 18px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .p-btn:hover { background: var(--accent); transform: scale(1.05); }

        /* --- SETTINGS & LISTS --- */
        .row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 12px; transition: 0.2s; }
        .row:hover { background: rgba(128,128,128,0.05); }

        .loader { border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="Popup.closeAll()"></div>

<!-- AUTH -->
<div id="auth-view" class="auth-screen">
    <div class="auth-card">
        <h1 class="logo">Focused<span>Tube</span></h1>
        <p style="color: var(--muted); margin-bottom: 20px;">Your Distraction-Free Study Hub</p>
        <input id="userIn" placeholder="Username">
        <input id="passIn" type="password" placeholder="Password">
        <button onclick="Auth.exec('login')">Sign In</button>
        <p style="font-size:0.85rem; color:var(--muted); margin-top:20px; cursor:pointer;" onclick="Auth.exec('reg')">Don't have an account? <b>Register</b></p>
    </div>
</div>

<!-- MAIN -->
<div id="app">
    <nav class="topbar">
        <div class="logo" onclick="Router.go('home')">Focused<span>Tube</span></div>
        <div class="nav-icons">
            <div class="icon" onclick="Popup.open('search-pop')">🔍</div>
            <div class="icon" onclick="Popup.open('subs-pop')">📺</div>
            <div class="icon" onclick="Popup.open('plist-pop')">📁</div>
            <div class="icon" onclick="Router.go('history')">⏱</div>
            <div class="icon" onclick="Popup.open('settings-pop')">
                <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Focused" class="p-circle">
            </div>
        </div>
    </nav>

    <!-- POPUPS -->
    <div id="search-pop" class="popup">
        <h3>Smart Search</h3>
        <div style="display:flex; gap:12px;">
            <input id="sq" placeholder="Search YouTube...">
            <button onclick="App.search()" style="width:80px">Go</button>
        </div>
        <div id="search-results" class="grid" style="margin-top:20px; max-height:400px; overflow-y:auto;"></div>
    </div>

    <div id="subs-pop" class="popup">
        <h3>Subscribed Channels</h3>
        <div style="display:flex; gap:12px; margin-bottom:20px;">
            <input id="chIn" placeholder="@handle or Channel ID">
            <button onclick="App.addChannel()" style="width:80px">Add</button>
        </div>
        <div id="subs-list" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <div id="plist-pop" class="popup">
        <h3>My Collections</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input id="plName" placeholder="Playlist Name">
            <button onclick="App.createPlaylist()" style="width:100px">Create</button>
        </div>
        <div id="plist-list"></div>
    </div>

    <div id="settings-pop" class="popup">
        <h3>App Settings</h3>
        <div class="row" onclick="App.toggleTheme()">
            <span>Switch Theme</span>
            <span>🌗</span>
        </div>
        <div class="row" onclick="App.clearHistory()">
            <span>Clear Watch History</span>
            <span>🗑</span>
        </div>
        <div class="row" onclick="Auth.logout()" style="color:var(--accent)">
            <span>Log Out</span>
            <span>👤</span>
        </div>
    </div>

    <main class="content">
        <!-- HOME -->
        <div id="view-home" class="view">
            <h2 id="home-title">Recommended Feed</h2>
            <div id="home-loader" class="loader hidden"></div>
            <div id="home-grid" class="grid"></div>
        </div>

        <!-- CHANNEL -->
        <div id="view-channel" class="view">
            <div id="ch-header" style="display:flex; align-items:center; gap:25px; padding:30px; background:var(--panel); border-radius:30px; margin-bottom:30px; border: 1px solid var(--border);">
                <img id="ch-lg" class="c-logo" style="width:100px; height:100px;">
                <div>
                    <h1 id="ch-name" style="margin:0; font-size: 2rem;">Channel Name</h1>
                    <p id="ch-meta" style="color:var(--muted); font-weight:600;"></p>
                </div>
            </div>
            <div id="ch-grid" class="grid"></div>
        </div>

        <!-- HISTORY -->
        <div id="view-history" class="view">
            <h2>Recently Watched</h2>
            <div id="history-grid" class="grid"></div>
        </div>

        <!-- PLAYER -->
        <div id="view-player" class="view">
            <div id="p-stage"><div id="yt-frame"></div></div>
            <div class="p-controls">
                <button class="p-btn" onclick="Player.skip(-10)">-10s</button>
                <button class="p-btn" onclick="Player.toggle()">Play / Pause</button>
                <button class="p-btn" onclick="Player.skip(10)">+10s</button>
            </div>
            <h2 id="p-title" style="font-size: 1.5rem; margin-top:0;">Video Title</h2>
            <p id="p-chan" style="color:var(--accent); font-weight:800; cursor:pointer; font-size: 1.1rem;"></p>
        </div>
    </main>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
/* =========================
   CORE LOGIC
========================= */
const API = "https://restless-brook-50e4.dkanha283.workers.dev";
let yt;

const state = {
    user: localStorage.getItem("login"),
    channels: JSON.parse(localStorage.getItem("channels") || "[]"),
    history: JSON.parse(localStorage.getItem("history") || "[]"),
    playlists: JSON.parse(localStorage.getItem("playlists") || "{}")
};

/* --- ROUTER --- */
const Router = {
    go(view) {
        Popup.closeAll();
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        if(view === 'home') App.loadHome();
        if(view === 'history') App.renderGrid(state.history, 'history-grid');
    }
};

/* --- POPUPS --- */
const Popup = {
    open(id) {
        this.closeAll();
        document.getElementById(id).style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        if(id === 'subs-pop') this.renderSubs();
        if(id === 'plist-pop') this.renderPlaylists();
    },
    closeAll() {
        document.querySelectorAll('.popup').forEach(p => p.style.display = 'none');
        document.getElementById('overlay').style.display = 'none';
    },
    renderSubs() {
        const list = document.getElementById('subs-list');
        list.innerHTML = state.channels.map((c, i) => `
            <div class="row">
                <div style="display:flex; align-items:center; gap:12px;" onclick="App.openChannel('${c.channelId}')">
                    <img src="${c.logo}" class="c-logo" style="width:32px; height:32px;">
                    <span style="font-weight:600;">${c.name}</span>
                </div>
                <span onclick="App.removeChannel(${i})" style="color:var(--accent); font-weight:bold;">✕</span>
            </div>`).join("");
    },
    renderPlaylists() {
        const list = document.getElementById('plist-list');
        list.innerHTML = Object.keys(state.playlists).map(name => `
            <div class="row" onclick="App.viewPlaylist('${name}')">
                <span style="font-weight:600;">📁 ${name}</span>
                <span style="color:var(--muted);">${state.playlists[name].length} videos</span>
            </div>`).join("");
    }
};

/* --- APP ENGINE --- */
const App = {
    async loadHome() {
        const grid = document.getElementById('home-grid');
        const loader = document.getElementById('home-loader');
        if(state.channels.length === 0) {
            grid.innerHTML = "<p style='text-align:center; padding:100px; color:var(--muted);'>No channels added yet.</p>";
            return;
        }
        loader.classList.remove('hidden');
        grid.innerHTML = "";
        
        let all = [];
        try {
            const promises = state.channels.map(async (ch) => {
                const res = await fetch(`${API}?sections=1&channelId=${ch.channelId}`);
                const d = await res.json();
                return (d.videos || []).map(v => ({...v, chLogo: ch.logo, chName: ch.name, chId: ch.channelId}));
            });
            const results = await Promise.all(promises);
            all = results.flat();
            
            // --- SHUFFLE ENGINE ---
            // Intermixes channels by sorting randomly but keeping newest relevance
            all = all.sort(() => Math.random() - 0.5); 

            loader.classList.add('hidden');
            this.renderGrid(all, 'home-grid');
        } catch(e) { loader.classList.add('hidden'); }
    },

    renderGrid(data, target) {
        const grid = document.getElementById(target);
        grid.innerHTML = data.map(v => `
            <div class="card" onclick='Player.init(${JSON.stringify(v).replace(/'/g, "&apos;")})'>
                <div class="t-wrap"><img src="${v.thumb}" loading="lazy"></div>
                <div class="c-meta">
                    <img src="${v.chLogo || 'https://via.placeholder.com/40'}" class="c-logo" onclick="event.stopPropagation(); App.openChannel('${v.chId}')">
                    <div>
                        <div class="c-title">${v.title}</div>
                        <div class="c-sub">${v.chName || 'Channel'} • ${v.date || ''}</div>
                    </div>
                </div>
            </div>`).join("");
    },

    async openChannel(id) {
        Router.go('channel');
        const grid = document.getElementById('ch-grid');
        grid.innerHTML = "Loading Channel...";
        try {
            const r = await fetch(`${API}?sections=1&channelId=${id}`);
            const d = await r.json();
            const ch = state.channels.find(c => c.channelId === id) || {name:"Channel", logo:""};
            document.getElementById('ch-lg').src = ch.logo;
            document.getElementById('ch-name').innerText = ch.name;
            document.getElementById('ch-meta').innerText = `${d.counts.videos} Videos • ${d.counts.shorts} Shorts`;
            
            const vids = [...(d.videos||[]), ...(d.shorts||[])].map(v => ({...v, chLogo: ch.logo, chName: ch.name, chId: id}));
            this.renderGrid(vids, 'ch-grid');
        } catch(e){ grid.innerHTML = "Error fetching channel."; }
    },

    async addChannel() {
        const val = document.getElementById('chIn').value.trim();
        if(!val) return;
        const r = await fetch(`${API}?handle=${val.replace("@","")}`);
        const d = await r.json();
        if(d.channelId) {
            state.channels.unshift(d);
            localStorage.setItem("channels", JSON.stringify(state.channels));
            Popup.renderSubs();
            this.loadHome();
        }
    },

    async search() {
        const q = document.getElementById('sq').value;
        const res = await fetch(`${API}?search=1&q=${encodeURIComponent(q)}`);
        const data = await res.json();
        this.renderGrid(data, 'search-results');
    },

    toggleTheme() {
        document.body.classList.toggle('light');
        localStorage.setItem("theme", document.body.classList.contains('light') ? 'light' : 'dark');
    },

    clearHistory() {
        state.history = [];
        localStorage.setItem("history", "[]");
        alert("Watch history cleared.");
        Router.go('home');
    }
};

/* --- PRO PLAYER --- */
const Player = {
    init(video) {
        Router.go('player');
        document.getElementById('p-title').innerText = video.title;
        document.getElementById('p-chan').innerText = video.chName || "Subscribed Channel";
        document.getElementById('p-chan').onclick = () => App.openChannel(video.chId);

        if(yt) {
            yt.loadVideoById(video.id);
        } else {
            yt = new YT.Player('yt-frame', {
                height: '100%', width: '100%', videoId: video.id,
                playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 },
                events: { 'onReady': (e) => e.target.playVideo() }
            });
        }
        state.history = [video, ...state.history.filter(v => v.id !== video.id)].slice(0, 50);
        localStorage.setItem("history", JSON.stringify(state.history));
    },
    skip(sec) { if(yt) yt.seekTo(yt.getCurrentTime() + sec, true); },
    toggle() { if(yt) yt.getPlayerState() === 1 ? yt.pauseVideo() : yt.playVideo(); }
};

/* --- AUTH --- */
const Auth = {
    exec(type) {
        const u = document.getElementById('userIn').value, p = document.getElementById('passIn').value;
        let users = JSON.parse(localStorage.getItem("users") || "{}");
        if(type === 'reg') {
            users[u] = p; localStorage.setItem("users", JSON.stringify(users)); alert("Account Registered.");
        } else {
            if(users[u] === p) { localStorage.setItem("login", u); location.reload(); }
            else alert("Invalid login.");
        }
    },
    logout() { localStorage.removeItem("login"); location.reload(); }
};

if(state.user) {
    document.getElementById('auth-view').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    Router.go('home');
    if(localStorage.getItem("theme") === "light") document.body.classList.add('light');
}
</script>
</body>
</html>
