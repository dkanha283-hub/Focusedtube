<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusedTube Ultimate</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #1e1e1e;
            --card: #282828;
            --text: #ffffff;
            --muted: #aaaaaa;
            --accent: #ff0000;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        body.light {
            --bg: #f9f9f9;
            --panel: #ffffff;
            --card: #ffffff;
            --text: #0f0f0f;
            --muted: #606060;
            --border: #e5e5e5;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            transition: background 0.3s ease;
        }

        /* --- AUTH SYSTEM --- */
        .auth-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .auth-card {
            background: var(--panel);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 320px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        /* --- LAYOUT --- */
        #app { display: none; }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 1.4rem; font-weight: bold; cursor: pointer; }
        .logo span { color: var(--accent); }

        .nav-icons { display: flex; gap: 15px; }
        .icon { 
            font-size: 1.3rem; 
            cursor: pointer; 
            padding: 8px; 
            border-radius: 50%;
            transition: background 0.2s;
        }
        .icon:hover { background: var(--card); }

        /* --- FLOATING PANEL (The Drawer) --- */
        .panel-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 900;
        }

        .floating-panel {
            position: fixed;
            top: -100%; /* Hidden above */
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 500px;
            background: var(--panel);
            z-index: 1000;
            border-radius: 0 0 20px 20px;
            padding: 20px;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow);
        }

        .floating-panel.open { top: 0; }

        /* --- CONTENT GRID --- */
        .content-area {
            padding: 20px;
            max-width: 1400px;
            margin: auto;
            height: calc(100vh - 70px);
            overflow-y: auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: transparent;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        .thumb {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            object-fit: cover;
            background: #333;
        }

        .v-info { padding: 10px 0; }
        .v-title { 
            font-weight: 600; 
            font-size: 0.95rem; 
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .v-meta { color: var(--muted); font-size: 0.85rem; }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div id="overlay" class="panel-overlay" onclick="closePanels()"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h2>Focused<span>Tube</span></h2>
        <input id="userIn" placeholder="Username">
        <input id="passIn" type="password" placeholder="Password">
        <button onclick="handleAuth('login')">Login</button>
        <p style="font-size: 0.8rem; color: var(--muted); margin-top: 15px;" onclick="handleAuth('reg')">New here? Create Account</p>
    </div>
</div>

<!-- MAIN APP -->
<div id="app">
    <div class="topbar">
        <div class="logo" onclick="showPage('home')">Focused<span>Tube</span></div>
        <div class="nav-icons">
            <span class="icon" onclick="togglePanel('search-panel')">🔍</span>
            <span class="icon" onclick="togglePanel('subs-panel')">📺</span>
            <span class="icon" onclick="showPage('history')">⏱</span>
            <span class="icon" onclick="toggleTheme()">🌗</span>
            <span class="icon" onclick="logout()">👤</span>
        </div>
    </div>

    <!-- SUBSCRIPTION PANEL -->
    <div id="subs-panel" class="floating-panel">
        <h3 style="margin-top:0">Subscribed Channels</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input id="chanInput" placeholder="@handle or ChannelID">
            <button onclick="addChannel()" style="width:80px">Add</button>
        </div>
        <div id="subs-list" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <!-- SEARCH PANEL -->
    <div id="search-panel" class="floating-panel">
        <h3 style="margin-top:0">Search Distraction-Free</h3>
        <input id="searchInput" placeholder="Search YouTube..." onkeyup="if(event.key==='Enter') runSearch()">
        <div id="search-results" style="max-height:300px; overflow-y:auto; margin-top:10px;"></div>
    </div>

    <!-- MAIN CONTENT -->
    <main id="content" class="content-area">
        <div id="view-title"></div>
        <div id="main-grid" class="video-grid"></div>
        <div id="loader" style="text-align:center; padding:20px; display:none;">Loading...</div>
    </main>
</div>

<script>
/* =========================
   STATE & CONSTANTS
========================= */
const API = "https://restless-brook-50e4.dkanha283.workers.dev";
const PLAYER = "https://dkanha283-hub.github.io/Player/";

let state = {
    user: localStorage.getItem("login"),
    channels: JSON.parse(localStorage.getItem("channels") || "[]"),
    history: JSON.parse(localStorage.getItem("history") || "[]"),
    currentPage: 'home',
    visibleCount: 20,
    currentData: []
};

/* =========================
   INITIALIZATION
========================= */
function init() {
    if (localStorage.getItem("theme") === "light") document.body.classList.add("light");
    
    if (state.user) {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("app").style.display = "block";
        showPage('home');
    }
}
init();

/* =========================
   CORE FUNCTIONS
========================= */
function showPage(page) {
    state.currentPage = page;
    state.visibleCount = 20;
    closePanels();
    
    const grid = document.getElementById("main-grid");
    grid.innerHTML = "";
    
    if (page === 'home') {
        loadHomeFeed();
    } else if (page === 'history') {
        document.getElementById("view-title").innerHTML = "<h2>Watch History</h2>";
        renderGrid(state.history);
    }
}

async function loadHomeFeed() {
    if (state.channels.length === 0) {
        document.getElementById("main-grid").innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding:50px;'>Add channels to start your focused feed!</div>";
        return;
    }

    document.getElementById("loader").style.display = "block";
    let allVideos = [];

    // Fetch from all subs
    const fetchPromises = state.channels.map(async (ch) => {
        try {
            const r = await fetch(`${API}?sections=1&channelId=${ch.channelId}`);
            const d = await r.json();
            return [...(d.videos || []), ...(d.shorts || [])];
        } catch (e) { return []; }
    });

    const results = await Promise.all(fetchPromises);
    allVideos = results.flat();

    // Sort by newest & Filter duplicates
    allVideos.sort((a, b) => new Date(b.date) - new Date(a.date));
    state.currentData = Array.from(new Map(allVideos.map(v => [v.id, v])).values());

    document.getElementById("loader").style.display = "none";
    renderGrid(state.currentData);
}

function renderGrid(data) {
    const grid = document.getElementById("main-grid");
    const items = data.slice(0, state.visibleCount);
    
    grid.innerHTML = items.map(v => `
        <div class="card" onclick="openPlayer('${v.id}', '${encodeURIComponent(v.title)}', '${v.channelId}')">
            <img class="thumb" src="${v.thumb}" loading="lazy">
            <div class="v-info">
                <div class="v-title">${v.title}</div>
                <div class="v-meta">${v.channelName || 'Subscribed Channel'}</div>
            </div>
        </div>
    `).join("");
}

function openPlayer(id, title, channelId) {
    // Save to history
    const videoObj = { id, title: decodeURIComponent(title), thumb: `https://i.ytimg.com/vi/${id}/mqdefault.jpg`, channelId };
    state.history = [videoObj, ...state.history.filter(x => x.id !== id)].slice(0, 50);
    localStorage.setItem("history", JSON.stringify(state.history));

    window.location.href = `${PLAYER}?videoId=${id}&title=${title}&channelId=${channelId}`;
}

/* =========================
   UI HELPERS
========================= */
function togglePanel(id) {
    const panel = document.getElementById(id);
    const isOpening = !panel.classList.contains('open');
    
    closePanels();
    if (isOpening) {
        panel.classList.add('open');
        document.getElementById("overlay").style.display = "block";
        if (id === 'subs-panel') renderSubsList();
    }
}

function closePanels() {
    document.querySelectorAll('.floating-panel').forEach(p => p.classList.remove('open'));
    document.getElementById("overlay").style.display = "none";
}

function renderSubsList() {
    const list = document.getElementById("subs-list");
    list.innerHTML = state.channels.map((c, i) => `
        <div style="display:flex; align-items:center; justify-content:space-between; padding:10px; border-bottom:1px solid var(--border);">
            <div onclick="openChannelView('${c.channelId}', '${c.name}')" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
                <img src="${c.logo}" style="width:30px; height:30px; border-radius:50%;">
                <span>${c.name}</span>
            </div>
            <span onclick="removeChannel(${i})" style="cursor:pointer; color:var(--accent)">✕</span>
        </div>
    `).join("");
}

async function addChannel() {
    const val = document.getElementById("chanInput").value.trim();
    if (!val) return;

    const url = val.includes("@") ? `${API}?handle=${val.replace("@","")}` : `${API}?channelId=${val}`;
    try {
        const r = await fetch(url);
        const d = await r.json();
        state.channels.unshift({ channelId: d.channelId, name: d.name, logo: d.logo });
        localStorage.setItem("channels", JSON.stringify(state.channels));
        renderSubsList();
        document.getElementById("chanInput").value = "";
    } catch (e) { alert("Channel not found"); }
}

function removeChannel(i) {
    state.channels.splice(i, 1);
    localStorage.setItem("channels", JSON.stringify(state.channels));
    renderSubsList();
}

function toggleTheme() {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

/* =========================
   AUTH LOGIC
========================= */
function handleAuth(type) {
    const u = document.getElementById("userIn").value;
    const p = document.getElementById("passIn").value;
    let users = JSON.parse(localStorage.getItem("users") || "{}");

    if (type === 'reg') {
        if (users[u]) return alert("Exists");
        users[u] = p;
        localStorage.setItem("users", JSON.stringify(users));
        alert("Created!");
    } else {
        if (users[u] === p) {
            localStorage.setItem("login", u);
            location.reload();
        } else alert("Error");
    }
}

function logout() {
    localStorage.removeItem("login");
    location.reload();
}

/* =========================
   INFINITE SCROLL
========================= */
document.getElementById("content").addEventListener("scroll", (e) => {
    const el = e.target;
    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 100) {
        if (state.visibleCount < state.currentData.length) {
            state.visibleCount += 20;
            renderGrid(state.currentData);
        }
    }
});
</script>
</body>
</html>
