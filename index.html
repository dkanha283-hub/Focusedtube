<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    .navbar {
      width:100%;
      background:white;
      padding:10px 20px;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #ddd;
    }

    .container {
      display:flex;
      width:100%;
      height:calc(100vh - 50px);
    }

    .sidebar {
      width:250px;
      background:white;
      border-right:1px solid #ddd;
      overflow:auto;
    }

    .channel {
      display:flex;
      justify-content:space-between;
      padding:10px;
      border-bottom:1px solid #eee;
      cursor:pointer;
    }

    .main {
      flex:1;
      padding:10px;
      overflow:hidden;
    }

    .videos {
      height:100%;
      overflow-y:auto;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:10px;
    }

    .video {
      background:white;
      border-radius:10px;
      overflow:hidden;
      cursor:pointer;
    }

    .video img { width:100%; }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <h2>FocusTube</h2>
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube</b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <input id="channelInput" placeholder="Paste channel link">
      <button onclick="addChannel()">Add</button>

      <div id="channelList"></div>

    </div>

    <!-- MAIN -->
    <div class="main">
      <div id="videos" class="videos"></div>
    </div>

  </div>

</div>

<script>

let channels = JSON.parse(localStorage.getItem("channels") || "[]");
let history = JSON.parse(localStorage.getItem("history") || "[]");
let pageIndex = 0;

// LOGIN
function login() {
  let u = username.value;
  let p = password.value;

  if (!u || !p) return alert("Enter details");

  localStorage.setItem("user", JSON.stringify({u,p}));
  startApp();
}

function logout() {
  localStorage.clear();
  location.reload();
}

function startApp() {
  loginDiv = document.getElementById("login");
  appDiv = document.getElementById("app");

  loginDiv.style.display = "none";
  appDiv.style.display = "block";

  renderChannels();
  loadFeed();
}

window.onload = () => {
  if (localStorage.getItem("user")) startApp();
};

// ADD CHANNEL
async function addChannel() {

  let input = document.getElementById("channelInput").value;

  let channel = await extractChannel(input);

  if (!channel) return alert("Invalid or unsupported link");

  channels.push(channel);
  localStorage.setItem("channels", JSON.stringify(channels));

  renderChannels();
  loadFeed();
}

// EXTRACT ID OR USERNAME
async function extractChannel(url) {

  // CASE 1: Already channel ID
  if (url.includes("channel/")) {
    return { type: "id", value: url.split("channel/")[1] };
  }

  // CASE 2: @username → convert to ID
  if (url.includes("@")) {

    try {
      let cleanUrl = url.split("?")[0];

      let proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(cleanUrl)}`;

      let res = await fetch(proxy);
      let data = await res.json();

      let html = data.contents;

      // 🔥 Extract channelId from page
      let match = html.match(/"channelId":"(UC[^"]+)"/);

      if (match && match[1]) {
        return { type: "id", value: match[1] };
      }

    } catch (e) {
      console.log("Error extracting channel ID");
    }
  }

  return null;
}

// DELETE CHANNEL
function deleteChannel(i) {
  channels.splice(i,1);
  localStorage.setItem("channels", JSON.stringify(channels));
  renderChannels();
  loadFeed();
}

// RENDER CHANNELS
function renderChannels() {
  let list = document.getElementById("channelList");
  list.innerHTML = "";

  channels.forEach((c,i) => {
    let div = document.createElement("div");
    div.className = "channel";

    div.innerHTML = `
      <span>${c.value}</span>
      <span onclick="deleteChannel(${i})">🗑</span>
    `;

    list.appendChild(div);
  });
}

// LOAD FEED (INFINITE BASE)
async function loadFeed() {
  document.getElementById("videos").innerHTML = "";
  pageIndex = 0;
  loadMore();
}

// LOAD MORE
async function loadMore() {

  for (let c of channels) {
    await loadRSS(c);
  }
}

// RSS FETCH
async function loadRSS(channel) {

  let channelUrl =
    channel.type === "id"
    ? `https://www.youtube.com/feeds/videos.xml?channel_id=${channel.value}`
    : `https://www.youtube.com/feeds/videos.xml?user=${channel.value}`;

  let url = `https://api.allorigins.win/get?url=${encodeURIComponent(channelUrl)}`;

  let res = await fetch(url);
  let data = await res.json();

  let parser = new DOMParser();
  let xml = parser.parseFromString(data.contents, "text/xml");

  let entries = xml.getElementsByTagName("entry");

  let container = document.getElementById("videos");

  for (let i=0;i<entries.length;i++) {

    let vid = entries[i].getElementsByTagName("yt:videoId")[0].textContent;
    let title = entries[i].getElementsByTagName("title")[0].textContent;

    let thumb = `https://img.youtube.com/vi/${vid}/mqdefault.jpg`;

    let div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `<img src="${thumb}"><div>${title}</div>`;

    div.onclick = () => {
      history.unshift(title);
      localStorage.setItem("history", JSON.stringify(history));
      window.open(`https://youtube.com/watch?v=${vid}`);
    };

    container.appendChild(div);
  }
}

// INFINITE SCROLL
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("videos").addEventListener("scroll", (e) => {
    let el = e.target;
    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 50) {
      loadMore();
    }
  });
});

</script>

</body>
</html>
