<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    .navbar {
      width:100%;
      padding:10px;
      background:white;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #ddd;
    }

    .container {
      display:flex;
      width:100%;
      height:calc(100vh - 50px);
    }

    .sidebar {
      width:260px;
      background:white;
      border-right:1px solid #ddd;
      padding:10px;
      overflow:auto;
    }

    .main {
      flex:1;
      padding:10px;
      overflow:auto;
    }

    iframe {
      width:100%;
      height:300px;
      margin-bottom:15px;
      border-radius:10px;
      border:none;
    }

    .channel {
      padding:8px;
      margin-bottom:5px;
      background:#fafafa;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>FocusTube</h2>
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube 🚀</b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <div class="sidebar">

      <input id="channelInput" placeholder="Paste channel ID or link">
      <button onclick="addChannel()">Add</button>

      <h3>Subscriptions</h3>
      <div id="channelList"></div>

    </div>

    <div class="main" id="videos"></div>

  </div>

</div>

<script>

// LOGIN
window.onload=()=>{
  if(localStorage.getItem("user")) showApp();
};

function login(){
  if(!username.value||!password.value) return alert("Enter details");
  localStorage.setItem("user","ok");
  showApp();
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  loadChannels();
}

// DATA
let channels=[];

function loadChannels(){
  channels=JSON.parse(localStorage.getItem("channels")||"[]");
  renderChannels();
  loadFeed();
}

// EXTRACT CHANNEL ID
function extractId(input){
  if(input.includes("channel/")) return input.split("channel/")[1];
  if(input.startsWith("UC")) return input;
  return null;
}

// ADD CHANNEL
function addChannel(){
  let input=channelInput.value.trim();
  let id=extractId(input);

  if(!id) return alert("Invalid channel link");

  if(channels.includes(id)) return alert("Already added");

  channels.push(id);
  localStorage.setItem("channels", JSON.stringify(channels));

  renderChannels();
  loadFeed();
}

// SIDEBAR
function renderChannels(){
  channelList.innerHTML="";
  channels.forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="channel";

    div.innerHTML=`
      ${c}
      <span onclick="deleteChannel(${i})">❌</span>
    `;

    channelList.appendChild(div);
  });
}

function deleteChannel(i){
  channels.splice(i,1);
  localStorage.setItem("channels", JSON.stringify(channels));
  renderChannels();
  loadFeed();
}

// 🚀 FEED (EMBED METHOD)
function loadFeed(){

  let container=document.getElementById("videos");
  container.innerHTML="";

  channels.forEach(id=>{

    let iframe=document.createElement("iframe");

    iframe.src=`https://www.youtube.com/embed?listType=user_uploads&list=${id}`;

    container.appendChild(iframe);

  });
}

</script>

</body>
</html>
