<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
<div id="debug" style="
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:black;
color:lime;
padding:10px;
font-size:12px;
z-index:9999;
max-height:150px;
overflow:auto;">
Debug:
</div>
  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login-screen {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    .navbar {
      height:60px;
      background:white;
      display:flex;
      align-items:center;
      padding:0 20px;
      border-bottom:1px solid #ddd;
    }

    .nav-icons {
      margin-left:auto;
      display:flex;
      gap:20px;
      align-items:center;
      cursor:pointer;
    }

    .profile {
      width:32px;
      height:32px;
      border-radius:50%;
    }

    #logoutBtn {
      position:absolute;
      top:60px;
      right:20px;
      background:white;
      padding:10px;
      border:1px solid #ddd;
      display:none;
    }

    #subsPanel {
      position:fixed;
      top:70px;
      right:20px;
      width:280px;
      height:350px;
      background:white;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      display:none;
      overflow:auto;
      padding:10px;
    }

    .channel-item {
      display:flex;
      gap:10px;
      padding:8px;
      cursor:pointer;
    }

    .channel-item img {
      width:30px;
      height:30px;
      border-radius:50%;
    }

    .main { padding:15px; }

    .videos {
      height:70vh;
      overflow-y:auto;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:15px;
    }

    .video {
      background:white;
      border-radius:10px;
      overflow:hidden;
      cursor:pointer;
    }

    .video img { width:100%; }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <h2>FocusTube</h2>
  <button onclick="login()">Sign in with Google</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube</b>

    <div class="nav-icons">
      <span onclick="goHome()">🏠</span>
      <span onclick="toggleSubs()">📺</span>
      <img id="profilePic" class="profile" onclick="toggleLogout()">
    </div>
  </div>

  <div id="logoutBtn" onclick="logout()">Logout</div>

  <div id="subsPanel">
    <h3>Subscriptions</h3>
    <div id="channelList"></div>
  </div>

  <div class="main">
    <div id="videos" class="videos"></div>
  </div>

</div>

<script>

let accessToken = localStorage.getItem("token");
let channels = [];
let index = 0;

// 🔥 AUTO LOGIN FIX
window.onload = () => {
  if (accessToken) {
    startApp();
  }
};

// LOGIN
function login() {
  google.accounts.oauth2.initTokenClient({
    client_id: "901526621368-k63bfsq7aomg2e2k6u0625bub9291dhs.apps.googleusercontent.com",
    scope: "https://www.googleapis.com/auth/youtube.readonly https://www.googleapis.com/auth/userinfo.profile",
    prompt: "consent", // 🔥 IMPORTANT
    callback: (res) => {

      accessToken = res.access_token;

      // 🔥 force fresh token every time
      localStorage.setItem("token", accessToken);

      startApp();
    }
  }).requestAccessToken();
}

// START APP (IMPORTANT)
function startApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  loadProfile();
  loadSubscriptions();
}

// PROFILE
async function loadProfile() {
  try {
    let res = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
      headers: { Authorization: "Bearer " + accessToken }
    });

    let data = await res.json();
    document.getElementById("profilePic").src = data.picture;

  } catch (e) {
    console.log("Profile error");
  }
}

function toggleLogout() {
  let btn = document.getElementById("logoutBtn");
  btn.style.display = btn.style.display === "block" ? "none" : "block";
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

// SUB PANEL
function toggleSubs() {
  let panel = document.getElementById("subsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

// LOAD SUBSCRIPTIONS
async function loadSubscriptions() {

  let debug = document.getElementById("debug");

  try {
    let res = await fetch(
      "https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=20",
      { headers: { Authorization: "Bearer " + accessToken } }
    );

    let data = await res.json();

    debug.innerHTML += "<br>API Response: " + JSON.stringify(data);

    if (!data.items || data.items.length === 0) {
      debug.innerHTML += "<br>❌ No subscriptions OR permission problem";
      return;
    }

    channels = data.items.map(i => i.snippet.resourceId.channelId);
    index = 0;

    let list = document.getElementById("channelList");
    list.innerHTML = "";

    data.items.forEach(item => {
      let div = document.createElement("div");
      div.className = "channel-item";

      div.innerHTML = `
        <img src="${item.snippet.thumbnails.default.url}">
        <span>${item.snippet.title}</span>
      `;

      list.appendChild(div);
    });

    loadMoreVideos();

  } catch (e) {
    debug.innerHTML += "<br>❌ ERROR: " + e;
  }
}
// LOAD FEED
async function loadMoreVideos() {
  let container = document.getElementById("videos");

  for (let i = 0; i < 3; i++) {
    if (index >= channels.length) return;

    let channelId = channels[index++];

    let res = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=3&type=video`,
      { headers: { Authorization: "Bearer " + accessToken } }
    );

    let data = await res.json();

    data.items.forEach(video => {
      let vid = video.id.videoId;
      let thumb = video.snippet.thumbnails.medium.url;

      let div = document.createElement("div");
      div.className = "video";
      div.innerHTML = `<img src="${thumb}">`;

      div.onclick = () => {
        window.open(`https://youtube.com/watch?v=${vid}`);
      };

      container.appendChild(div);
    });
  }
}

// SCROLL
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("videos").addEventListener("scroll", (e) => {
    let el = e.target;
    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 100) {
      loadMoreVideos();
    }
  });
});

// HOME
function goHome() {
  document.getElementById("videos").innerHTML = "";
  index = 0;
  loadMoreVideos();
}

// CHANNEL
async function loadChannelVideos(channelId) {
  let res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=10&type=video`,
    { headers: { Authorization: "Bearer " + accessToken } }
  );

  let data = await res.json();

  let container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach(video => {
    let vid = video.id.videoId;
    let thumb = video.snippet.thumbnails.medium.url;

    let div = document.createElement("div");
    div.className = "video";
    div.innerHTML = `<img src="${thumb}">`;

    container.appendChild(div);
  });
}

</script>

</body>
</html>
