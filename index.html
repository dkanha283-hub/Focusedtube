<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FocusedTube</title>

<style>
:root{
--bg:#0f0f0f;
--panel:#181818;
--card:#262626;
--text:#fff;
--muted:#aaa;
--accent:#ff2d2d;
--border:#333;
}

body.light{
--bg:#f5f5f5;
--panel:#fff;
--card:#fff;
--text:#111;
--muted:#666;
--border:#ddd;
}

body{margin:0;background:var(--bg);color:var(--text);font-family:sans-serif}
*{box-sizing:border-box}

/* LOGIN */
.auth{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}
.auth input,.auth button{
width:260px;padding:12px;border-radius:10px;border:none;
}
.auth button{background:var(--accent);color:#fff;font-weight:bold}

/* APP */
.app{display:none;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{
display:flex;justify-content:space-between;
padding:10px;background:var(--panel);
border-bottom:1px solid var(--border);
}
.icon{padding:8px;background:#222;border-radius:10px;cursor:pointer}

/* CONTENT */
.content{
height:calc(100vh - 50px);
overflow:auto;padding:12px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:12px;
}

/* CARD */
.card{
background:var(--card);
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.2s;
}
.card:hover{transform:scale(1.03)}
.thumb{width:100%;aspect-ratio:16/9}
.title{padding:8px;font-size:14px}

/* PANEL */
.panel{
position:fixed;top:60px;right:10px;
width:300px;background:var(--panel);
padding:10px;border-radius:10px;
display:none;
}
.panel.open{display:block}

.empty{text-align:center;color:#aaa;margin-top:20px}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="auth">
<h2>FocusedTube</h2>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Create Account</button>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="topbar">
<div>📌 FocusedTube</div>
<div>
<span class="icon" onclick="showHome()">🏠</span>
<span class="icon" onclick="toggleSubs()">📺</span>
<span class="icon" onclick="showHistory()">⏱</span>
<span class="icon" onclick="toggleTheme()">🌗</span>
<span class="icon" onclick="logout()">👤</span>
</div>
</div>

<div id="subs" class="panel"></div>

<div id="content" class="content"></div>

</div>

<script>
const API="https://restless-brook-50e4.dkanha283.workers.dev";
const PLAYER="https://dkanha283-hub.github.io/Player/";

let channels=[],historyData=[],homeData=[];
let visible=20,page="home";

/* INIT */
function init(){
channels=JSON.parse(localStorage.getItem("channels")||"[]");
historyData=JSON.parse(localStorage.getItem("history")||"[]");

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
}

if(localStorage.getItem("login")){
auth.style.display="none";
app.style.display="block";
showHome();
}else{
auth.style.display="flex";
app.style.display="none";
}
}
init();

/* AUTH */
function register(){
let users=JSON.parse(localStorage.getItem("users")||"{}");
if(users[u.value]) return alert("User exists");
users[u.value]=p.value;
localStorage.setItem("users",JSON.stringify(users));
alert("Created");
}
function login(){
let users=JSON.parse(localStorage.getItem("users")||"{}");
if(users[u.value]===p.value){
localStorage.setItem("login","1");
init();
}else alert("Invalid");
}
function logout(){
localStorage.removeItem("login");
location.reload();
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem("theme",
document.body.classList.contains("light")?"light":"dark");
}

/* CARD */
function card(v){
let d=document.createElement("div");
d.className="card";
d.innerHTML=`
<img class="thumb" src="${v.thumb}">
<div class="title">${v.title}</div>`;
d.onclick=()=>openPlayer(v);
return d;
}

/* PLAYER */
function openPlayer(v){
historyData=[v,...historyData.filter(x=>x.id!==v.id)].slice(0,50);
localStorage.setItem("history",JSON.stringify(historyData));

location.href=`${PLAYER}?videoId=${v.id}&title=${encodeURIComponent(v.title)}&channelId=${v.channelId}`;
}

/* HOME */
async function showHome(){
page="home";content.innerHTML="Loading...";
let all=[];

for(let ch of channels){
let r=await fetch(`${API}?sections=1&channelId=${ch.channelId}`);
let d=await r.json();

all.push(...(d.videos||[]).slice(0,200));
all.push(...(d.shorts||[]).slice(0,100));
}

all.sort((a,b)=>new Date(b.date)-new Date(a.date));
homeData=all;
renderHome();
}

function renderHome(){
content.innerHTML="";
let g=document.createElement("div");
g.className="grid";

homeData.slice(0,visible).forEach(v=>g.appendChild(card(v)));

if(!homeData.length) content.innerHTML="<div class='empty'>No videos</div>";
else content.appendChild(g);
}

/* HISTORY */
function showHistory(){
page="history";
content.innerHTML="";
let g=document.createElement("div");
g.className="grid";
historyData.forEach(v=>g.appendChild(card(v)));
content.appendChild(g);
}

/* SUBS */
function toggleSubs(){
subs.classList.toggle("open");

subs.innerHTML=`
<input id="ch" placeholder="@handle or channelId">
<button onclick="addChannel()">Add</button>
${channels.map((c,i)=>`<div onclick="removeCh(${i})">${c.name} ❌</div>`).join("")}
`;
}

async function addChannel(){
let val=ch.value.trim();

let url=val.includes("@")
?`${API}?handle=${val.replace("@","")}`
:`${API}?id=${val}`;

let r=await fetch(url);
let d=await r.json();

channels.unshift({
channelId:d.channelId,
name:d.name,
logo:d.logo
});

localStorage.setItem("channels",JSON.stringify(channels));
toggleSubs();
}

function removeCh(i){
channels.splice(i,1);
localStorage.setItem("channels",JSON.stringify(channels));
toggleSubs();
}

/* SCROLL */
content.addEventListener("scroll",()=>{
if(content.scrollTop+content.clientHeight>=content.scrollHeight-100){
visible+=20;
if(page==="home") renderHome();
}
});
</script>

</body>
</html>
