<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #181818;
      padding: 15px;
      border-right: 1px solid #333;
      overflow-y: auto;
    }

    .channel {
      padding: 10px;
      background: #222;
      margin-bottom: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    .channel:hover {
      background: #333;
    }

    .main {
      flex: 1;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .player {
      width: 100%;
      height: 300px;
      border: none;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .videos {
      overflow-y: auto;
    }

    .video {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .video img {
      width: 150px;
      border-radius: 8px;
    }

    .video-title {
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #333;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <button onclick="login()">Sign in with Google</button>
  <div id="channelList"></div>
</div>

<div class="main">
  <iframe id="player" class="player"></iframe>
  <div id="videos" class="videos"></div>
</div>

<script>

let accessToken = "";

// LOGIN
function login() {
  google.accounts.oauth2.initTokenClient({
    client_id: "901526621368-k63bfsq7aomg2e2k6u0625bub9291dhs.apps.googleusercontent.com",
    scope: "https://www.googleapis.com/auth/youtube.readonly",
    callback: (res) => {
      accessToken = res.access_token;
      loadSubscriptions();
    }
  }).requestAccessToken();
}

// LOAD CHANNELS
async function loadSubscriptions() {
  let res = await fetch(
    "https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50",
    {
      headers: { Authorization: "Bearer " + accessToken }
    }
  );

  let data = await res.json();

  let list = document.getElementById("channelList");
  list.innerHTML = "";

  data.items.forEach(item => {
    let div = document.createElement("div");
    div.className = "channel";
    div.innerText = item.snippet.title;

    div.onclick = () => loadVideos(item.snippet.resourceId.channelId);

    list.appendChild(div);
  });
}

// LOAD VIDEOS
async function loadVideos(channelId) {

  let res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=15&order=date&type=video`,
    {
      headers: { Authorization: "Bearer " + accessToken }
    }
  );

  let data = await res.json();

  let container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach((video, index) => {
    let vid = video.id.videoId;
    let title = video.snippet.title;
    let thumb = video.snippet.thumbnails.medium.url;

    let div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <img src="${thumb}">
      <div class="video-title">${title}</div>
    `;

    div.onclick = () => {
      document.getElementById("player").src =
        `https://www.youtube.com/embed/${vid}`;
    };

    container.appendChild(div);

    // Auto play first video
    if (index === 0) {
      document.getElementById("player").src =
        `https://www.youtube.com/embed/${vid}`;
    }
  });
}

</script>

</body>
</html>
