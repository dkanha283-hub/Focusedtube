<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login-screen {
      height:100vh; display:flex;
      justify-content:center; align-items:center;
      flex-direction:column;
    }

    .logo { font-size:40px; margin-bottom:20px; }

    .app { display:none; }

    .navbar {
      height:60px; background:white;
      display:flex; align-items:center;
      padding:0 20px;
      border-bottom:1px solid #ddd;
    }

    .nav-icons {
      margin-left:auto;
      display:flex;
      gap:20px;
      cursor:pointer;
    }

    #subsPanel {
      position:fixed;
      top:70px; right:20px;
      width:280px; height:350px;
      background:white;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      display:none;
      overflow:auto;
      padding:10px;
    }

    .channel-item {
      display:flex; gap:10px;
      padding:8px;
      cursor:pointer;
    }

    .channel-item img {
      width:30px; height:30px;
      border-radius:50%;
    }

    .main { padding:15px; }

    .videos {
      height:70vh;
      overflow-y:auto;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:15px;
    }

    .video {
      background:white;
      border-radius:10px;
      overflow:hidden;
      cursor:pointer;
    }

    .video img { width:100%; }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="logo">FocusedTube</div>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <div>FocusedTube</div>

    <div class="nav-icons">
      <span onclick="goHome()">🏠</span>
      <span onclick="toggleSubs()">📺</span>
    </div>
  </div>

  <div id="subsPanel">
    <h3>Subscriptions</h3>
    <div id="channelList"></div>
  </div>

  <div class="main">
    <div id="videos" class="videos"></div>
  </div>

</div>

<script>

let accessToken = "";
let channels = [];
let index = 0;

// LOGIN
function login() {
  google.accounts.oauth2.initTokenClient({
    client_id: "901526621368-k63bfsq7aomg2e2k6u0625bub9291dhs.apps.googleusercontent.com",
    scope: "https://www.googleapis.com/auth/youtube.readonly",
    callback: (res) => {
      accessToken = res.access_token;

      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").style.display = "block";

      loadSubscriptions();
    }
  }).requestAccessToken();
}

// TOGGLE PANEL
function toggleSubs() {
  let panel = document.getElementById("subsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

// LOAD SUBSCRIPTIONS
async function loadSubscriptions() {

  let res = await fetch(
    "https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=20",
    { headers: { Authorization: "Bearer " + accessToken } }
  );

  let data = await res.json();

  console.log("Subscriptions:", data);

  channels = data.items.map(i => i.snippet.resourceId.channelId);
  index = 0;

  let list = document.getElementById("channelList");
  list.innerHTML = "";

  data.items.forEach(item => {
    let div = document.createElement("div");
    div.className = "channel-item";

    div.innerHTML = `
      <img src="${item.snippet.thumbnails.default.url}">
      <span>${item.snippet.title}</span>
    `;

    div.onclick = () => loadChannelVideos(item.snippet.resourceId.channelId);

    list.appendChild(div);
  });

  loadMoreVideos(); // 🔥 THIS WAS MISSING
}

// LOAD MORE VIDEOS
async function loadMoreVideos() {

  let container = document.getElementById("videos");

  for (let i = 0; i < 3; i++) {

    if (index >= channels.length) return;

    let channelId = channels[index++];

    let res = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=3&type=video`,
      { headers: { Authorization: "Bearer " + accessToken } }
    );

    let data = await res.json();

    data.items.forEach(video => {
      let vid = video.id.videoId;
      let thumb = video.snippet.thumbnails.medium.url;

      let div = document.createElement("div");
      div.className = "video";

      div.innerHTML = `<img src="${thumb}">`;

      div.onclick = () => {
        window.open(`https://www.youtube.com/watch?v=${vid}`, "_blank");
      };

      container.appendChild(div);
    });
  }
}

// SCROLL
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("videos").addEventListener("scroll", (e) => {
    let el = e.target;

    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 100) {
      loadMoreVideos();
    }
  });
});

// CHANNEL VIDEOS
async function loadChannelVideos(channelId) {

  let res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=10&type=video`,
    { headers: { Authorization: "Bearer " + accessToken } }
  );

  let data = await res.json();

  let container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach(video => {
    let vid = video.id.videoId;
    let thumb = video.snippet.thumbnails.medium.url;

    let div = document.createElement("div");
    div.className = "video";
    div.innerHTML = `<img src="${thumb}">`;

    container.appendChild(div);
  });
}

// HOME
function goHome() {
  document.getElementById("videos").innerHTML = "";
  index = 0;
  loadMoreVideos();
}

</script>

</body>
</html>
