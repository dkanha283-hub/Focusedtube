<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusedTube Ultimate</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #1e1e1e;
            --card: #282828;
            --text: #ffffff;
            --muted: #aaaaaa;
            --accent: #ff0000;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        body.light {
            --bg: #f9f9f9;
            --panel: #ffffff;
            --card: #ffffff;
            --text: #0f0f0f;
            --muted: #606060;
            --border: #e5e5e5;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.3s ease;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- AUTH SYSTEM --- */
        .auth-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; box-shadow: var(--shadow); text-align: center; width: 320px; animation: fadeIn 0.5s ease; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text); font-size: 16px; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        /* --- NAVIGATION --- */
        #app { display: none; height: 100vh; flex-direction: column; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: bold; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-icons { display: flex; gap: 8px; }
        .icon { font-size: 1.2rem; cursor: pointer; padding: 10px; border-radius: 12px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .icon.active { color: var(--accent); background: rgba(255,0,0,0.1); }

        /* --- FLOATING PANELS --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 900; backdrop-filter: blur(8px); }
        .floating-panel { position: fixed; top: -110%; left: 50%; transform: translateX(-50%); width: 95%; max-width: 550px; background: var(--panel); z-index: 1000; border-radius: 0 0 24px 24px; padding: 24px; transition: top 0.5s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: var(--shadow); border: 1px solid var(--border); }
        .floating-panel.open { top: 0; }

        /* --- GRID & CARDS --- */
        .content-area { flex: 1; padding: 20px; overflow-y: auto; max-width: 1600px; margin: auto; width: 100%; box-sizing: border-box; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .card { background: transparent; cursor: pointer; transition: 0.3s; position: relative; animation: slideUp 0.4s ease forwards; }
        .thumb-container { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; background: #222; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .v-info { padding: 12px 0; }
        .v-title { font-weight: 600; font-size: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .add-to-plist { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; border: none; border-radius: 10px; width: 32px; height: 32px; font-size: 1.2rem; cursor: pointer; z-index: 5; opacity: 0; transition: 0.3s; }
        .card:hover .add-to-plist { opacity: 1; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; width: 28px; height: 28px; animation: spin 0.8s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closePanels()"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h2>Focused<span>Tube</span></h2>
        <input id="userIn" placeholder="Username">
        <input id="passIn" type="password" placeholder="Password">
        <button onclick="handleAuth('login')">Login</button>
        <p style="font-size: 0.8rem; color: var(--muted); margin-top: 15px; cursor:pointer;" onclick="handleAuth('reg')">Create Account</p>
    </div>
</div>

<!-- APP -->
<div id="app">
    <div class="topbar">
        <div class="logo" onclick="showPage('home')">Focused<span>Tube</span></div>
        <div class="nav-icons">
            <span class="icon" id="nav-search" onclick="togglePanel('search-panel')">🔍</span>
            <span class="icon" id="nav-subs" onclick="togglePanel('subs-panel')">📺</span>
            <span class="icon" id="nav-plist" onclick="togglePanel('plist-panel')">📁</span>
            <span class="icon" id="nav-history" onclick="showPage('history')">⏱</span>
            <span class="icon" onclick="toggleTheme()">🌗</span>
            <span class="icon" onclick="logout()">👤</span>
        </div>
    </div>

    <!-- PANELS -->
    <div id="search-panel" class="floating-panel">
        <h3>Search</h3>
        <div style="display:flex; gap:10px;"><input id="searchInput" placeholder="Search..." onkeyup="if(event.key==='Enter') runSearch()"><button onclick="runSearch()" style="width:80px">Go</button></div>
        <div id="search-results" style="max-height:400px; overflow-y:auto; margin-top:15px;" class="video-grid"></div>
        <div id="search-loader" class="loader hidden"></div>
    </div>

    <div id="subs-panel" class="floating-panel">
        <h3>Channels</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;"><input id="chanInput" placeholder="@handle"><button onclick="addChannel()">Add</button></div>
        <div id="subs-list" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <div id="plist-panel" class="floating-panel">
        <h3>Playlists</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;"><input id="plistInput" placeholder="Name"><button onclick="createPlaylist()">Create</button></div>
        <div id="plist-list" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <div id="add-to-plist-panel" class="floating-panel" style="z-index: 1100;">
        <h3 id="plist-video-title" style="font-size:0.9rem;"></h3>
        <div id="plist-selection-list"></div>
    </div>

    <main id="content" class="content-area">
        <div id="page-header"></div>
        <div id="main-grid" class="video-grid"></div>
        <div id="main-loader" class="loader hidden"></div>
    </main>
</div>

<script>
/* --- CONFIG --- */
const API = "https://restless-brook-50e4.dkanha283.workers.dev";
const PLAYER_BASE = "https://dkanha283-hub.github.io/Player/";

let state = {
    user: localStorage.getItem("login"),
    channels: JSON.parse(localStorage.getItem("channels") || "[]"),
    history: JSON.parse(localStorage.getItem("history") || "[]"),
    playlists: JSON.parse(localStorage.getItem("playlists") || "{}"),
    currentPage: 'home',
    currentData: [],
    pendingVideo: null
};

function init() {
    if (localStorage.getItem("theme") === "light") document.body.classList.add("light");
    if (state.user) {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("app").style.display = "flex";
        showPage('home');
    }
}
init();

/* --- PLAYER FIX: Ensuring embed compatibility --- */
function openVideo(id, title, channelId) {
    const video = { id, title: decodeURIComponent(title), thumb: `https://i.ytimg.com/vi/${id}/mqdefault.jpg`, channelId };
    state.history = [video, ...state.history.filter(x => x.id !== id)].slice(0, 50);
    localStorage.setItem("history", JSON.stringify(state.history));

    // FIX: Passing origin and autoplay parameters to help bypass "ad not playing" blocks
    const encodedTitle = encodeURIComponent(title);
    const origin = window.location.origin;
    const playerUrl = `${PLAYER_BASE}?videoId=${id}&title=${encodedTitle}&channelId=${channelId}&origin=${origin}&autoplay=1`;
    
    window.location.href = playerUrl;
}

/* --- NAVIGATION --- */
function showPage(page, data = null) {
    state.currentPage = page;
    closePanels();
    document.getElementById("main-grid").innerHTML = "";
    const header = document.getElementById("page-header");
    
    if (page === 'home') {
        header.innerHTML = "<h2>Home Feed</h2>";
        loadHomeFeed();
    } else if (page === 'history') {
        header.innerHTML = "<h2>History</h2>";
        renderGrid(state.history);
    } else if (page === 'playlist-view') {
        header.innerHTML = `<h2>📁 ${data}</h2>`;
        renderGrid(state.playlists[data] || []);
    }
}

async function loadHomeFeed() {
    if (state.channels.length === 0) {
        document.getElementById("main-grid").innerHTML = "<p style='grid-column:1/-1;text-align:center;'>Add channels to start.</p>";
        return;
    }
    document.getElementById("main-loader").classList.remove("hidden");
    let all = [];
    try {
        const promises = state.channels.map(async (ch) => {
            const res = await fetch(`${API}?sections=1&channelId=${ch.channelId}`);
            const d = await res.json();
            return [...(d.videos || []), ...(d.shorts || [])];
        });
        const results = await Promise.all(promises);
        all = results.flat().sort((a,b) => new Date(b.date) - new Date(a.date));
        state.currentData = Array.from(new Map(all.map(v => [v.id, v])).values());
    } catch (e) { console.error(e); }
    document.getElementById("main-loader").classList.add("hidden");
    renderGrid(state.currentData);
}

function renderGrid(data) {
    const grid = document.getElementById("main-grid");
    grid.innerHTML = data.map((v, i) => `
        <div class="card" style="animation-delay:${i*0.05}s" onclick="openVideo('${v.id}', '${encodeURIComponent(v.title)}', '${v.channelId || ''}')">
            <button class="add-to-plist" onclick="promptAddToPlaylist(event, '${v.id}', '${encodeURIComponent(v.title)}', '${v.thumb}', '${v.channelId || ''}')">＋</button>
            <div class="thumb-container"><img class="thumb" src="${v.thumb}" loading="lazy"></div>
            <div class="v-info"><div class="v-title">${v.title}</div></div>
        </div>`).join("");
}

/* --- PLAYLISTS --- */
function createPlaylist() {
    const name = document.getElementById("plistInput").value.trim();
    if (!name || state.playlists[name]) return;
    state.playlists[name] = [];
    localStorage.setItem("playlists", JSON.stringify(state.playlists));
    renderPlaylistList();
}

function renderPlaylistList() {
    const list = document.getElementById("plist-list");
    list.innerHTML = Object.keys(state.playlists).map(name => `
        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid var(--border);">
            <div onclick="showPage('playlist-view', '${name}')" style="cursor:pointer;">📁 ${name}</div>
            <span onclick="deletePlaylist('${name}')" style="color:var(--accent); cursor:pointer;">✕</span>
        </div>`).join("");
}

function deletePlaylist(name) {
    delete state.playlists[name];
    localStorage.setItem("playlists", JSON.stringify(state.playlists));
    renderPlaylistList();
}

function promptAddToPlaylist(e, vId, title, thumb, channelId) {
    e.stopPropagation();
    state.pendingVideo = { id: vId, title: decodeURIComponent(title), thumb, channelId };
    document.getElementById("plist-video-title").innerText = state.pendingVideo.title;
    const list = document.getElementById("plist-selection-list");
    const names = Object.keys(state.playlists);
    list.innerHTML = names.length ? names.map(name => `<div onclick="addToPlaylist('${name}')" style="padding:15px; cursor:pointer; border-bottom:1px solid var(--border);">Add to ${name}</div>`).join("") : "<p>No playlists found.</p>";
    document.getElementById("overlay").style.display = "block";
    document.getElementById("add-to-plist-panel").classList.add("open");
}

function addToPlaylist(name) {
    if(!state.playlists[name].some(v => v.id === state.pendingVideo.id)) {
        state.playlists[name].push(state.pendingVideo);
        localStorage.setItem("playlists", JSON.stringify(state.playlists));
        alert("Saved!");
    }
    closePanels();
}

/* --- SEARCH & CHANNELS --- */
async function runSearch() {
    const q = document.getElementById("searchInput").value.trim();
    if (!q) return;
    const loader = document.getElementById("search-loader");
    loader.classList.remove("hidden");
    try {
        const res = await fetch(`${API}?search=1&q=${encodeURIComponent(q)}`);
        const data = await res.json();
        loader.classList.add("hidden");
        document.getElementById("search-results").innerHTML = data.map(v => `
            <div class="card" onclick="openVideo('${v.id}', '${encodeURIComponent(v.title)}', '${v.channelId || ''}')">
                <div class="thumb-container"><img class="thumb" src="${v.thumb}"></div>
                <div class="v-title" style="font-size:0.9rem;">${v.title}</div>
            </div>`).join("");
    } catch (e) { loader.classList.add("hidden"); }
}

async function addChannel() {
    const val = document.getElementById("chanInput").value.trim();
    if (!val) return;
    let url = val.includes("@") ? `${API}?handle=${val.replace("@","")}` : `${API}?id=${val}`;
    const res = await fetch(url);
    const d = await res.json();
    if (d.channelId) {
        state.channels.unshift({ channelId: d.channelId, name: d.name, logo: d.logo });
        localStorage.setItem("channels", JSON.stringify(state.channels));
        renderSubsList();
    }
}

function renderSubsList() {
    const list = document.getElementById("subs-list");
    list.innerHTML = state.channels.map((c, i) => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid var(--border);">
        <div onclick="openChannelView('${c.channelId}', '${c.name}')" style="cursor:pointer;">${c.name}</div>
        <span onclick="removeChannel(${i})" style="color:var(--accent); cursor:pointer;">✕</span></div>`).join("");
}

async function openChannelView(channelId, channelName) {
    state.currentPage = 'channel';
    closePanels();
    const grid = document.getElementById("main-grid");
    document.getElementById("page-header").innerHTML = `<h2>${channelName}</h2>`;
    document.getElementById("main-loader").classList.remove("hidden");
    const res = await fetch(`${API}?sections=1&channelId=${channelId}`);
    const data = await res.json();
    document.getElementById("main-loader").classList.add("hidden");
    renderGrid(data.videos || []);
}

function removeChannel(i) {
    state.channels.splice(i, 1);
    localStorage.setItem("channels", JSON.stringify(state.channels));
    renderSubsList();
}

/* --- UI HELPERS --- */
function togglePanel(id) {
    const panel = document.getElementById(id);
    const isOpen = panel.classList.contains("open");
    closeAllPanels();
    if (!isOpen) {
        panel.classList.add("open");
        document.getElementById("overlay").style.display = "block";
        if (id === 'subs-panel') renderSubsList();
        if (id === 'plist-panel') renderPlaylistList();
    }
}

function closePanels() {
    document.querySelectorAll('.floating-panel').forEach(p => p.classList.remove('open'));
    document.getElementById("overlay").style.display = "none";
}

function closeAllPanels() {
    document.querySelectorAll('.floating-panel').forEach(p => p.classList.remove('open'));
}

function toggleTheme() {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

function handleAuth(type) {
    const u = document.getElementById("userIn").value;
    const p = document.getElementById("passIn").value;
    let users = JSON.parse(localStorage.getItem("users") || "{}");
    if (type === 'reg') {
        users[u] = p; localStorage.setItem("users", JSON.stringify(users)); alert("Created!");
    } else {
        if (users[u] === p) { localStorage.setItem("login", u); location.reload(); }
        else alert("Error");
    }
}

function logout() { localStorage.removeItem("login"); location.reload(); }
</script>
</body>
</html>
