<!DOCTYPE html>
<html>
<head>
  <title>FocusedTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#111; color:white; }

    /* TOP BAR */
    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px;
      background:#181818;
    }

    .icons span {
      margin:0 8px;
      cursor:pointer;
      font-size:18px;
    }

    /* LOGIN */
    .login {
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    /* MAIN */
    .main {
      padding:15px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:15px;
    }

    iframe {
      width:100%;
      height:160px;
      border:none;
      border-radius:10px;
    }

    /* FLOAT PANEL */
    .panel {
      position:fixed;
      right:-300px;
      top:0;
      width:300px;
      height:100%;
      background:#181818;
      padding:10px;
      transition:0.3s;
      overflow:auto;
    }

    .panel.open {
      right:0;
    }

    .channel {
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:#282828;
      padding:8px;
      border-radius:8px;
      margin-bottom:8px;
    }

    .left {
      display:flex;
      align-items:center;
      gap:10px;
    }

    img {
      width:35px;
      height:35px;
      border-radius:50%;
    }

    input {
      width:100%;
      padding:8px;
      margin-bottom:5px;
      border-radius:6px;
      border:none;
    }

    button {
      width:100%;
      padding:8px;
      background:red;
      border:none;
      color:white;
      border-radius:6px;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>FocusedTube</h2>
  <input id="u" placeholder="Username">
  <input id="p" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <b>FocusedTube</b>

    <div class="icons">
      <span onclick="home()">🏠</span>
      <span onclick="togglePanel()">📺</span>
      <span onclick="history()">⏱️</span>
    </div>
  </div>

  <!-- FLOAT PANEL -->
  <div id="panel" class="panel">

    <input id="input" placeholder="@channel or link">
    <button onclick="add()">Add Channel</button>

    <h3>Subscriptions</h3>
    <div id="list"></div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <div id="homeView" class="grid"></div>
    <div id="channelView" style="display:none"></div>

  </div>

</div>

<script>

let channels=[];

// LOGIN
function login(){
  if(!u.value || !p.value) return alert("Enter details");
  localStorage.setItem("login","1");
  init();
}

function init(){
  if(localStorage.getItem("login")){
    loginPage.style.display="none";
    app.style.display="block";
    load();
  }
}
init();

// LOAD DATA
function load(){
  channels = JSON.parse(localStorage.getItem("channels")||"[]");
  render();
  home();
}

// ADD CHANNEL
async function add(){

  let link=input.value.trim();
  let api="https://restless-brook-50e4.dkanha283.workers.dev/";

  let res;

  if(link.includes("@")){
    let h=link.split("@")[1].split("?")[0];
    res=await fetch(api+"?handle="+h);
  } else if(link.includes("channel/")){
    let id=link.split("channel/")[1];
    res=await fetch(api+"?id="+id);
  } else {
    alert("Invalid");
    return;
  }

  let data=await res.json();

  if(!data.channelId) return alert("Error");

  if(channels.some(c=>c.channelId===data.channelId)){
    alert("Already added");
    return;
  }

  channels.push(data);
  localStorage.setItem("channels",JSON.stringify(channels));

  render();
  home();
}

// RENDER CHANNEL LIST
function render(){

  list.innerHTML="";

  channels.forEach((c,i)=>{

    let div=document.createElement("div");
    div.className="channel";

    div.innerHTML=`
      <div class="left">
        <img src="${c.logo}">
        <span>${c.name}</span>
      </div>
      <span onclick="del(${i})">❌</span>
    `;

    div.onclick=()=>openChannel(i);

    list.appendChild(div);
  });
}

// DELETE
function del(i){
  channels.splice(i,1);
  localStorage.setItem("channels",JSON.stringify(channels));
  render();
  home();
}

// HOME FEED
function home(){

  channelView.style.display="none";
  homeView.style.display="grid";

  homeView.innerHTML="";

  channels.forEach(c=>{
    let p="UU"+c.channelId.substring(2);

    let iframe=document.createElement("iframe");
    iframe.src=`https://www.youtube.com/embed/videoseries?list=${p}`;

    homeView.appendChild(iframe);
  });
}

// CHANNEL PAGE
function openChannel(i){

  let c=channels[i];

  homeView.style.display="none";
  channelView.style.display="block";

  let p="UU"+c.channelId.substring(2);

  channelView.innerHTML=`
    <h2>${c.name}</h2>
    <div class="grid">
      <iframe src="https://www.youtube.com/embed/videoseries?list=${p}"></iframe>
    </div>
  `;
}

// PANEL
function togglePanel(){
  panel.classList.toggle("open");
}

// HISTORY (simple placeholder)
function history(){
  alert("History coming next");
}

</script>

</body>
</html>
