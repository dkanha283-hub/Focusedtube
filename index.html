<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    input {
      padding:10px;
      border-radius:8px;
      border:none;
      margin:5px;
    }

    button {
      padding:10px;
      border:none;
      border-radius:8px;
      background:red;
      color:white;
    }

    .navbar {
      width:100%;
      padding:10px;
      background:#181818;
      display:flex;
      justify-content:space-between;
    }

    .container {
      display:flex;
      height:calc(100vh - 50px);
    }

    .sidebar {
      width:250px;
      background:#181818;
      padding:10px;
      overflow:auto;
    }

    .main {
      flex:1;
      padding:10px;
      overflow:auto;
    }

    iframe {
      width:100%;
      height:250px;
      border:none;
      border-radius:10px;
      margin-bottom:15px;
    }

    .item {
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#282828;
      padding:8px;
      border-radius:8px;
      margin-bottom:8px;
    }

    .info {
      display:flex;
      align-items:center;
      gap:10px;
    }

    img {
      width:30px;
      height:30px;
      border-radius:50%;
    }
  </style>
</head>

<body>

<div id="loginPage" class="login">
  <h2>FocusTube</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube</b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <div class="sidebar">
      <input id="input" placeholder="Paste channel or @link">
      <button onclick="add()">Add</button>
      <div id="list"></div>
    </div>

    <div class="main" id="videos"></div>

  </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", ()=>{
  if(localStorage.getItem("login")){
    showApp();
  }
});

function login(){
  if(!username.value || !password.value) return alert("Enter details");
  localStorage.setItem("login","true");
  showApp();
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  load();
}

let data=[];

function load(){
  data = JSON.parse(localStorage.getItem("channels")||"[]");
  render();
  videosLoad();
}

async function add(){

  let link = input.value.trim();
  let api = "https://restless-brook-50e4.dkanha283.workers.dev/";

  let res;

  if(link.includes("@")){
    let handle = link.split("@")[1].split("?")[0];
    res = await fetch(api + "?handle=" + handle);
  } else if(link.includes("channel/")){
    let id = link.split("channel/")[1];
    res = await fetch(api + "?id=" + id);
  } else {
    alert("Invalid link");
    return;
  }

  let info = await res.json();

  if(!info.channelId) return alert("Error fetching");

  if(data.some(c => c.id === info.channelId)){
    alert("Already added");
    return;
  }

  data.push(info);
  localStorage.setItem("channels", JSON.stringify(data));

  render();
  videosLoad();
}

function render(){
  list.innerHTML="";

  data.forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <div class="info">
        <img src="${c.logo}">
        <span>${c.name}</span>
      </div>
      <span onclick="del(${i})">❌</span>
    `;

    list.appendChild(div);
  });
}

function del(i){
  data.splice(i,1);
  localStorage.setItem("channels", JSON.stringify(data));
  render();
  videosLoad();
}

function videosLoad(){
  videos.innerHTML="";

  data.forEach(c=>{
    let playlist = "UU" + c.channelId.substring(2);

    let iframe=document.createElement("iframe");
    iframe.src=`https://www.youtube.com/embed/videoseries?list=${playlist}`;

    videos.appendChild(iframe);
  });
}

</script>

</body>
</html>
