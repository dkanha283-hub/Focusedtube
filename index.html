<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      height: 60px;
      background: #181818;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border-bottom: 1px solid #333;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      margin-right: 20px;
    }

    .nav-btn {
      margin-right: 10px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 5px;
    }

    .nav-btn:hover {
      background: #333;
    }

    .login-btn {
      margin-left: auto;
      background: #333;
      border: none;
      color: white;
      padding: 8px 12px;
      cursor: pointer;
    }

    /* LAYOUT */
    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      background: #181818;
      padding: 10px;
      border-right: 1px solid #333;
      overflow-y: auto;
    }

    .channel {
      padding: 10px;
      background: #222;
      margin-bottom: 5px;
      border-radius: 5px;
      cursor: pointer;
    }

    .channel:hover {
      background: #333;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .player {
      width: 100%;
      height: 300px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .video {
      cursor: pointer;
    }

    .video img {
      width: 100%;
      border-radius: 10px;
    }

    .video-title {
      font-size: 14px;
      margin-top: 5px;
    }

    .page {
      display: none;
    }

    .active {
      display: block;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">FocusTube 🎯</div>

  <div class="nav-btn" onclick="showPage('home')">Home</div>
  <div class="nav-btn" onclick="showPage('subscriptions')">Subscriptions</div>
  <div class="nav-btn" onclick="showPage('history')">History</div>

  <button class="login-btn" onclick="login()">Login</button>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar" id="channelList"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- HOME -->
    <div id="home" class="page active">
      <h2>Welcome to FocusTube</h2>
      <p>Login and select a channel to start</p>
    </div>

    <!-- SUBSCRIPTIONS -->
    <div id="subscriptions" class="page">
      <iframe id="player" class="player"></iframe>
      <div id="videos" class="videos"></div>
    </div>

    <!-- HISTORY -->
    <div id="history" class="page">
      <h2>History</h2>
      <div id="historyList"></div>
    </div>

  </div>

</div>

<script>

let accessToken = "";
let historyList = JSON.parse(localStorage.getItem("history")) || [];

// PAGE SWITCH
function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

// LOGIN
function login() {
  google.accounts.oauth2.initTokenClient({
    client_id: "901526621368-k63bfsq7aomg2e2k6u0625bub9291dhs.apps.googleusercontent.com",
    scope: "https://www.googleapis.com/auth/youtube.readonly",
    callback: (res) => {
      accessToken = res.access_token;
      loadSubscriptions();
    }
  }).requestAccessToken();
}

// LOAD CHANNELS
async function loadSubscriptions() {
  let res = await fetch(
    "https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50",
    {
      headers: { Authorization: "Bearer " + accessToken }
    }
  );

  let data = await res.json();

  let list = document.getElementById("channelList");
  list.innerHTML = "<h3>Channels</h3>";

  data.items.forEach(item => {
    let div = document.createElement("div");
    div.className = "channel";
    div.innerText = item.snippet.title;

    div.onclick = () => {
      showPage("subscriptions");
      loadVideos(item.snippet.resourceId.channelId);
    };

    list.appendChild(div);
  });
}

// LOAD VIDEOS
async function loadVideos(channelId) {

  let res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=15&order=date&type=video`,
    {
      headers: { Authorization: "Bearer " + accessToken }
    }
  );

  let data = await res.json();

  let container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach((video, index) => {
    let vid = video.id.videoId;
    let title = video.snippet.title;
    let thumb = video.snippet.thumbnails.medium.url;

    let div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <img src="${thumb}">
      <div class="video-title">${title}</div>
    `;

    div.onclick = () => playVideo(vid, title);

    container.appendChild(div);

    if (index === 0) playVideo(vid, title);
  });
}

// PLAY VIDEO + SAVE HISTORY
function playVideo(id, title) {
  document.getElementById("player").src =
    `https://www.youtube.com/embed/${id}`;

  historyList.unshift(title);
  localStorage.setItem("history", JSON.stringify(historyList));

  updateHistory();
}

// SHOW HISTORY
function updateHistory() {
  let list = document.getElementById("historyList");
  list.innerHTML = "";

  historyList.forEach(item => {
    let div = document.createElement("div");
    div.innerText = item;
    list.appendChild(div);
  });
}

updateHistory();

</script>

</body>
</html>
