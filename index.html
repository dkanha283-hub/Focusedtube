<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusedTube | Chronological Engine</title>
    <style>
        /* --- CORE DESIGN & THEMES --- */
        :root {
            --bg: #000000;
            --panel: rgba(22, 22, 22, 0.95);
            --card: #151515;
            --text: #ffffff;
            --muted: #999999;
            --accent: #ff0000;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 15px 40px rgba(0,0,0,0.8);
            --radius: 18px;
        }

        body.light {
            --bg: #f2f2f7;
            --panel: rgba(255, 255, 255, 0.95);
            --card: #ffffff;
            --text: #1d1d1f;
            --muted: #86868b;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden; -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease;
        }

        /* --- AUTH SCREEN --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 24px; width: 320px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border); background: rgba(128,128,128,0.1); color: var(--text); box-sizing: border-box; outline: none; font-size: 16px; transition: border 0.3s; }
        input:focus { border: 1px solid var(--accent); }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 16px; }
        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        /* --- APP SHELL & TOPBAR --- */
        #app { display: none; height: 100vh; flex-direction: column; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 1000; position: relative; }
        .logo { font-weight: 900; font-size: 1.5rem; cursor: pointer; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .nav-icons { display: flex; gap: 6px; align-items: center; }
        .icon-btn { font-size: 1.3rem; padding: 10px; cursor: pointer; border-radius: 12px; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }
        .icon-btn:hover { background: var(--border); }

        /* --- POPUPS & OVERLAYS --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 2000; backdrop-filter: blur(10px); transition: opacity 0.3s; }
        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95); 
            width: 90%; max-width: 450px; background: var(--panel); z-index: 2100; 
            padding: 25px; border-radius: 24px; border: 1px solid var(--border);
            box-shadow: var(--shadow); opacity: 0; visibility: hidden; transition: 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        .modal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        /* --- MAIN CONTENT & VIEWS --- */
        .viewport { flex: 1; overflow-y: auto; padding: 20px; position: relative; scroll-behavior: smooth; }
        .view { display: none; animation: fadeIn 0.4s cubic-bezier(0.2, 0, 0, 1); }
        .view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }

        /* --- VIDEO CARDS --- */
        .card { cursor: pointer; transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1); position: relative; }
        .card:hover { transform: translateY(-6px); }
        .t-wrap { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: var(--radius); overflow: hidden; background: #222; }
        .t-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .card:hover .t-wrap img { transform: scale(1.05); } 
        
        /* NEW: Date Badge on the bottom right of the video thumbnail */
        .v-date-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            backdrop-filter: blur(4px);
            z-index: 5;
        }

        .add-p-btn { 
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; 
            border: none; border-radius: 12px; width: 36px; height: 36px; font-size: 1.4rem; 
            cursor: pointer; opacity: 0; transition: 0.2s; z-index: 10; backdrop-filter: blur(4px);
        }
        .card:hover .add-p-btn { opacity: 1; }
        .add-p-btn:hover { background: var(--accent); }

        .meta { display: flex; gap: 12px; padding: 12px 4px; }
        .c-logo { width: 38px !important; height: 38px !important; min-width: 38px; max-width: 38px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); background: #333; }
        .v-title { font-weight: 700; font-size: 1rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-sub { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

        /* --- GLOBAL PRO PLAYER --- */
        #player-wrapper { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; max-width: 1100px; background: var(--bg); border-radius: 24px; 
            padding: 20px; z-index: 3000; display: none; flex-direction: column; 
            box-shadow: var(--shadow); border: 1px solid var(--border); transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
        }
        #player-wrapper.floating { 
            top: auto; left: auto; bottom: 20px; right: 20px; transform: none; 
            width: 320px; padding: 10px; border-radius: 16px; border: 2px solid var(--accent); background: var(--panel);
        }
        .stage { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; position: relative; }

        .p-btn { background: var(--card); border: 1px solid var(--border); color: white; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .p-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .floating .hide-on-float { display: none; }

        /* --- CHANNEL HEADER --- */
        .ch-header { display: flex; align-items: center; gap: 20px; padding: 25px; background: var(--panel); border-radius: 24px; margin-bottom: 25px; border: 1px solid var(--border); }
        .ch-header img { width: 80px !important; height: 80px !important; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        
        .tabs { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tab { padding: 10px 0; cursor: pointer; font-weight: 600; color: var(--muted); position: relative; transition: color 0.2s; }
        .tab.active { color: var(--text); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent); }

        /* --- UTILS & TOASTS --- */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); border-radius: 10px; cursor: pointer; }
        .list-item:hover { background: rgba(128,128,128,0.08); }
        .loader { border: 3px solid var(--border); border-top: 3px solid var(--accent); border-radius: 50%; width: 36px; height: 36px; animation: spin 0.8s linear infinite; margin: 40px auto; }
        
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 4000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--accent); color: white; padding: 12px 24px; border-radius: 30px; font-weight: bold; font-size: 14px; box-shadow: 0 5px 15px rgba(255,0,0,0.4); animation: toastFadeIn 0.3s ease forwards, toastFadeOut 0.3s ease 2.5s forwards; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastFadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(20px); } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="Modal.closeAll()"></div>

<div id="toast-container"></div>

<!-- AUTHENTICATION -->
<div id="auth-screen">
    <div class="auth-card">
        <h1 class="logo">Focused<span>Tube</span></h1>
        <p style="color:var(--muted); margin-bottom:25px;">Secure Distraction-Free Access</p>
        <input id="uIn" placeholder="Username" onkeyup="if(event.key==='Enter') Auth.login()">
        <input id="pIn" type="password" placeholder="Password" onkeyup="if(event.key==='Enter') Auth.login()">
        <button onclick="Auth.login()">Enter Session</button>
    </div>
</div>

<!-- GLOBAL PRO PLAYER -->
<div id="player-wrapper">
    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
        <button class="p-btn" onclick="Player.close()">✕ Close</button>
        <div style="display:flex; gap: 10px;">
            <button class="p-btn" onclick="Player.toggleFullScreen()" title="Full Screen">⛶ Full Screen</button>
            <button class="p-btn" onclick="Player.toggleFloat()">🔳 Mini-Player</button>
        </div>
    </div>
    <div class="stage">
        <div id="yt-player-host" style="width: 100%; height: 100%; border: none;"></div>
    </div>
    <div class="hide-on-float" style="padding:15px 0 0 0;">
        <h2 id="p-title" style="margin:0; font-size:1.2rem; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;">Video Title</h2>
        <p id="p-chan" style="color:var(--accent); font-weight:800; cursor:pointer; margin:8px 0;"></p>
        <div style="display:flex; justify-content:center; gap: 20px; margin-top:15px;">
            <button class="p-btn" style="font-size: 1.5rem; padding: 10px 25px;" onclick="Player.seek(-10)" title="Skip backward 10s">⏪</button>
            <button class="p-btn" style="font-size: 1.5rem; padding: 10px 25px;" onclick="Player.togglePlay()" title="Play/Pause">⏯</button>
            <button class="p-btn" style="font-size: 1.5rem; padding: 10px 25px;" onclick="Player.seek(10)" title="Skip forward 10s">⏩</button>
        </div>
    </div>
</div>

<!-- MAIN APP SHELL -->
<div id="app">
    <nav class="topbar">
        <div class="logo" onclick="Router.go('home')">Focused<span>Tube</span></div>
        <div class="nav-icons">
            <div class="icon-btn" onclick="Modal.open('search-mod')">🔍</div>
            <div class="icon-btn" onclick="Modal.open('subs-mod')">📺</div>
            <div class="icon-btn" onclick="Router.go('playlists')">📁</div>
            <div class="icon-btn" onclick="Router.go('history')">⏱</div>
            <div class="icon-btn" onclick="Modal.open('settings-mod')">⚙️</div>
        </div>
    </nav>

    <!-- MODALS -->
    <div id="search-mod" class="modal">
        <h3 style="margin-top:0">Search Engine</h3>
        <input id="sq" placeholder="Type and hit enter..." onkeyup="if(event.key==='Enter') App.search()" style="width:100%; margin-bottom:15px;">
        <div id="search-res" class="grid" style="max-height:350px; overflow-y:auto; gap:15px;"></div>
    </div>

    <div id="subs-mod" class="modal">
        <h3 style="margin-top:0">Manage Subscriptions</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input id="chIn" placeholder="Paste URL, @handle, or ID" style="margin:0;" onkeyup="if(event.key==='Enter') App.addChannel()">
            <button id="add-ch-btn" onclick="App.addChannel()" style="width:80px; margin:0;">Add</button>
        </div>
        <div id="subs-list" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <div id="plist-add-mod" class="modal">
        <h3 style="margin-top:0">Save Video</h3>
        <div id="plist-ops" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
        <input id="newPlIn" placeholder="Create new playlist..." style="margin:0 0 10px 0;" onkeyup="if(event.key==='Enter') App.createAndSave()">
        <button onclick="App.createAndSave()" class="p-btn" style="width:100%;">Create & Add</button>
    </div>

    <div id="settings-mod" class="modal">
        <h3 style="margin-top:0">Preferences</h3>
        <div class="list-item" onclick="App.toggleTheme()"><span>🌗 Toggle Dark/Light</span></div>
        <div class="list-item" onclick="App.clearHistory()"><span>🗑 Clear History</span></div>
        <div class="list-item" onclick="Auth.logout()" style="color:var(--accent)"><span>👤 Sign Out</span></div>
    </div>

    <main class="viewport" id="scroll-area">
        <!-- HOME (LATEST FEED) -->
        <div id="view-home" class="view">
            <h2>Recent Uploads (Last 30 Days)</h2>
            <div id="home-grid" class="grid"></div>
            <div id="home-loader" class="loader hidden"></div>
        </div>

        <!-- CHANNEL PAGE -->
        <div id="view-channel" class="view">
            <div class="ch-header">
                <img id="ch-page-img" src="">
                <div>
                    <h1 id="ch-page-name" style="margin:0; font-size:1.8rem;">Channel</h1>
                    <p id="ch-page-stats" style="margin:5px 0 0 0; color:var(--muted);"></p>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" id="tab-vids" onclick="App.switchTab('videos')">Videos</div>
                <div class="tab" id="tab-shorts" onclick="App.switchTab('shorts')">Shorts</div>
                <div class="tab" id="tab-playlists" onclick="App.switchTab('playlists')">Playlists</div>
            </div>
            <div id="ch-grid" class="grid"></div>
        </div>

        <!-- PLAYLISTS -->
        <div id="view-playlists" class="view">
            <h2>My Collections</h2>
            <div id="pl-master-grid" class="grid"></div>
        </div>

        <div id="view-pl-items" class="view">
            <button class="p-btn" onclick="Router.go('playlists')">← Back</button>
            <h2 id="cur-pl-title" style="margin-top:20px;">Folder</h2>
            <div id="pl-items-grid" class="grid"></div>
        </div>

        <!-- HISTORY -->
        <div id="view-history" class="view">
            <h2>History</h2>
            <div id="hist-grid" class="grid"></div>
        </div>
    </main>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API = "https://restless-brook-50e4.dkanha283.workers.dev";

let isYTApiReady = false;
function onYouTubeIframeAPIReady() {
    isYTApiReady = true;
}

const state = {
    user: localStorage.getItem("login"),
    channels: JSON.parse(localStorage.getItem("channels") || "[]"),
    history: JSON.parse(localStorage.getItem("history") || "[]"),
    playlists: JSON.parse(localStorage.getItem("playlists") || "{}"),
    homeFeedAll: [],
    visibleHomeItems: 0,
    curChannelData: null,
    pendingVid: null
};


/* --- UTILITIES & TIME PARSING --- */
const Utils = {
    // Converts official ISO timestamp to milliseconds for perfect sorting
    parseRelativeDate(dateStr) {
        if (!dateStr || dateStr === "Playlist") return 0;
        return new Date(dateStr).getTime();
    },
    // Checks if the official timestamp is within the last 30 days
    isWithinOneMonth(dateStr) {
        if (!dateStr || dateStr === "Playlist") return false; 
        const videoTime = new Date(dateStr).getTime();
        const oneMonthAgo = Date.now() - (30 * 24 * 60 * 60 * 1000); // 30 days in milliseconds
        return videoTime > oneMonthAgo;
    },
    // Formats the ugly API date into a clean format for your video badges (e.g., "Apr 6, 2024")
    formatDate(dateStr) {
        if (!dateStr || dateStr === "Playlist" || dateStr === "Recent") return dateStr;
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }
};

    // Checks if the string means 1 month or less
    isWithinOneMonth(dateStr) {
        if (!dateStr) return false; 
        const str = dateStr.toLowerCase();
        if (str.includes('year')) return false; // Exclude anything with "year"
        if (str.includes('months')) return false; // Exclude 2 or more months
        return true; // Keep seconds, minutes, hours, days, weeks, and exactly "1 month"
    }
};

const UI = {
    showToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        container.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 2800); 
    }
};

/* --- ROUTER & MODALS --- */
const Router = {
    go(view) {
        Modal.closeAll();
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        const el = document.getElementById('view-' + view);
        if(el) el.classList.add('active');
        
        if(view === 'home') App.initHome();
        if(view === 'history') App.renderGrid(state.history, 'hist-grid', 'history'); 
        if(view === 'playlists') App.renderPlMaster();
    }
};

const Modal = {
    open(id) {
        this.closeAll();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).classList.add('active');
        if(id === 'subs-mod') this.renderSubs();
        const input = document.getElementById(id).querySelector('input');
        if(input) setTimeout(() => input.focus(), 100);
    },
    closeAll() {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        document.getElementById('overlay').style.display = 'none';
    },
    renderSubs() {
        document.getElementById('subs-list').innerHTML = state.channels.map((c, i) => `
            <div class="list-item">
                <div style="display:flex; align-items:center; gap:12px; cursor:pointer;" onclick="App.openChannel('${c.channelId}')">
                    <img src="${c.logo}" class="c-logo">
                    <span style="font-weight:600;">${c.name}</span>
                </div>
                <span onclick="App.remChannel(${i})" style="color:var(--accent); font-weight:bold;">✕</span>
            </div>`).join("");
    }
};

/* --- APP ENGINE --- */
const App = {
    async initHome() {
        if(!state.channels.length) { 
            document.getElementById('home-grid').innerHTML = "<p>No channels added. Use the 📺 icon to add some.</p>"; 
            return; 
        }
        
        if(state.homeFeedAll.length === 0) {
            document.getElementById('home-loader').classList.remove('hidden');
            let allVideosPool = [];
            
            for(let ch of state.channels) {
                try {
                    const r = await fetch(`${API}?sections=1&channelId=${ch.channelId}`);
                    const d = await r.json();
                    
                    if (d.videos) {
                        d.videos.forEach(v => {
                            // FILTER: Keep ONLY videos uploaded within the last 1 month
                            if (Utils.isWithinOneMonth(v.date)) {
                                allVideosPool.push({
                                    ...v, 
                                    chLogo: ch.logo, 
                                    chName: ch.name, 
                                    chId: ch.channelId,
                                    timestamp: Utils.parseRelativeDate(v.date) // Attach mathematical timestamp
                                });
                            }
                        });
                    }
                } catch(e){ console.error("Error fetching", ch.name) }
            }
            
            // SORT: Order the entire home feed from Newest (Highest Timestamp) to Oldest
            state.homeFeedAll = allVideosPool.sort((a, b) => b.timestamp - a.timestamp);
            document.getElementById('home-loader').classList.add('hidden');
        }
        
        document.getElementById('home-grid').innerHTML = "";
        state.visibleHomeItems = 0;
        this.loadMoreHome();
    },
    loadMoreHome() {
        const nextBatch = state.homeFeedAll.slice(state.visibleHomeItems, state.visibleHomeItems + 20);
        if(nextBatch.length === 0) return;
        state.visibleHomeItems += 20;
        document.getElementById('home-grid').insertAdjacentHTML('beforeend', this.buildCards(nextBatch));
    },

    renderGrid(data, target, viewType = 'default') {
        if (!data || data.length === 0) {
            document.getElementById(target).innerHTML = "<p style='color:var(--muted); padding:20px;'>No items found in this category.</p>";
            return;
        }
        document.getElementById(target).innerHTML = this.buildCards(data, viewType);
    },
    buildCards(data, viewType = 'default') {
        return data.map(v => {
            const safeObj = JSON.stringify(v).replace(/'/g, "&apos;").replace(/"/g, "&quot;");
            const fLogo = v.chLogo || `https://api.dicebear.com/7.x/initials/svg?seed=${v.chName || 'C'}`;
            
            const deleteBtn = viewType === 'history' 
                ? `<button class="add-p-btn" style="right: auto; left: 10px; background: rgba(255,0,0,0.8);" onclick="App.remHistoryItem(event, '${v.id}')" title="Remove from history">🗑️</button>` 
                : '';

            const isApiPlaylist = !v.id && v.playlistId; 
            const clickAction = isApiPlaylist 
                ? `UI.showToast('External playlist viewing coming in next update!')` 
                : `Player.init(${safeObj})`;

            // Date text defaults to 'Recent' if API doesn't provide it
            const displayDate = v.date || (isApiPlaylist ? 'Playlist' : 'Recent');

            return `
            <div class="card" onclick="${clickAction}">
                ${deleteBtn}
                <button class="add-p-btn" onclick="App.openAddPl(event, ${safeObj})">＋</button>
                <div class="t-wrap">
                    <img src="${v.thumb}" loading="lazy">
                    <!-- NEW: Prominent Date Badge on the video -->
                    <div class="v-date-badge">${displayDate}</div>
                </div>
                <div class="meta">
                    <img src="${fLogo}" class="c-logo" onclick="event.stopPropagation(); App.openChannel('${v.chId}')">
                    <div>
                        <div class="v-title">${v.title}</div>
                        <div class="v-sub">${v.chName || 'Channel'}</div>
                    </div>
                </div>
            </div>`;
        }).join("");
    },

    /* Channels */
    async openChannel(id) {
        Router.go('channel');
        document.getElementById('ch-grid').innerHTML = "<div class='loader'></div>";
        try {
            const r = await fetch(`${API}?sections=1&channelId=${id}`);
            const d = await r.json();
            const ch = state.channels.find(c => c.channelId === id) || {name:"Channel", logo:""};
            
            // Map the items and attach mathematical timestamps for perfect sorting
            const mapAndSort = (items) => {
                let mapped = (items || []).map(v => ({
                    ...v, chLogo: ch.logo, chName: ch.name, chId: id, timestamp: Utils.parseRelativeDate(v.date)
                }));
                // SORT: Ensure Channel page is ordered Newest to Oldest sequence
                return mapped.sort((a, b) => b.timestamp - a.timestamp);
            };

            state.curChannelData = {
                videos: mapAndSort(d.videos),
                shorts: mapAndSort(d.shorts),
                playlists: (d.playlists||[]).map(p => ({...p, chLogo: ch.logo, chName: ch.name, chId: id}))
            };
            
            document.getElementById('ch-page-img').src = ch.logo || `https://api.dicebear.com/7.x/initials/svg?seed=${ch.name}`;
            document.getElementById('ch-page-name').innerText = ch.name;
            document.getElementById('ch-page-stats').innerText = `${state.curChannelData.videos.length} Videos • ${state.curChannelData.shorts.length} Shorts`;
            
            this.switchTab('videos');
        } catch(e){ document.getElementById('ch-grid').innerHTML = "Error loading channel."; }
    },
    switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        let tabId = 'tab-vids';
        if (type === 'shorts') tabId = 'tab-shorts';
        if (type === 'playlists') tabId = 'tab-playlists';
        
        document.getElementById(tabId).classList.add('active');
        this.renderGrid(state.curChannelData[type] || [], 'ch-grid');
    },
    async addChannel() {
        const inputEl = document.getElementById('chIn');
        const btnEl = document.getElementById('add-ch-btn');
        let val = inputEl.value.trim();
        
        if(!val) return;

        if (val.includes('youtube.com/')) {
            const urlParts = val.split('/');
            val = urlParts.pop(); 
            if (!val) val = urlParts.pop(); 
        }
        val = val.replace("@", "");

        const isDuplicate = state.channels.some(c => 
            c.channelId === val || (c.handle && c.handle.toLowerCase() === val.toLowerCase())
        );
        if (isDuplicate) {
            UI.showToast("You are already subscribed to this channel!");
            inputEl.value = "";
            return;
        }

        const originalBtnText = btnEl.innerText;
        btnEl.innerText = "Adding...";
        btnEl.disabled = true;

        try {
            const r = await fetch(`${API}?handle=${encodeURIComponent(val)}`);
            const d = await r.json();

            if (d && (d.channelId || d.id)) { 
                const newChannel = {
                    channelId: d.channelId || d.id,
                    name: d.name || d.title || val,
                    logo: d.logo || d.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${val}`,
                    handle: val
                };

                state.channels.unshift(newChannel); 
                localStorage.setItem("channels", JSON.stringify(state.channels));
                state.homeFeedAll = []; 
                
                Modal.closeAll(); 
                inputEl.value = "";
                UI.showToast(`Subscribed to ${newChannel.name}!`);
                Router.go('home'); 
            } else {
                UI.showToast("Could not find a channel with that handle.");
            }
        } catch (e) {
            console.error("Subscription Error:", e);
            UI.showToast("Network error. Please try again.");
        } finally {
            btnEl.innerText = originalBtnText;
            btnEl.disabled = false;
        }
    },
    remChannel(i) {
        state.channels.splice(i, 1);
        localStorage.setItem("channels", JSON.stringify(state.channels));
        state.homeFeedAll = [];
        Modal.renderSubs();
        UI.showToast("Channel removed");
    },

    /* Search */
    async search() {
        const q = document.getElementById('sq').value;
        if(!q) return;
        document.getElementById('search-res').innerHTML = "<div class='loader'></div>";
        try {
            const r = await fetch(`${API}?search=1&q=${encodeURIComponent(q)}`);
            const d = await r.json();
            document.getElementById('search-res').innerHTML = this.buildCards(d);
        } catch (e) {
            document.getElementById('search-res').innerHTML = "<p>Search failed.</p>";
        }
    },

    /* Playlists */
    openAddPl(e, video) {
        e.stopPropagation();
        state.pendingVid = video;
        const ops = document.getElementById('plist-ops');
        const keys = Object.keys(state.playlists);
        ops.innerHTML = keys.map(k => `<div class="list-item" onclick="App.saveToPl('${k}')">📁 ${k}</div>`).join("");
        Modal.open('plist-add-mod');
    },
    createAndSave() {
        const name = document.getElementById('newPlIn').value.trim();
        if(!name) return;
        if(!state.playlists[name]) state.playlists[name] = [];
        this.saveToPl(name);
        document.getElementById('newPlIn').value = "";
    },
    saveToPl(name) {
        if(!state.playlists[name].some(v => v.id === state.pendingVid.id)) {
            state.playlists[name].push(state.pendingVid);
            localStorage.setItem("playlists", JSON.stringify(state.playlists));
            UI.showToast(`Saved to ${name}`);
        } else {
            UI.showToast(`Already in ${name}`);
        }
        Modal.closeAll();
    },
    renderPlMaster() {
        const keys = Object.keys(state.playlists);
        if(keys.length === 0) { document.getElementById('pl-master-grid').innerHTML = "<p>No playlists created yet.</p>"; return; }
        document.getElementById('pl-master-grid').innerHTML = keys.map(k => `
            <div class="card" onclick="App.viewPl('${k}')">
                <div class="t-wrap" style="display:flex;align-items:center;justify-content:center;font-size:3rem;">📁</div>
                <div class="meta"><div><div class="v-title">${k}</div><div class="v-sub">${state.playlists[k].length} videos</div></div></div>
            </div>`).join("");
    },
    viewPl(name) {
        Router.go('plist-items');
        document.getElementById('cur-pl-title').innerText = name;
        this.renderGrid(state.playlists[name], 'pl-items-grid');
    },

    /* Settings & History */
    toggleTheme() {
        document.body.classList.toggle('light');
        localStorage.setItem("theme", document.body.classList.contains('light') ? 'light' : 'dark');
    },
    clearHistory() {
        state.history = []; localStorage.setItem("history", "[]");
        UI.showToast("History Cleared");
        Modal.closeAll(); Router.go('home');
    },
    remHistoryItem(e, videoId) {
        e.stopPropagation(); 
        state.history = state.history.filter(v => v.id !== videoId);
        localStorage.setItem("history", JSON.stringify(state.history));
        UI.showToast("Removed from history");
        this.renderGrid(state.history, 'hist-grid', 'history');
    }
};

/* --- SCROLL EVENT FOR HOME --- */
document.getElementById('scroll-area').addEventListener('scroll', (e) => {
    const el = e.target;
    if(el.scrollTop + el.clientHeight >= el.scrollHeight - 100) {
        if(document.getElementById('view-home').classList.contains('active')) {
            App.loadMoreHome();
        }
    }
});

/* =========================
   PRO PLAYER (STABLE YT API)
========================= */
let ytPlayerObj = null;

const Player = {
    init(video) {
        const wrap = document.getElementById('player-wrapper');
        wrap.style.display = 'flex';
        wrap.classList.remove('floating'); 
        
        document.getElementById('p-title').innerText = video.title;
        document.getElementById('p-chan').innerText = video.chName || 'Channel';
        document.getElementById('p-chan').onclick = () => { this.toggleFloat(); App.openChannel(video.chId); };

        if (ytPlayerObj && typeof ytPlayerObj.loadVideoById === 'function') {
            ytPlayerObj.loadVideoById(video.id);
        } else {
            if (isYTApiReady && window.YT && window.YT.Player) {
                ytPlayerObj = new YT.Player('yt-player-host', {
                    height: '100%', width: '100%', videoId: video.id,
                    playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'controls': 1, 'origin': location.origin }
                });
            } else {
                document.getElementById('yt-player-host').innerHTML = `<iframe style="width:100%;height:100%;border:none;" src="https://www.youtube.com/embed/${video.id}?autoplay=1&rel=0&modestbranding=1&controls=1" allow="autoplay; fullscreen"></iframe>`;
            }
        }

        state.history = [video, ...state.history.filter(v => v.id !== video.id)].slice(0, 50);
        localStorage.setItem("history", JSON.stringify(state.history));
    },
    seek(sec) { 
        if(ytPlayerObj && typeof ytPlayerObj.getCurrentTime === 'function') {
            ytPlayerObj.seekTo(ytPlayerObj.getCurrentTime() + sec, true);
        }
    },
    togglePlay() {
        if(ytPlayerObj && typeof ytPlayerObj.getPlayerState === 'function') {
            ytPlayerObj.getPlayerState() === 1 ? ytPlayerObj.pauseVideo() : ytPlayerObj.playVideo();
        }
    },
    toggleFloat() { 
        const wrap = document.getElementById('player-wrapper');
        wrap.classList.toggle('floating');
        if(wrap.classList.contains('floating')) {
            if(document.fullscreenElement) { document.exitFullscreen(); }
            if (!document.getElementById('view-channel').classList.contains('active')) {
                Router.go('home');
            }
        }
    },
    toggleFullScreen() {
        const wrap = document.getElementById('player-wrapper');
        if (!document.fullscreenElement) {
            if (wrap.requestFullscreen) wrap.requestFullscreen();
            else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
            else if (wrap.msRequestFullscreen) wrap.msRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    },
    close() { 
        const wrap = document.getElementById('player-wrapper');
        wrap.style.display = 'none';
        if(document.fullscreenElement) document.exitFullscreen();
        if(ytPlayerObj && typeof ytPlayerObj.stopVideo === 'function') ytPlayerObj.stopVideo();
        else document.getElementById('yt-player-host').innerHTML = ""; 
    }
};

/* --- AUTH --- */
const Auth = {
    login() { 
        const user = document.getElementById('uIn').value.trim();
        if(user) { localStorage.setItem("login", user); location.reload(); }
    },
    logout() { localStorage.removeItem("login"); location.reload(); }
};

/* --- BOOTSTRAP --- */
if(state.user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    Router.go('home');
    if(localStorage.getItem("theme") === "light") document.body.classList.add('light');
}
