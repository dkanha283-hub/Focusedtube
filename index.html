<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, Arial;
      background: #f5f5f5;
      color: #222;
    }

    /* LOGIN SCREEN */
    .login-screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .logo {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .logo span {
      color: red;
      border: 2px solid red;
      padding: 5px 12px;
      border-radius: 6px;
    }

    .login-btn {
      padding: 12px 20px;
      border: 2px solid #2196f3;
      background: transparent;
      color: #2196f3;
      font-size: 18px;
      border-radius: 6px;
      cursor: pointer;
    }

    .login-btn:hover {
      background: #2196f3;
      color: white;
    }

    /* APP */
    .app {
      display: none;
    }

    /* NAVBAR */
    .navbar {
      height: 60px;
      background: white;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid #ddd;
    }

    .nav-logo {
      font-weight: bold;
      margin-right: 20px;
    }

    .nav-icons {
      margin-left: auto;
      display: flex;
      gap: 20px;
      font-size: 20px;
      cursor: pointer;
    }

    /* LAYOUT */
    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    .sidebar {
      width: 230px;
      background: #fff;
      border-right: 1px solid #ddd;
      padding: 10px;
      overflow-y: auto;
    }

    .channel {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .channel:hover {
      background: #eee;
    }

    .main {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .player {
      width: 100%;
      height: 300px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .video img {
      width: 100%;
      border-radius: 10px;
    }

    .video-title {
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <div class="logo">
    Focused <span>Tube</span>
  </div>

  <button class="login-btn" onclick="login()">
    Sign in with Google
  </button>
</div>

<!-- APP -->
<div id="app" class="app">

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-logo">FocusedTube</div>

    <div class="nav-icons">
      🏠
      🔍
      📺
      ⏱
    </div>
  </div>

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar" id="channelList"></div>

    <!-- MAIN -->
    <div class="main">
      <iframe id="player" class="player"></iframe>
      <div id="videos" class="videos"></div>
    </div>

  </div>

</div>

<script>

let accessToken = "";

// LOGIN
function login() {
  google.accounts.oauth2.initTokenClient({
    client_id: "901526621368-k63bfsq7aomg2e2k6u0625bub9291dhs.apps.googleusercontent.com",
    scope: "https://www.googleapis.com/auth/youtube.readonly",
    callback: (res) => {
      accessToken = res.access_token;

      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").style.display = "block";

      loadSubscriptions();
    }
  }).requestAccessToken();
}

// LOAD CHANNELS
async function loadSubscriptions() {
  let res = await fetch(
    "https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50",
    {
      headers: { Authorization: "Bearer " + accessToken }
    }
  );

  let data = await res.json();

  let list = document.getElementById("channelList");
  list.innerHTML = "<h3>Subscriptions</h3>";

  data.items.forEach(item => {
    let div = document.createElement("div");
    div.className = "channel";
    div.innerText = item.snippet.title;

    div.onclick = () => loadVideos(item.snippet.resourceId.channelId);

    list.appendChild(div);
  });
}

// LOAD VIDEOS
async function loadVideos(channelId) {

  let res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=15&order=date&type=video`,
    {
      headers: { Authorization: "Bearer " + accessToken }
    }
  );

  let data = await res.json();

  let container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach((video, index) => {
    let vid = video.id.videoId;
    let title = video.snippet.title;
    let thumb = video.snippet.thumbnails.medium.url;

    let div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <img src="${thumb}">
      <div class="video-title">${title}</div>
    `;

    div.onclick = () => {
      document.getElementById("player").src =
        `https://www.youtube.com/embed/${vid}`;
    };

    container.appendChild(div);

    if (index === 0) {
      document.getElementById("player").src =
        `https://www.youtube.com/embed/${vid}`;
    }
  });
}

</script>

</body>
</html>
