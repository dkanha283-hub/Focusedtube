<!DOCTYPE html>
<html>
<head>
  <title>FocusTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .login, .app {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .app { display:none; }

    .navbar {
      width:100%;
      background:white;
      padding:10px;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #ddd;
    }

    .container {
      display:flex;
      width:100%;
      height:calc(100vh - 50px);
    }

    .sidebar {
      width:250px;
      background:white;
      border-right:1px solid #ddd;
      padding:10px;
      overflow:auto;
    }

    .main {
      flex:1;
      padding:10px;
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login">
  <h2>FocusTube</h2>
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="navbar">
    <b>FocusTube</b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <div class="sidebar">
      <h3>Subscriptions</h3>
      <div id="channelList"></div>
    </div>

    <div class="main">
      <h3>Home Feed</h3>
      <div id="videos">Loading...</div>
    </div>

  </div>

</div>

<script>

// ===== INIT =====
window.onload = function () {
  let user = localStorage.getItem("user");

  if (user) {
    showApp();
  } else {
    showLogin();
  }
};

// ===== UI =====
function showLogin() {
  document.getElementById("loginPage").style.display = "flex";
  document.getElementById("app").style.display = "none";
}

function showApp() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "block";

  loadData();
}

// ===== LOGIN =====
function login() {
  let u = document.getElementById("username").value.trim();
  let p = document.getElementById("password").value.trim();

  if (u === "" || p === "") {
    alert("Enter username & password");
    return;
  }

  localStorage.setItem("user", JSON.stringify({username:u}));

  showApp();
}

// ===== LOGOUT =====
function logout() {
  localStorage.removeItem("user");
  showLogin();
}

// ===== DATA =====
let channels = [];

function loadData() {
  channels = JSON.parse(localStorage.getItem("channels") || "[]");
  renderChannels();
  loadFeed();
}

// ===== CHANNEL UI =====
function renderChannels() {
  let list = document.getElementById("channelList");
  list.innerHTML = "";

  channels.forEach((c,i) => {
    let div = document.createElement("div");
    div.style.padding = "8px";
    div.style.borderBottom = "1px solid #ddd";
    div.innerHTML = c.name || "Channel";
    list.appendChild(div);
  });
}

// ===== FEED =====
function loadFeed() {
  document.getElementById("videos").innerHTML = "Feed working ✅";
}

</script>

</body>
</html>
